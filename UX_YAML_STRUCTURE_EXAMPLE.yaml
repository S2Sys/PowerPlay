# IN RULES SECTION (after v2.1.0 git-workflow rule)
# ═══════════════════════════════════════════════════════════════════════════════

rules:
  # ... existing 24 rules ...

  # ── v2.2.0 UX Design Rules ────────────────────────────────

  - name: ux-design-system
    globs: ["**/*.tsx", "**/*.jsx", "**/*.css", "**/*.scss"]
    alwaysApply: false
    rule: |
      UI/UX design system standards:
      - Color: 60-30-10 rule, semantic tokens (primary, secondary, success, danger)
      - Typography: 1.25 Major Third scale, 1.5-1.75 line height, 65ch max width
      - Spacing: 8-point grid (4px, 8px, 16px, 24px, 32px, 48px, 64px)
      - Responsive: Mobile-first, breakpoints 320px/480px/768px/1024px/1280px
      - Components: Button hierarchy, form inputs, cards, modals
      - Dark mode: Semantic tokens for light/dark variants
      See .continue/rules/ux-design-system.md for complete design system.

  - name: accessibility-wcag
    globs: ["**/*.tsx", "**/*.jsx", "**/*.html"]
    alwaysApply: false
    rule: |
      WCAG 2.1 AA accessibility standards:
      - Contrast: 4.5:1 normal text, 3:1 large text (≥18px bold), 3:1 UI components
      - Focus: Visible focus indicators on ALL interactive elements (2px outline, 2px offset)
      - Keyboard: Full keyboard navigation, no keyboard traps, skip links
      - ARIA: Semantic HTML (<button>, <nav>, <main>), aria-label for icons, aria-expanded for menus
      - Touch: 44×44px minimum target size, 8px gaps between targets
      - Color: Never convey information by color alone, use patterns/text/icons
      See .continue/rules/accessibility-wcag.md for WCAG checklist.

  - name: responsive-mobile-first
    globs: ["**/*.tsx", "**/*.jsx", "**/*.css", "**/*.scss"]
    alwaysApply: false
    rule: |
      Mobile-first responsive design standards:
      - Base styles: Start at 320px (mobile), progressive enhancement
      - Breakpoints: 480px (small), 768px (tablet), 1024px (lg), 1280px (xl), 1536px (2xl)
      - Fluid typography: Use clamp() for smooth scaling across viewport sizes
      - Container widths: Mobile 100% + 16px padding, Desktop max-width 1280px centered
      - Images: Responsive images with srcset, WebP format, lazy loading
      - Layout shift: Avoid layout shift with aspect-ratio, reserved space for ads/images
      See .continue/rules/responsive-mobile-first.md for responsive patterns.

  - name: animation-motion
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.css"]
    alwaysApply: false
    rule: |
      Animation and motion standards:
      - GPU acceleration: ONLY animate transform and opacity (never width, height, margin, padding)
      - Durations: instant=50ms, fast=100ms, normal=200ms, slow=300ms, slower=500ms
      - Easing: ease-out (cubic-bezier) default, ease-in for exit, bounce for playful
      - Accessibility: Always support prefers-reduced-motion media query
      - Performance: No layout thrashing, smooth 60fps animations
      - Micro-interactions: Loading states, transitions, hover effects
      See .continue/rules/animation-motion.md for motion guidelines.

  - name: design-tokens
    globs: ["**/*.css", "**/*.scss", "**/tokens/*"]
    alwaysApply: false
    rule: |
      Design tokens and CSS variables standards:
      - Token structure: Colors, spacing, typography, shadows, border radius
      - CSS custom properties: --color-primary, --spacing-base, --font-scale, --shadow-lg
      - Dark mode: Paired tokens (--bg-primary light/dark, --text-primary light/dark)
      - Naming: semantic (primary, secondary, danger), not color-based (blue-500)
      - Format: CSS file with organized sections, documented with comments
      - Usage: Use tokens in all components, sync with design tools
      See .continue/rules/design-tokens.md for token standards.

# ═══════════════════════════════════════════════════════════════════════════════
# IN PROMPTS SECTION (after v2.1.0 dep-update prompt)
# ═══════════════════════════════════════════════════════════════════════════════

prompts:
  # ... existing 33 prompts ...

  # ── v2.2.0 UX Design Prompts ──────────────────────────────

  - name: design-component
    description: "Generate accessible UI component with UXPro standards"
    invokable: true
    prompt: |
      Generate a complete accessible UI component using UXPro design system:
      Step 1: Structure — semantic HTML, accessibility-first, proper nesting
      Step 2: Styling — 60-30-10 color rule, typography scale, 8-point grid spacing
      Step 3: States — default, hover, active, focus (2px outline), disabled, loading
      Step 4: Responsive — mobile-first, clamp() fluid typography, breakpoints
      Step 5: Accessibility — WCAG 2.1 AA contrast (4.5:1), ARIA labels, focus indicators
      Output: Complete component code + CSS + HTML structure + accessibility checklist.

  - name: design-audit
    description: "WCAG accessibility audit of UI component"
    invokable: true
    prompt: |
      Accessibility audit of this UI component:
      Step 1: Contrast audit — check all text/UI elements against 4.5:1 (normal), 3:1 (large), 3:1 (UI)
      Step 2: Focus states — verify visible focus indicators, keyboard navigation, no traps
      Step 3: ARIA — check semantic HTML, aria-label for icon buttons, aria-expanded for toggles
      Step 4: Responsive — test at 320px, 480px, 768px, 1024px, 1280px breakpoints
      Step 5: Motion — verify GPU acceleration (transform/opacity only), prefers-reduced-motion support
      Output: Audit table (Issue | WCAG Level | Severity | Affected Element | Fix Code) + checklist.

  - name: design-system
    description: "Generate or analyse design tokens and guidelines"
    invokable: true
    prompt: |
      Analyse this project's design system or generate one using UXPro standards:
      Step 1: Color palette — 60-30-10 rule, semantic tokens, light/dark variants
      Step 2: Typography — scale (1.25 Major Third), line heights, max widths (65ch body)
      Step 3: Spacing — 8-point grid, token values (4px, 8px, 16px, 24px, 32px, 48px, 64px)
      Step 4: Components — button hierarchy (primary, secondary, tertiary), form inputs, cards
      Step 5: Tokens file — CSS custom properties, organized sections, ready to use
      Output: Complete design tokens CSS file + design documentation + usage examples + Figma token format.

  - name: responsive-design
    description: "Check responsive design across all breakpoints and devices"
    invokable: true
    prompt: |
      Responsive design audit of this component/layout:
      Step 1: Mobile-first check — base styles at 320px, progressive enhancement
      Step 2: Breakpoint testing — verify at 480px, 768px, 1024px, 1280px, 1536px
      Step 3: Fluid scaling — check clamp() for typography, container queries where needed
      Step 4: Touch targets — verify 44×44px minimum, 8px gaps between interactive elements
      Step 5: Content reflow — check text wrapping, image sizing, layout shift prevention
      Output: Breakpoint table (Breakpoint | Issues | Fix) + before/after code + performance notes.

  - name: motion-design
    description: "Audit animations for GPU acceleration, accessibility, performance"
    invokable: true
    prompt: |
      Motion and animation audit:
      Step 1: GPU acceleration — verify ONLY transform and opacity animated (never width/height/margin)
      Step 2: Durations — check against standards (50ms instant, 100ms fast, 200ms normal, 300ms slow)
      Step 3: Easing — verify ease-out (default), bounce (playful), ease-in (exit)
      Step 4: Accessibility — verify prefers-reduced-motion media query support
      Step 5: Performance — verify no layout thrashing, smooth 60fps, no jank
      Output: Animation audit table + remediation code (before/after) + performance guidelines.

