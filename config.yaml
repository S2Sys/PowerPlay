      Create app distribution plan for this system:
      Step 1: Versioning — semantic version scheme (major.minor.patch), build number tracking
      Step 2: Beta testing — TestFlight (iOS), internal testing (Android), duration, feedback collection
      Step 3: Store submission — iOS App Store + Android Play Store requirements, metadata, screenshots
      Step 4: Release process — build signing, notarization, code signing certificate management
      Step 5: Post-launch — monitoring (crashes, ratings), update strategy (OTA, forced updates), ASO
      Output: Release checklist, version history template, store submission checklist, monitoring dashboard.

  # ── v2.8.0 AI Behavior Prompts ────────────────────────

  - name: think-through
    description: "Force explicit chain-of-thought — decompose, state assumptions, reason, rate confidence"
    invokable: true
    prompt: |
      Work through this problem explicitly. Do not skip to the answer.

      Step 1: RESTATE
        Restate the problem in your own words (1-2 sentences).
        If ambiguous, state the interpretation you are using.

      Step 2: DECOMPOSE
        Break into sub-problems. List them as numbered items.
        If any sub-problem requires information you don't have: name it as an unknown.

      Step 3: ASSUMPTIONS
        List every assumption you are making.
        Format: "Assuming [X] because [reason]. Confidence: HIGH / MEDIUM / LOW"

      Step 4: REASONING
        For each sub-problem: state reasoning in 2-4 sentences.
        Show trade-offs where multiple valid approaches exist.
        Do not jump to code until reasoning is complete.

      Step 5: ANSWER
        Give the actual answer, informed by the above reasoning.
        Include code where relevant, but let the reasoning precede it.

      Step 6: CONFIDENCE + CAVEATS
        Confidence rating: HIGH (verified) / MEDIUM (reasoning from patterns) / LOW (guess)
        Caveats: what could make this answer wrong?
        What should the user verify independently?

  - name: calibrate
    description: "Calibrate AI responses — rate accuracy/depth/format, adjust approach for session"
    invokable: true
    prompt: |
      Calibrate my responses to be more useful to you.

      About my last response:

      1. ACCURACY CHECK
         Was the information correct?
         If anything was wrong or misleading, what was it?

      2. DEPTH CHECK
         Too detailed, too brief, or about right for your expertise level?
         Did I explain things you already know? Skip things you needed?

      3. FORMAT CHECK
         Too much prose? Not enough code? Too many steps?
         What format would have worked better?

      4. WHAT WOULD HAVE BEEN MORE USEFUL
         If you could rewrite my response, what would you change?

      Based on your answers I will adjust:
      - Explanation depth for the rest of this session
      - How much I narrate reasoning vs. just give the answer
      - Whether to show alternatives or just recommend one approach
      - How much validation/caveats to include

      Short answers are fine — "too verbose", "just the code", "too simple" is enough.

  # ── v2.5.0 Security & Compliance Prompts ──────────────

  - name: zero-trust-design
    description: "Design zero-trust security architecture for system"
    invokable: true
    prompt: |
      Design a zero-trust security architecture for this system:
      Step 1: Identity & Access — MFA mandatory, OAuth 2.0, JWT tokens (short-lived), conditional access
      Step 2: Authentication — verify every identity, no trust based on IP/location
      Step 3: Authorization — least privilege RBAC, JIT elevation, audit privilege changes
      Step 4: Network — microsegmentation, service-to-service mTLS, firewall deny-by-default
      Step 5: Encryption — TLS 1.2+ in transit, AES-256 at rest, key rotation annually
      Step 6: Monitoring — immutable audit logs, real-time alerts, forensic capability
      Output: Zero-trust architecture diagram + policy matrix (identity/auth/authz/network/encryption/monitoring).

  - name: compliance-audit
    description: "Audit compliance against SOC 2, ISO 27001, HIPAA, PCI-DSS standards"
    invokable: true
    prompt: |
      Audit compliance against selected framework (SOC 2, ISO 27001, HIPAA, PCI-DSS):
      Step 1: Framework mapping — map system to framework controls/requirements
      Step 2: Implementation gaps — identify what's implemented vs. missing
      Step 3: Evidence gaps — identify documentation needed (policies, procedures, audit logs)
      Step 4: Remediation plan — prioritize fixes (critical/high/medium/low)
      Step 5: Timeline — realistic remediation schedule with owners
      Output: Compliance audit report (Control | Status | Gap | Evidence | Remediation | Owner | Deadline).

  - name: pentest-plan
    description: "Plan penetration test — scope, methodology, timeline, reporting"
    invokable: true
    prompt: |
      Create penetration test plan for this system:
      Step 1: Scope — systems in-scope, out-of-scope, excluded tests, success criteria
      Step 2: Rules of Engagement — authorization level, test windows, escalation contacts
      Step 3: Methodology — NIST phases (reconnaissance → scanning → enumeration → exploitation)
      Step 4: Testing checklist — OWASP Top 10 Web/Mobile/API, authentication, authorization, crypto
      Step 5: Reporting — CVSS scoring, proof-of-concept (non-weaponized), remediation steps
      Output: Formal pentest proposal (scope, ROE, timeline, methodology, success criteria, reporting format).

  - name: incident-response
    description: "Create incident response playbook and post-mortem template"
    invokable: true
    prompt: |
      Create incident response playbook for this system:
      Step 1: Severity levels — define Severity 1/2/3 (impact, response time, escalation)
      Step 2: Detection — what to monitor, alert thresholds, triage process
      Step 3: Response flow — declare → diagnose → mitigate → recover → communicate → review
      Step 4: War room setup — communication channels, incident commander, roles, frequency
      Step 5: Post-mortem — blameless template, 5 whys, action items with owners/deadlines
      Output: Complete IR playbook + post-mortem template with examples.

  - name: security-posture
    description: "Assess overall security posture — identify priorities and gaps"
    invokable: true
    prompt: |
      Assess security posture of this system:
      Step 1: Vulnerability inventory — security controls implemented vs. missing
      Step 2: Risk assessment — severity × likelihood matrix, business impact
      Step 3: Threat modeling — identify attack vectors, threat actors, attack paths
      Step 4: Compliance gaps — applicable frameworks (SOC 2, ISO 27001, HIPAA, PCI-DSS)
      Step 5: Improvement roadmap — phased fixes (immediate, 30 days, 90 days, 6 months)
      Output: Security posture report (Risk matrix | Threats | Controls | Gaps | Roadmap).

