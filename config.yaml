      Step 2: Sorting — clickable headers, aria-sort states (ascending/descending), sorted data output
      Step 3: Filtering — search input (debounced 300ms), filter dropdowns, active filter display, reset button
      Step 4: Pagination — previous/next buttons, page numbers, items per page selector, result count
      Step 5: Performance — virtualization for > 500 rows (react-window), responsive mobile layout (cards/scroll)
      Output: Complete table component + filtering logic + pagination handler + virtualization setup.

