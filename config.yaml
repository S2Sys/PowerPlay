      Output: Gap table with severity + remediation.

      **Otherwise:**
      Ask: "Is this a [quick vulnerability scan] or [full fix code generation] or [architecture design]?"

  - name: test
    description: "Testing fast-path — routes to unit tests, full suite, or coverage gaps based on scope"
    invokable: true
    prompt: |
      Testing routing for selected code or request.

      Determine scope and execute:

      **If code is small (< 50 lines) or request says "unit test/quick test":**
      Generate xUnit tests with Moq and FluentAssertions.
      Cover: happy path, edge cases, null inputs, exceptions.
      Pattern: MethodName_Scenario_ExpectedResult.
      AAA comments. Mock all externals. Output: complete test class — no placeholders.

      **If code is large (> 200 lines) or request says "full suite/complete/all tests":**
      Generate complete test suite:
      - Unit: happy path, edge cases, nulls, exceptions
      - Integration tests (if applicable)
      - Boundary and special cases
      Use xUnit + Moq + FluentAssertions. AAA comments. Mock externals. Output: complete test file.

      **If request says "coverage", "gaps", "what's not tested":**
      Gap analysis:
      1. Identify untested methods/branches.
      2. Prioritize by risk (security/data > complexity > frequency).
      3. For top 5 gaps, generate complete test case (AAA pattern).
      Output: Gap analysis table + 5 complete test cases ready to paste.

      **Otherwise:**
      Ask: "Is this a [single class unit test] or [complete test suite] or [coverage gap analysis]?"

  - name: db
    description: "Database fast-path — routes to SQL optimization, schema design, or data modeling"
    invokable: true
    prompt: |
      Database routing for selected code or request.

      Determine content and execute:

      **If request has a stored procedure or specific SQL query:**
      Optimize SQL Server procedure:
      1. SET NOCOUNT ON
      2. BEGIN TRY/CATCH
      3. Replace cursors with set-based ops
      4. CREATE INDEX for missing indexes
      5. Use temp tables for > 10k rows
      6. WITH (NOLOCK) where safe
      7. SARGable WHERE clauses
      Output: optimized procedure + index recommendations + change log.

      **If request has existing schema (CREATE TABLE statements):**
      Schema review:
      1. Normalization (1NF/2NF/3NF violations)
      2. Index recommendations (WHERE/JOIN/ORDER BY columns)
      3. Constraints (NOT NULL, FK, UNIQUE, CHECK)
      4. Naming validation (PascalCase tables/columns, Id PKs)
      5. Soft delete (recommend IsDeleted + DeletedAt if missing)
      Output: corrected CREATE TABLE + index recommendations + migration skeleton.

      **If request is from requirements (describe the feature, no existing schema):**
      Schema design from scratch:
      1. Tables and relationships
      2. Primary/foreign keys
      3. Constraints and indexes
      4. Normalization rationale
      Output: CREATE TABLE statements + index recommendations + design rationale.

      **Otherwise:**
      Ask: "Is this [SQL optimization] or [schema review] or [new schema design]?"

  # ── v3.0.0 Requirements Phase Agents ─────────────────

  - name: requirements-to-specs
    description: "Convert business requirement to complete technical specification (6-step analysis)"
    invokable: true
    prompt: |
      ## PRIOR CONTEXT (optional)
      If the user's input includes a "## HANDOFF BLOCK" section, extract these fields and use them:
      - **Requirement**: the original plain-language requirement (do not re-parse)
      - **REQ-F IDs** / **REQ-NF IDs**: existing IDs — continue numbering from the highest, never re-use
      - **Tech Stack Decisions**: already-agreed choices — do not contradict them
      - **AC IDs**: carry forward in Phase 3/4 without regenerating
      - **Risk Tier** / **Risk IDs** / **Go/No-Go**: carry forward in Phase 4
      - **Open Blockers**: carry forward unless explicitly resolved in this run
      If no HANDOFF BLOCK is present, begin fresh.

      At the end of your output, emit this block:
      ---
      ## HANDOFF BLOCK — Phase 1: Requirements to Specs
      **Requirement**: [one-line original requirement]
      **REQ-F IDs**: [comma-separated, e.g. REQ-F-001, REQ-F-002]
      **REQ-NF IDs**: [comma-separated, e.g. REQ-NF-001, REQ-NF-002]
      **Tech Stack Decisions**: [key decisions, e.g. JWT auth, Dapper, Angular 17 standalone]
      **API Contracts**: [key endpoints, e.g. POST /api/v1/auth/login]
      **AC IDs**: [from Phase 2 if available, else "pending Phase 2"]
      **Risk Tier**: [from Phase 3 if available, else "pending Phase 3"]
      **Risk IDs**: [from Phase 3 if available, else "pending Phase 3"]
      **Go/No-Go**: [from Phase 3 if available, else "pending Phase 3"]
      **Review Verdict**: [from Phase 4 if available, else "pending Phase 4"]
      **Open Blockers**: [list or "None"]
      ---

      **NEXT PHASE**: Copy the HANDOFF BLOCK above and run `/acceptance-criteria` with it as context to generate Gherkin acceptance criteria. Or run `/pp-requirements` to execute all 4 phases at once.

      You are a requirements engineer. Convert a plain-language business requirement into a complete technical specification.

      **6-STEP PROCESS:**

      **Step 1: PARSE**
      Extract from the requirement:
      - Roles involved (who uses this?)
      - Goals (what are they trying to accomplish?)
      - Features (what actions/capabilities?)
      - Constraints (performance, scale, compliance?)
      - Assumptions (what is taken for granted?)
      Output: Bulleted summary of each.

      **Step 2: FUNCTIONAL REQUIREMENTS**
      Write numbered functional requirements (REQ-F-###):
      - Each is a single capability
      - Measurable and testable
      - Uses strong verb: create, retrieve, update, delete, validate, authorize, log
      - Avoid "manage", "handle", "support" (too vague)
      Example: REQ-F-001: System SHALL authorize user access to dashboard based on role (Admin / Manager / ReadOnly)

      **Step 3: NON-FUNCTIONAL REQUIREMENTS**
      Write REQ-NF-### for four categories:
      - Performance: latency, throughput (e.g., "API responds in < 200ms at P95 under 500 concurrent users")
      - Security: auth model, encryption, data classification (e.g., "All PII encrypted at rest with AES-256")
      - Scalability: load targets, horizontal scaling (e.g., "System handles 10× current load (5,000 concurrent users)")
      - Availability: uptime SLA, graceful degradation (e.g., "99.9% uptime SLA; read-only mode when auth unavailable")

      **Step 4: TECHNICAL SPECIFICATION**
      Define HOW the system will work:
      - API endpoint contracts (method, path, request/response schema)
      - Database entities and relationships (if data model needed)
      - System interactions (external APIs, message queues, other services)
      - Apply existing rules from PowerPlay: apply security-guard, dotnet-csharp, angular-rules, database-design patterns
      Example: POST /api/v1/auth/login with { email, password } returns { accessToken, refreshToken, user: { id, role } }

      **Step 5: DESIGN IMPLICATIONS**
      Document what this requirement triggers:
      - Which PowerPlay rules are affected? (e.g., security-guard, api-versioning, performance-budget)
      - Which existing patterns apply? (e.g., repository pattern for data access)
      - What new code is required? (e.g., PasswordValidator service)
      - What existing code must change? (e.g., UserService interface)
      - What architectural decisions are needed? (e.g., JWT vs OAuth 2.0 for auth)

      **Step 6: OPEN QUESTIONS**
      List numbered questions that remain unclear:
      - Question | Stakeholder to answer | Impact if unanswered
      Example: Q1: Should password reset tokens expire after 1 hour or 24 hours? | Product Owner | Security risk if too long, UX pain if too short

      **OUTPUT FORMAT:**
      Deliver a structured specification document with all 6 sections clearly labeled.
      End with: "**DoR Status: READY / NOT READY**" (READY if all questions answered, NOT READY if blockers remain)

