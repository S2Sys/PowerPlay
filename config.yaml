# ╔══════════════════════════════════════════════════════╗
# ║  SMARTWORKZ POWERSTACK — Continue.dev Elite Config   ║
# ║  Cursor-level AI. Windsurf-level agents. Zero cost.  ║
# ╚══════════════════════════════════════════════════════╝
#
#  CAPABILITY MAP:
#  ┌─────────────────┬────────────────────────────────────┐
#  │ Chat / Reason   │ Qwen 3.5 9B, DeepSeek R1 8B        │
#  │ Fast Apply      │ Qwen Coder (KapilDev) maxTok=16384  │
#  │ Autocomplete    │ Qwen Coder — debounce 400ms         │
#  │ Embeddings      │ NVIDIA Nemotron (OpenRouter)        │
#  │ Cloud Fallback  │ GPT-OSS, MiniMax, Gemma4, Qwen3    │
#  │ MCP Tools       │ Git, FileSystem, Playwright, SQLite │
#  │ Rules           │ .NET, Angular, SQL, Performance, etc │
#  │ Prompts         │ /review /quick-fix +13 inline/util   │
#  └─────────────────┴────────────────────────────────────┘

defaultCompletionOptions:
  maxTokens: 4096
  temperature: 0.3

# ─────────────────────────────────────────────────────────
# RULES — system instructions for ALL chat/agent/edit
# Equivalent to Cursor's .cursorrules
# ─────────────────────────────────────────────────────────
rules:
  - name: smartworkz-core
    alwaysApply: true
    rule: |
      You are an expert AI assistant embedded in SmartWorkz Technologies.
      Stack: .NET 8, ASP.NET Core, Angular 17+, SQL Server 2022, Azure DevOps, AWS.
      Always:
        - Use C# 12 features (primary constructors, collection expressions)
        - Prefer async/await with CancellationToken parameters
        - Use ILogger<T>, never Console.Write
        - Angular: standalone components, inject(), OnPush, typed forms
      Never:
        - Leave TODO comments in generated code
        - Use Thread.Sleep — always Task.Delay
        - Expose raw exceptions to API consumers
        - Hardcode secrets or connection strings

  - name: dotnet-rules
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      .NET/C# standards:
      - Controllers: [ApiController] + [Route("api/v1/[controller]")] — no business logic
      - Services: interface + Scoped implementation
      - Repositories: Dapper with parameterised queries only
      - Validation: FluentValidation at controller boundary
      - Errors: ProblemDetails RFC 7807
      - All DB calls must be async with Async suffix
      - Enable nullable reference types (#nullable enable)
      - XML docs required on all public members

  - name: angular-rules
    globs: ["**/*.ts", "**/*.html"]
    alwaysApply: false
    rule: |
      Angular 17+ standards:
      - Standalone components only — no NgModules for new code
      - inject() not constructor injection
      - ChangeDetectionStrategy.OnPush everywhere
      - Signals preferred over BehaviorSubject for local state
      - DevExtreme: DxDataGrid/DxTreeList — explicit column definitions always
      - Typed reactive forms: FormGroup<T>
      - HTTP: typed responses, takeUntilDestroyed()
      - Routes: lazy-loaded with loadComponent

  - name: sql-rules
    globs: ["**/*.sql"]
    alwaysApply: false
    rule: |
      SQL Server standards:
      - SET NOCOUNT ON at top of every stored procedure
      - Parameterised queries only — never string concatenation
      - WITH (NOLOCK) on read-heavy SELECTs
      - Temp tables over CTEs for > 10k rows
      - BEGIN TRY / BEGIN CATCH on all procedures
      - Set-based operations over cursors always
      - SARGable WHERE clauses (no functions wrapping columns)

  - name: security-always
    alwaysApply: true
    rule: |
      Security (applied everywhere):
      - Never hardcode secrets, API keys, connection strings
      - Parameterised queries only — flag string concatenation
      - Sanitise all user input before use
      - Flag any code logging passwords, tokens, or PII
      - Angular: use DomSanitizer — never bypass security

  - name: performance-audit
    globs: ["**/*.cs", "**/*.ts", "**/*.sql"]
    alwaysApply: false
    rule: |
      Performance standards:
      - SQL: Avoid N+1 queries, SELECT specific columns, add indexes, parameterised only
      - C#: Use async/await, minimize allocations, use Span<T> for perf-critical code
      - TypeScript: Lazy-load modules, OnPush change detection, signals over subscriptions
      - General: Profile before optimizing, use benchmarks, avoid premature optimization

  - name: memory-management
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      Memory management standards:
      - using statement for all IDisposable, IAsyncDisposable
      - Unsubscribe from events in Dispose or use weak event pattern
      - No circular references or event handler leaks
      - WeakReference for caches, not strong references
      - Profile for memory leaks: unregistered event handlers, unreleased resources

  - name: async-best-practices
    globs: ["**/*.cs", "**/*.ts"]
    alwaysApply: false
    rule: |
      Async/await standards:
      - Never use .Result or .Wait() — always await
      - CancellationToken on all async methods
      - ConfigureAwait(false) in libraries (C#)
      - No async/await in constructors — use factory or separate Init method
      - Never fire-and-forget: if you Task.Run, always await or .ContinueWith() error handling

  - name: error-handling-advanced
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      Error handling standards:
      - Custom exception hierarchy — never throw base Exception
      - HTTP: ProblemDetails RFC 7807 format for errors
      - Structured logging: correlation IDs, context, severity
      - Polly for resilience: retry policies, circuit breakers, timeouts
      - Never expose raw stack traces to API clients
      - Log with ILogger<T>, never Console — include context

# ─────────────────────────────────────────────────────────
# MODELS
# ─────────────────────────────────────────────────────────
models:
  # ── Local Chat — Dhoni GPU ─────────────────────────────

  - name: Qwen 3.5 9B [Local Chat]
    provider: openai
    model: dhoni-qwen
    apiBase: http://rohit:4000/v1
    apiKey: ${DHONI_API_KEY}
    roles: [chat]
    capabilities: [tool_use]
    chatOptions:
      baseSystemMessage: |
        Senior .NET/Angular architect. Be concise. Use code blocks.
        Never repeat questions back. Get straight to the solution.
      baseAgentSystemMessage: |
        Autonomous coding agent. Think step-by-step. Use tools to read
        files before editing. Verify logic before finishing.
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.3

  - name: DeepSeek R1 8B [Reasoning]
    provider: openai
    model: dhoni-deepseek
    apiBase: http://rohit:4000/v1
    apiKey: ${DHONI_API_KEY}
    roles: [chat]
    capabilities: [tool_use]
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.1

  - name: Phi4 Mini [Fast]
    provider: openai
    model: dhoni-phi
    apiBase: http://rohit:4000/v1
    apiKey: ${DHONI_API_KEY}
    roles: [chat]
    defaultCompletionOptions:
      maxTokens: 2048
      temperature: 0.4

  # ── Fast Apply — KapilDev GPU ──────────────────────────
  # CRITICAL FIX: maxTokens=16384 prevents mid-file truncation
  # temperature=0.05 prevents hallucinated code deletion

  - name: Qwen Coder [Apply]
    provider: openai
    model: kapil-qwen-coder
    apiBase: http://rohit:4000/v1
    apiKey: ${DHONI_API_KEY}
    roles: [apply, edit]
    defaultCompletionOptions:
      maxTokens: 16384
      temperature: 0.05

  - name: DeepSeek Coder 6.7B [Edit]
    provider: openai
    model: kapil-deepseek-coder
    apiBase: http://rohit:4000/v1
    apiKey: ${DHONI_API_KEY}
    roles: [edit, chat]
    defaultCompletionOptions:
      maxTokens: 16384
      temperature: 0.05

  # ── Cloud Fallback — OpenRouter Free ──────────────────

  - name: GPT OSS 120B [Cloud]
    provider: openai
    model: openai/gpt-oss-120b:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    roles: [chat]
    capabilities: [tool_use]
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.3

  - name: MiniMax M2.5 [Cloud]
    provider: openai
    model: minimax/minimax-m2.5:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    roles: [chat]
    defaultCompletionOptions:
      maxTokens: 4096
      temperature: 0.7

  - name: Qwen3 Coder [Cloud Edit]
    provider: openai
    model: qwen/qwen3-coder:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    roles: [chat, edit]
    defaultCompletionOptions:
      maxTokens: 16384
      temperature: 0.05

  - name: Gemma 4 26B [Cloud]
    provider: openai
    model: google/gemma-4-26b-a4b-it:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    roles: [chat]
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.3

  # ── Embeddings ─────────────────────────────────────────

  - name: NVIDIA Nemotron Embed
    provider: openai
    model: llama-nemotron-embed-vl-1b-v2
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    roles: [embed]

# ─────────────────────────────────────────────────────────
# TAB AUTOCOMPLETE — explicit top-level required v0.9+
# ─────────────────────────────────────────────────────────
tabAutocompleteModel:
  provider: openai
  model: kapil-qwen-coder
  apiBase: http://rohit:4000/v1
  apiKey: ${DHONI_API_KEY}

tabAutocompleteOptions:
  debounceDelay: 400            # Prevents mid-block interruption
  maxPromptTokens: 1500
  prefixPercentage: 0.75
  multilineCompletions: "auto"
  useCache: true
  useOtherFiles: true           # Cross-file context like Copilot

# ─────────────────────────────────────────────────────────
# EMBEDDINGS — explicit top-level required
# ─────────────────────────────────────────────────────────
embeddingsProvider:
  provider: openai
  model: llama-nemotron-embed-vl-1b-v2
  apiBase: https://openrouter.ai/api/v1
  apiKey: ${OPENROUTER_API_KEY}

# ─────────────────────────────────────────────────────────
# MCP SERVERS — Agent mode tools (Cursor/Windsurf-equivalent)
# Only active in Agent mode
# ─────────────────────────────────────────────────────────
mcpServers:
  # Git — read log, diff, blame, branch info
  - name: Git
    type: stdio
    command: uvx
    args: [mcp-server-git, --repository, .]

  # File System — read/write/create files autonomously
  - name: FileSystem
    type: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]

  # Continue Docs — search Continue documentation from chat
  - name: Continue Docs
    uses: continuedev/continue-docs-mcp

  # SQLite — query local dev databases (ExamPrep, SmartWorkz dev)
  - name: SQLite Dev DB
    type: stdio
    command: npx
    args: ["-y", "mcp-sqlite", "./dev.db"]

  # Playwright — browser agent: scrape docs, test UI, fill forms
  - name: Playwright Browser
    type: stdio
    command: npx
    args: ["@playwright/mcp@latest"]

  # Azure DevOps — uncomment with your PAT when needed
  # - name: Azure DevOps
  #   type: stdio
  #   command: npx
  #   args: ["-y", "azure-devops-mcp"]
  #   env:
  #     AZURE_DEVOPS_ORG_URL: "https://dev.azure.com/your-org"
  #     AZURE_DEVOPS_TOKEN: "your-pat-here"

