  # ── v3.6.0 Design & Messaging Patterns Phase 1-3 COMPLETE ────────

  - name: design-patterns-guide
    description: "GoF design patterns reference and application guide"
    invokable: true
    prompt: |
      Design patterns reference for this context.

      **Creational patterns** (object creation):
      - **Singleton**: One instance (logger, config). Problem: thread-safety, testing. Use: static field + lock, or lazy<T>.
      - **Factory**: Create objects without coupling. Problem: many subclasses. Use: return interface, caller doesn't know concrete type.
      - **Builder**: Complex objects step-by-step. Problem: telescoping constructors. Use: fluent builder pattern, separate builder class.
      - **Abstract Factory**: Family of related objects. Problem: multiple factories to manage. Use: interface with methods per type.
      - **Prototype**: Clone objects. Problem: deep vs shallow copy complexity. Use: ICloneable (C#), clone() (Java).
      - **Object Pool**: Reuse expensive objects. Problem: state management, concurrency. Use: blocking queue, checkout/checkin.

      **Structural patterns** (object composition):
      - **Adapter**: Convert one interface to another. Problem: inheritance vs composition trade-off. Use: wrapper class implements target interface.
      - **Bridge**: Decouple abstraction from implementation. Problem: over-engineering for simple cases. Use: when both vary independently.
      - **Composite**: Tree of objects as single object. Problem: type safety. Use: recursive composition with composite interface.
      - **Decorator**: Add behavior to object dynamically. Problem: order matters, complexity. Use: wrapper around interface, delegation.
      - **Facade**: Simplified interface to subsystem. Problem: hidden complexity. Use: one class exposes clean API to complex system.
      - **Flyweight**: Share common data to save memory. Problem: thread-safety, immutability. Use: immutable shared objects + factory.
      - **Proxy**: Control access to another object. Problem: indirection overhead. Use: lazy loading, access control, caching.

      **Behavioral patterns** (object interaction):
      - **Chain of Responsibility**: Pass request along chain. Problem: request may go unhandled. Use: middleware, handler interface.
      - **Command**: Encapsulate request as object. Problem: command object overhead. Use: queue operations, undo/redo, event sourcing.
      - **Iterator**: Access elements sequentially. Problem: hidden internal structure. Use: IEnumerable<T> (C#), Iterator interface.
      - **Mediator**: Centralize complex communication. Problem: mediator becomes bottleneck. Use: event bus, message broker.
      - **Memento**: Capture and restore state. Problem: memory overhead, privacy. Use: serialization, snapshots, undo.
      - **State**: Alter behavior based on internal state. Problem: many state classes. Use: state interface + concrete implementations, context holds current state.
      - **Template Method**: Define algorithm skeleton, subclasses fill in steps. Problem: inheritance coupling. Use: abstract method, concrete steps.
      - **Visitor**: Add operations without modifying element classes. Problem: coupling, new elements require visitor update. Use: double dispatch pattern.
      - **Interpreter**: Define language grammar and interpretation. Problem: complex, rarely needed. Use: parse tree, visitor pattern.
      - **Observer**: Notify multiple objects of state change. Problem: tight coupling, memory leaks. Use: event, delegate, weak references.

      **When to apply**:
      - For MONDAY (architecture/design phase): Choose patterns during class design, not during implementation
      - For code REVIEW: Suggest patterns to refactor complex code after it's written
      - For REFACTORING: Use patterns to untangle tight coupling or reduce duplication
      - Never: Over-engineer simple code. Use patterns only when problem is clear

      **Gotchas**:
      - Singleton: Use dependency injection instead (easier to test)
      - Adapter: Don't use when refactoring—fix the interface instead
      - Proxy: Lazy loading should measure actual cost first
      - State: Don't create state per request—reuse state instances

  - name: saga-pattern
    description: "Saga pattern for distributed transactions — orchestration vs choreography"
    invokable: true
    prompt: |
      Saga pattern for managing distributed transactions across services.

      **Problem**: Monolithic ACID transactions don't work across services. Need consistency without locking.

      **Two approaches**:

      **ORCHESTRATION (central coordinator)**:
      - One service orchestrates the saga (Order Service)
      - Calls Service B → if ok, calls Service C → if ok, commits
      - If step fails, orchestrator triggers compensating transactions in reverse
      - Example: Order → Reserve Inventory → Charge Payment → Ship. Fail at payment? Refund reservation.
      - Pros: Clear flow, centralized logic, easy to see saga definition
      - Cons: Orchestrator becomes bottleneck, tight coupling, harder to scale

      **CHOREOGRAPHY (event-driven, decentralized)**:
      - Service A publishes "OrderCreated" event
      - Service B subscribes, reserves inventory, publishes "InventoryReserved"
      - Service C subscribes, charges payment, publishes "PaymentCharged"
      - If payment fails, Service C publishes "PaymentFailed" → Service B compensates
      - Pros: Loose coupling, scales easier, services are autonomous
      - Cons: Hard to follow saga logic (events scattered), debugging complex, eventual consistency

      **Compensation pattern**:
      - Each forward step has a compensating transaction
      - Reserve inventory → compensation: Release inventory
      - Charge payment → compensation: Refund payment
      - Compensations execute in reverse order

      **Idempotency is CRITICAL**:
      - Saga step may be retried due to failure/timeout
      - Each step must be idempotent (running twice = running once)
      - Use unique saga ID, step counter, track "step X already completed"

      **When to use**:
      - TUESDAY (queueing, distributed workflows): Orchestration for simple orders (Order → Payment → Inventory)
      - WEDNESDAY (workflows): Choreography for complex, event-driven architectures (microservices with many services)

      **Avoid**:
      - Nested sagas (saga calling saga) — flatten to single saga
      - Mixing orchestration + choreography in same saga (confusing)
      - Forgetting idempotency keys (retries cause duplication)

  - name: pub-sub-messaging
    description: "Pub/Sub messaging pattern — Event Bus, Topics, Event Source, Subscribers"
    invokable: true
    prompt: |
      Publish-Subscribe messaging for event-driven architecture.

      **Architecture**:
      - Publisher: Publishes event to topic (no knowledge of subscribers)
      - Topic/Channel: Event storage, multiple subscribers per topic
      - Subscriber: Listens to topic, processes events asynchronously
      - Message Broker: Kafka, RabbitMQ, Azure Service Bus, AWS SNS/SQS

      **Key decisions**:
      - **Topic naming**: `order.created`, `payment.processed`, `inventory.reserved`
      - **Payload**: Include ID + timestamp + version (break if schema changes)
      - **Retry**: Exponential backoff (1s, 2s, 4s, 8s, max 5 attempts)
      - **Dead Letter Queue**: Failed messages after retries → DLQ for investigation
      - **Ordering**: Some brokers guarantee per-partition (Kafka), some don't (RabbitMQ fanout)

      **Example (.NET)**:
      ```
      // Publish
      public interface IEventPublisher { Task PublishAsync<T>(T @event); }
      await _publisher.PublishAsync(new OrderCreatedEvent { OrderId = 123, Total = 99.99m });

      // Subscribe
      public class OrderCreatedEventHandler : IEventHandler<OrderCreatedEvent>
      {
        public async Task HandleAsync(OrderCreatedEvent @event) => ...
      }
      ```

      **Comparison to Point-to-Point**:
      - Pub/Sub: Multiple subscribers (one event, many handlers) → loose coupling
      - Point-to-Point: Single consumer (queue, load-balanced) → work distribution

      **When to use**:
      - WEDNESDAY (workflows): Multi-step workflows (Order → Reserve → Ship)
      - FRIDAY (event sourcing): Event log is source of truth
      - Generally: Event-driven architecture, loosely-coupled services

      **Gotchas**:
      - Subscriber goes offline → may miss events. Solution: persistent topic with replay
      - Event schema change → subscribers break. Solution: version events, handle multiple versions
      - Duplicate event processing → chaos. Solution: idempotency keys, deduplication

  - name: point-to-point-messaging
    description: "Point-to-Point messaging — Queues, load balancing, work distribution"
    invokable: true
    prompt: |
      Point-to-Point messaging for work distribution across workers.

      **Architecture**:
      - Sender: Places message on queue
      - Queue: FIFO (or priority-based), single consumer at a time
      - Consumer: Picks up message, processes, acknowledges (ack)
      - Load balancing: Multiple consumers pull from same queue (work sharing)

      **Key components**:
      - **Queue**: FIFO or priority (urgent messages first)
      - **Message expiration (TTL)**: Message deleted if not processed in X seconds
      - **Acknowledgment**: Consumer acks after successful processing. If crashed before ack, message requeues
      - **Dead Letter Queue (DLQ)**: Messages that failed N retries go here
      - **Priority**: High/Normal/Low — system processes high-priority first

      **Example (.NET)**:
      ```
      // Send
      await _queue.SendAsync(new ProcessInvoiceJob { InvoiceId = 456 });

      // Receive (consumer)
      var job = await _queue.ReceiveAsync();
      try {
        await ProcessInvoiceAsync(job);
        await job.AcknowledgeAsync();
      } catch {
        // Don't ack — message requeues for retry
      }
      ```

      **Priority queue example**:
      ```
      Priority.High → process immediately
      Priority.Normal → queue after high
      Priority.Low → process last
      ```

      **When to use**:
      - TUESDAY (queueing/jobs): Background job processing (invoicing, reports, emails)
      - Generally: Long-running tasks, work distribution, rate limiting

      **Comparison to Pub/Sub**:
      - Point-to-Point: Single consumer wins the message → work distribution
      - Pub/Sub: All subscribers get the message → event notification

      **Gotchas**:
      - Consumer crashes mid-processing (no ack) → message requeues, processed twice. Solution: idempotency
      - Queue grows unbounded → memory pressure. Solution: auto-scaling consumers, priority, TTL
      - No message ordering → business logic breaks. Solution: partition by key (invoiceId), process per partition serially

  - name: request-reply-messaging
    description: "Request-Reply messaging — Synchronous over async, correlation IDs, temporal coupling"
    invokable: true
    prompt: |
      Request-Reply messaging for synchronous-style communication over async transport.

      **Problem**: Microservices need synchronous request-response but want async reliability (no direct HTTP).

      **Solution**:
      - Requestor sends request to queue with `ReplyTo` address + correlation ID
      - Responder receives, processes, sends response to `ReplyTo` address with same correlation ID
      - Requestor waits for response (with timeout) matching correlation ID
      - Simulates synchronous call but uses async infrastructure

      **Key elements**:
      - **Correlation ID**: Unique ID linking request ↔ response
      - **Reply-To queue**: Where responder sends response
      - **Timeout**: Requestor waits max X seconds for response
      - **Message versioning**: Requests/responses evolve independently

      **Example (.NET)**:
      ```
      // Request
      var correlationId = Guid.NewGuid();
      var request = new GetCustomerRequest { CustomerId = 789, CorrelationId = correlationId };
      await _requestQueue.SendAsync(request);

      // Wait for response
      var response = await _replyQueue.WaitForAsync(correlationId, timeout: TimeSpan.FromSeconds(30));
      ```

      **Responder**:
      ```
      var request = await _queue.ReceiveAsync();
      var response = new GetCustomerResponse { CustomerId = 789, Data = ... };
      await _replyQueue.SendAsync(response, correlationId: request.CorrelationId);
      ```

      **When to use**:
      - WEDNESDAY (workflows): Service A must wait for Service B result before proceeding
      - When temporal coupling is necessary (can't be eventually consistent)
      - Avoid when: Services can work independently → use Pub/Sub instead

      **Gotchas**:
      - Requestor crashes before reading response → response wasted
      - Responder never sends response → requestor hangs (hence timeout)
      - Clock skew (responder clock wrong) → correlation ID logic breaks
      - Circular requests (A asks B, B asks A) → deadlock

  - name: eventual-consistency
    description: "Eventual consistency pattern — Accept stale data, propagate updates asynchronously"
    invokable: true
    prompt: |
      Eventual consistency for distributed systems with async updates.

      **Problem**: Strong consistency (ACID) requires coordination. Slow, tight-coupling. Need to scale.

      **Solution**: Accept that data is temporarily stale. Updates propagate asynchronously.

      **Example**:
      - User updates profile in Service A
      - Service A updates local database immediately
      - Service A publishes "ProfileUpdated" event
      - Service B subscribes, updates its copy (async, eventual)
      - Query Service B within 1 second? May see old data. Query after 5 seconds? Consistent.

      **Handling stale reads**:
      - Display "last updated 3 seconds ago" to users
      - Redirect writes to authoritative source (Service A)
      - Use version numbers, timestamps to detect staleness
      - Refresh after mutation (user updates profile → reload from Service A)

      **Conflict resolution**:
      - Last-write-wins: Later timestamp wins (simplest, can lose data)
      - Causal ordering: Track causality, merge intelligently
      - Application-specific: E.g., product inventory: take minimum of all replicas

      **When to use**:
      - THURSDAY (caching, state sync): Cache updates propagate slowly
      - FRIDAY (event sourcing): Event log is source of truth
      - User profiles, inventory counts (loosely consistent OK)

      **When NOT to use**:
      - Financial transactions (balance must be accurate)
      - Constraints (can't oversell limited stock)

      **Acceptance criteria**:
      - Define "eventually consistent within X seconds"
      - Show users staleness indicator
      - Have conflict resolution strategy documented
      - Test with network partitions

      **Gotchas**:
      - Forgetting to publish updates → replicas diverge forever
      - Timeout without waiting for consensus → different systems see different "consistent" state
      - No version tracking → impossible to detect staleness

  # ── v3.6.0 Design & Messaging Patterns Phase 2 ─────────────────

  - name: decorator-pattern
    description: "Decorator pattern — Add behavior dynamically without inheritance"
    invokable: true
    prompt: |
      Decorator pattern for dynamic behavior modification.

      **Problem**: Inheritance creates rigid hierarchies. Need to add behavior at runtime, combine behaviors.

      **Solution**: Decorator wraps original object, delegates to it, adds behavior before/after.

      **Structure**:
      ```
      IComponent (interface)
      ├── ConcreteComponent (original)
      └── Decorator (implements IComponent, wraps IComponent)
          ├── ConcreteDecoratorA (add behavior A)
          ├── ConcreteDecoratorB (add behavior B)
          └── Nested: DecoratorA(DecoratorB(ConcreteComponent))
      ```

      **Example (.NET)**:
      ```
      public interface IDataSource { string Read(); }

      public class FileDataSource : IDataSource {
        public string Read() => File.ReadAllText("file.txt");
      }

      public class EncryptionDecorator : IDataSource {
        private IDataSource _inner;
        public EncryptionDecorator(IDataSource inner) => _inner = inner;
        public string Read() => Decrypt(_inner.Read());
      }

      public class CompressionDecorator : IDataSource {
        private IDataSource _inner;
        public CompressionDecorator(IDataSource inner) => _inner = inner;
        public string Read() => Decompress(_inner.Read());
      }

      // Usage
      var source = new FileDataSource();
      var encrypted = new EncryptionDecorator(source);
      var compressed = new CompressionDecorator(encrypted);
      var data = compressed.Read(); // Decompress(Decrypt(FileRead()))
      ```

      **Real-world**:
      - Stream wrappers (GZipStream, DeflateStream wrapping FileStream)
      - HTTP middleware (auth → logging → compression)
      - UI components (Button with tooltip, border, shadow)

      **When to use**:
      - Adding/removing behavior at runtime
      - Multiple behaviors that can combine (not inheritance hierarchy)
      - Single Responsibility: Decorator only adds one responsibility

      **When NOT to use**:
      - Simple inheritance works (don't over-engineer)
      - Behavior is fixed at compile-time
      - Decorator chain gets too long (hard to follow)

      **Gotchas**:
      - Performance: Each decorator adds call overhead (v.s. single implementation)
      - Ordering: Decorator order matters (encryption then compression ≠ compression then encryption)
      - Type checking: `source is EncryptionDecorator` breaks with layers of decorators
      - Stack overflow: Circular decoration (A decorates B, B decorates A)

  - name: proxy-pattern
    description: "Proxy pattern — Control access to object (lazy loading, caching, access control)"
    invokable: true
    prompt: |
      Proxy pattern for controlled access, lazy loading, and caching.

      **Problem**: Need to control when/how object is accessed. Cost: expensive to create, access control needed.

      **Solution**: Proxy object acts like original, but controls access (lazy create, cache, auth).

      **Types of proxies**:

      **1. LAZY PROXY** (Lazy Loading):
      ```
      public interface IExpensiveResource { string GetData(); }

      public class ExpensiveService : IExpensiveResource {
        private Database _db = new(); // Expensive!
        public string GetData() => _db.Query(...);
      }

      public class LazyProxy : IExpensiveResource {
        private ExpensiveService _inner;
        public string GetData() {
          _inner ??= new ExpensiveService(); // Create only on first use
          return _inner.GetData();
        }
      }
      ```
      Use: Database connections, large objects, remote resources.

      **2. CACHING PROXY**:
      ```
      public class CachingProxy : IDataSource {
        private Dictionary<string, string> _cache = new();
        private IDataSource _inner;

        public string Read(string key) {
          if (!_cache.TryGetValue(key, out var value)) {
            value = _inner.Read(key);
            _cache[key] = value;
          }
          return value;
        }
      }
      ```
      Use: Expensive computations, API calls, queries.

      **3. ACCESS CONTROL PROXY**:
      ```
      public class SecurityProxy : IAdminService {
        private IAdminService _inner;
        private User _currentUser;

        public void DeleteUser(int id) {
          if (!_currentUser.IsAdmin) throw new UnauthorizedAccessException();
          _inner.DeleteUser(id);
        }
      }
      ```
      Use: Authorization, role checks, audit logging.

      **4. LOGGING PROXY**:
      ```
      public class LoggingProxy : IRepository {
        public User GetById(int id) {
          _logger.Info($"GetById({id})");
          var result = _inner.GetById(id);
          _logger.Info($"GetById({id}) = {result}");
          return result;
        }
      }
      ```

      **Proxy vs Decorator**:
      - Proxy: Controls access (lazy, cache, auth, logging) — same interface
      - Decorator: Adds responsibility (encryption, compression) — wraps interface

      **When to use**:
      - THURSDAY (caching): Lazy loading + caching + staleness handling
      - Access control: Auth before executing operations
      - Logging/monitoring: Audit who called what and when

      **Gotchas**:
      - Cache invalidation: Hard to know when cache is stale
      - Proxy transparency: Exceptions, timeouts not handled same as original
      - Double lookup: Check cache + miss → call inner (race condition in multi-threaded)
      - Memory leaks: Cache grows unbounded (need TTL or LRU eviction)

  - name: idempotency
    description: "Idempotency pattern — Safe retries, deduplication, exactly-once semantics"
    invokable: true
    prompt: |
      Idempotency pattern for safe request retries without duplication.

      **Problem**: Network request fails → retry → succeeds. But was it processed before? If yes, now we have duplicate.

      **Solution**: Mark each request with unique ID. Server checks "already processed?" before executing.

      **Implementation**:

      **Step 1: Generate Idempotency Key**:
      ```
      // Client side
      string idempotencyKey = Guid.NewGuid().ToString();
      var request = new CreateOrderRequest { OrderId = 123, Total = 99.99m };
      await client.CreateOrderAsync(request, idempotencyKey: idempotencyKey);

      // If fails, retry with SAME idempotencyKey
      await client.CreateOrderAsync(request, idempotencyKey: idempotencyKey); // Safe!
      ```

      **Step 2: Check Idempotency Store**:
      ```
      public class CreateOrderHandler {
        private IIdempotencyStore _store;

        public async Task<OrderResponse> HandleAsync(CreateOrderRequest req, string idempotencyKey) {
          // Check if already processed
          var cachedResponse = await _store.GetAsync(idempotencyKey);
          if (cachedResponse != null) {
            return cachedResponse; // Return cached result
          }

          // Process request
          var order = await CreateOrderAsync(req);

          // Store result
          await _store.SetAsync(idempotencyKey, order);
          return order;
        }
      }
      ```

      **Step 3: Clean Old Keys**:
      - TTL: Remove keys older than 24 hours (or business window)
      - Reason: Prevent unbounded memory growth in idempotency store

      **Storage options**:
      - Redis: Fast, in-memory, auto TTL support
      - Database: Persistent, survives restarts
      - Distributed cache: Redis + DB for durability

      **Scope of key**:
      - Per-user per-endpoint: Same user, same endpoint, same key = same result
      - Global: One key across all endpoints (dangerous)
      - Idempotency-Key header: Client provides, server respects (HTTP standard)

      **When to use**:
      - TUESDAY (queueing): Each job must be idempotent (process 1000x = process 1x)
      - WEDNESDAY (workflows): Saga steps must be idempotent
      - Critical operations: Payments, order creation, account changes
      - Distributed systems: Network failures → retries

      **Gotchas**:
      - Forgetting to check key → duplicates anyway
      - Key expires too soon → retry processed as new request
      - Non-deterministic results: Same input, different output each time → idempotency breaks
      - Concurrent retries: Both requests see "not processed" → both execute (race condition)
        Solution: Use database with unique constraint on idempotencyKey

  - name: dead-letter-queue
    description: "Dead Letter Queue — Failed message handling, investigation, replay"
    invokable: true
    prompt: |
      Dead Letter Queue (DLQ) pattern for handling messages that fail permanently.

      **Problem**: Message fails processing → retry 5 times → still fails. What now?

      **Solution**: Move failed message to Dead Letter Queue for investigation and replay.

      **Architecture**:
      ```
      Message Queue → Consumer
                  ↓ (fail 5x)
              Dead Letter Queue → DLQ Handler (investigate, alert, replay)
      ```

      **Failure scenarios**:
      1. **Poison message**: Invalid format, malformed JSON, schema mismatch
      2. **Transient failure**: Database down, service timeout (should retry, not DLQ)
      3. **Permanent failure**: Business logic error (customer not found, insufficient funds)

      **DLQ Strategy**:

      **Step 1: Retry Policy**:
      ```
      Attempt 1: immediate
      Attempt 2: wait 1s
      Attempt 3: wait 2s
      Attempt 4: wait 4s
      Attempt 5: wait 8s
      Attempt 6: → DLQ
      ```
      Exponential backoff gives transient failures time to recover.

      **Step 2: DLQ Handler**:
      ```
      public class DLQHandler {
        public async Task HandleAsync(Message msg) {
          // Log for investigation
          _logger.Error($"DLQ: {msg.Id} - {msg.Body}", msg.Exception);

          // Alert team
          await _alerting.SendAsync($"DLQ message: {msg.Id}");

          // Store in database for investigation
          await _dlqStore.SaveAsync(new DLQRecord {
            MessageId = msg.Id,
            Payload = msg.Body,
            Error = msg.Exception,
            Timestamp = DateTime.UtcNow,
            Status = DLQStatus.Pending // For manual replay
          });
        }
      }
      ```

      **Step 3: Manual Replay**:
      ```
      // Operator investigates → fixes issue → replays
      var dlqMessage = await _dlqStore.GetAsync(messageId);
      await _queue.SendAsync(dlqMessage); // Back to main queue
      await _dlqStore.MarkAsReplayedAsync(messageId);
      ```

      **Message fields for DLQ**:
      ```
      {
        "originalMessageId": "abc-123",
        "attemptNumber": 6,
        "failureReason": "Customer not found: 789",
        "lastException": "EntityNotFoundException",
        "failureTimestamp": "2026-04-10T14:30:00Z",
        "originalPayload": { ... }
      }
      ```

      **When to use**:
      - TUESDAY (queueing): All message processing
      - WEDNESDAY (workflows): Saga step failures
      - Long-running jobs: Reports, invoices, batch operations

      **Monitoring DLQ**:
      - Alert on DLQ depth (> 10 messages → investigate)
      - Track DLQ arrival rate (spike → new bug)
      - Dashboard: DLQ messages by hour, by error type
      - SLO: Process DLQ within 24 hours (manual or auto-replay)

      **Gotchas**:
      - DLQ fills up unbounded → memory pressure
      - No way to replay automatically → stuck forever
      - No logging of why it failed → investigation time
      - Message expires in DLQ → lost forever
      - Duplicate DLQ handling (send same message twice) → must be idempotent

  # ── v3.6.0 Design & Messaging Patterns Phase 3 ─────────────────

  - name: builder-pattern
    description: "Builder pattern — Complex object construction, fluent interface, optional parameters"
    invokable: true
    prompt: |
      Builder pattern for constructing complex objects step-by-step.

      **Problem**: Constructor has many optional parameters. Telescoping constructors ugly. Hard to read intent.

      ```
      // Telescoping constructor — hard to read
      var order = new Order(123, "customer", null, 99.99m, null, null, true, false, null);
      ```

      **Solution**: Builder separates construction from representation. Fluent interface.

      **Implementation**:

      ```
      public class OrderBuilder {
        private int _orderId;
        private string _customer;
        private DateTime _date = DateTime.UtcNow;
        private decimal _total;
        private List<OrderItem> _items = new();
        private bool _isPaid = false;

        public OrderBuilder WithId(int id) { _orderId = id; return this; }
        public OrderBuilder WithCustomer(string name) { _customer = name; return this; }
        public OrderBuilder WithDate(DateTime date) { _date = date; return this; }
        public OrderBuilder WithTotal(decimal amount) { _total = amount; return this; }
        public OrderBuilder AddItem(OrderItem item) { _items.Add(item); return this; }
        public OrderBuilder MarkAsPaid() { _isPaid = true; return this; }

        public Order Build() {
          if (string.IsNullOrEmpty(_customer)) throw new InvalidOperationException("Customer required");
          return new Order(_orderId, _customer, _date, _total, _items, _isPaid);
        }
      }

      // Usage
      var order = new OrderBuilder()
        .WithId(123)
        .WithCustomer("John")
        .WithTotal(99.99m)
        .AddItem(new OrderItem { ... })
        .AddItem(new OrderItem { ... })
        .MarkAsPaid()
        .Build();
      ```

      **C# 12 Record Expressions (Modern)**:
      ```
      // Records with `with` keyword
      var order = new Order(123, "customer", 99.99m) with { IsPaid = true, Status = "Shipped" };
      ```

      **When to use**:
      - MONDAY (architecture): Complex domain objects (Order, Invoice, Request)
      - Many optional parameters
      - Step-by-step construction
      - Validation at build time

      **Gotchas**:
      - Builder creates intermediate objects (memory overhead)
      - Builder state can be reused (reset it to avoid confusion)
      - Validation at build time is good, but catch issues early

  - name: composite-pattern
    description: "Composite pattern — Tree structures, recursive composition, unified interface"
    invokable: true
    prompt: |
      Composite pattern for tree structures and recursive composition.

      **Problem**: Files and folders have different structure (folder contains files OR folders). Need unified interface.

      **Solution**: Composite object can contain leaf objects and other composites. Recursive.

      **Example (File System)**:
      ```
      public abstract class FileSystemItem {
        public string Name { get; }
        public abstract long GetSize();
        public abstract void Display(int indent = 0);
      }

      public class File : FileSystemItem {
        public long Size { get; }
        public override long GetSize() => Size;
        public override void Display(int indent = 0) {
          Console.WriteLine(new string(' ', indent) + Name + " " + Size);
        }
      }

      public class Folder : FileSystemItem {
        private List<FileSystemItem> _children = new();

        public void Add(FileSystemItem item) => _children.Add(item);
        public void Remove(FileSystemItem item) => _children.Remove(item);

        public override long GetSize() => _children.Sum(c => c.GetSize());

        public override void Display(int indent = 0) {
          Console.WriteLine(new string(' ', indent) + Name + "/");
          foreach (var child in _children) {
            child.Display(indent + 2);
          }
        }
      }

      // Usage
      var root = new Folder { Name = "Documents" };
      root.Add(new File { Name = "file1.txt", Size = 1024 });
      var subfolder = new Folder { Name = "subfolder" };
      subfolder.Add(new File { Name = "file2.txt", Size = 2048 });
      root.Add(subfolder);

      root.Display();
      // Documents/
      //   file1.txt 1024
      //   subfolder/
      //     file2.txt 2048

      var totalSize = root.GetSize(); // 3072
      ```

      **Real-world examples**:
      - DOM tree (HTML elements, can contain other elements)
      - Menu system (menu items, submenus)
      - Organizational structure (manager, employees, sub-managers)
      - Permission hierarchies (roles contain permissions)

      **When to use**:
      - MONDAY (architecture): Hierarchical structures
      - Part-whole relationships (trees, folders, org charts)
      - Need to treat leaf and composite same way

      **Gotchas**:
      - Circular references (folder contains itself) → infinite loop
      - Type checking breaks abstraction (`if (item is File)`) → use visitor pattern instead
      - Performance: Recursive operations slow on deep trees

  - name: state-pattern
    description: "State pattern — Behavior varies by internal state, state transitions"
    invokable: true
    prompt: |
      State pattern for objects with behavior that varies by internal state.

      **Problem**: Order has states (Pending → Paid → Shipped → Delivered). Behavior differs per state.

      **Naive approach** (big if/else):
      ```
      public void ProcessOrder(Order order) {
        if (order.Status == OrderStatus.Pending) {
          // Wait for payment
        } else if (order.Status == OrderStatus.Paid) {
          // Ship order
        } else if (order.Status == OrderStatus.Shipped) {
          // Deliver order
        }
      }
      ```
      Problem: Logic scattered, hard to add states, violates Open/Closed principle.

      **State Pattern Solution**:
      ```
      public interface IOrderState {
        void Pay(Order order);
        void Ship(Order order);
        void Deliver(Order order);
      }

      public class PendingState : IOrderState {
        public void Pay(Order order) {
          order.Status = OrderStatus.Paid;
          order.State = new PaidState();
        }
        public void Ship(Order order) => throw new InvalidOperationException("Cannot ship pending order");
        public void Deliver(Order order) => throw new InvalidOperationException("Cannot deliver pending order");
      }

      public class PaidState : IOrderState {
        public void Pay(Order order) => throw new InvalidOperationException("Already paid");
        public void Ship(Order order) {
          order.Status = OrderStatus.Shipped;
          order.State = new ShippedState();
        }
        public void Deliver(Order order) => throw new InvalidOperationException("Not shipped yet");
      }

      public class ShippedState : IOrderState {
        public void Pay(Order order) => throw new InvalidOperationException("Already paid");
        public void Ship(Order order) => throw new InvalidOperationException("Already shipped");
        public void Deliver(Order order) {
          order.Status = OrderStatus.Delivered;
          order.State = new DeliveredState();
        }
      }

      // Order class
      public class Order {
        public IOrderState State { get; set; } = new PendingState();
        public void Pay() => State.Pay(this);
        public void Ship() => State.Ship(this);
        public void Deliver() => State.Deliver(this);
      }

      // Usage
      var order = new Order();
      order.Pay(); // PendingState → PaidState ✓
      order.Ship(); // PaidState → ShippedState ✓
      order.Deliver(); // ShippedState → DeliveredState ✓
      order.Pay(); // DeliveredState.Pay() → throws ✗
      ```

      **Benefits**:
      - Each state in separate class
      - State transitions explicit
      - Invalid transitions raise errors (not silent failures)
      - Easy to add new states (Open/Closed principle)

      **When to use**:
      - WEDNESDAY (workflows): Order/document workflows with clear states
      - Behavior varies by state
      - State transitions are explicit

      **Gotchas**:
      - State explosion: Too many states → too many classes
      - Context and state coupling: State needs to access context (Order) to change state
      - Reusability: States specific to one context (Order state ≠ Payment state)

  - name: event-sourcing
    description: "Event sourcing — Event log as source of truth, state reconstruction, audit trail"
    invokable: true
    prompt: |
      Event sourcing for event-based state reconstruction and audit trails.

      **Problem**: State in database (current order status). But how did we get here? Lost history.

      **Solution**: Store events (what happened), not state. Reconstruct state from events.

      **Core concepts**:

      **1. EVENTS AS SOURCE OF TRUTH**:
      ```
      Event Log (immutable append-only):
      1. OrderCreated(id=123, customer="John", total=99.99)
      2. PaymentProcessed(id=123, amount=99.99)
      3. OrderShipped(id=123, trackingNumber="XYZ123")
      4. OrderDelivered(id=123)

      Current State = Replay all events
      Order { Status = Delivered, Total = 99.99, Shipped = true }
      ```

      **2. SNAPSHOT (Performance optimization)**:
      ```
      Every 100 events, take snapshot:
      Snapshot at event 200: Order { Status = Shipped, ... }

      To get current state:
      Load snapshot 200 → Replay events 201-250 → done
      (not replay from event 1)
      ```

      **3. EVENT STORE**:
      ```
      public class EventStore {
        private List<DomainEvent> _events = new();

        public void Append(DomainEvent @event) {
          _events.Add(@event);
        }

        public IEnumerable<DomainEvent> GetEventsSince(DateTime since) {
          return _events.Where(e => e.Timestamp >= since);
        }

        public Order Reconstruct(int orderId) {
          var orderEvents = _events.Where(e => e.AggregateId == orderId);
          var order = new Order();
          foreach (var @event in orderEvents) {
            order.Apply(@event); // Mutate state based on event
          }
          return order;
        }
      }

      public class Order {
        public int Id { get; private set; }
        public OrderStatus Status { get; private set; }

        public void Apply(DomainEvent @event) {
          switch (@event) {
            case OrderCreated created:
              Id = created.OrderId;
              Status = OrderStatus.Pending;
              break;
            case PaymentProcessed paid:
              Status = OrderStatus.Paid;
              break;
            case OrderShipped shipped:
              Status = OrderStatus.Shipped;
              break;
          }
        }
      }
      ```

      **Benefits**:
      - **Audit trail**: Complete history of what happened
      - **Time travel**: Reconstruct state at any point in time
      - **Debugging**: See exact sequence of events
      - **Compliance**: Immutable log for regulations (PCI, HIPAA)
      - **Reprocessing**: Run new business logic on old events

      **When to use**:
      - FRIDAY (event sourcing): Financial transactions, orders, workflows
      - Compliance/audit required (must track all changes)
      - Temporal queries ("what was order status 2 hours ago?")

      **Storage**:
      - Event Store (specialized): EventStoreDB, Axon Framework
      - Append-only table in database: Table(EventId, AggregateId, EventType, Payload, Timestamp)
      - Message broker: Kafka topic (immutable log)

      **Gotchas**:
      - Event schema evolution: Events change over time → versioning
      - Eventual consistency: State lags events (cache invalidation problem)
      - Query complexity: Can't just `SELECT * WHERE Status = 'Shipped'` → must replay events
      - Storage: Event log grows unbounded (snapshot/archiving needed)
      - Distributed transactions: Multiple aggregates → saga pattern

  - name: choreography-vs-orchestration
    description: "Choreography vs Orchestration — Decision framework for distributed workflows"
    invokable: true
    prompt: |
      Decision framework for choosing choreography vs orchestration in distributed systems.

      **ORCHESTRATION (Centralized Coordinator)**

      **Flow**:
      ```
      Order Service (Orchestrator)
          ↓ commands
      → Inventory Service (reserve)
          ↓ reply
      → Payment Service (charge)
          ↓ reply
      → Shipping Service (ship)
          ↓ reply
      Done or Compensate
      ```

      **Characteristics**:
      - Central service coordinates all steps
      - Service A calls B, B calls C, C calls D
      - Synchronous or async via point-to-point messaging
      - Easy to see flow (just one orchestrator)
      - Tight coupling: Orchestrator knows all services

      **When to use**:
      - Simple workflows (< 5 steps)
      - Clear linear flow (Order → Payment → Ship)
      - One service owns the process
      - Debugging is priority (flow is visible)

      **Gotchas**:
      - Orchestrator becomes bottleneck (high throughput → scales hard)
      - Tight coupling (orchestrator changes → all services affected)
      - Retry logic in orchestrator (complex, error-prone)
      - Hard to scale horizontally (orchestrator is single point)

      **Example**:
      ```
      public class OrderOrchestrator {
        public async Task ProcessOrderAsync(Order order) {
          await _inventory.ReserveAsync(order.Items);
          try {
            await _payment.ChargeAsync(order.Total);
          } catch {
            await _inventory.ReleaseAsync(order.Items); // Compensate
            throw;
          }
          await _shipping.ShipAsync(order);
        }
      }
      ```

      **CHOREOGRAPHY (Event-Driven, Decentralized)**

      **Flow**:
      ```
      Order Service publishes OrderCreated
      ↓
      Inventory Service subscribes, reserves, publishes InventoryReserved
      ↓
      Payment Service subscribes, charges, publishes PaymentProcessed
      ↓
      Shipping Service subscribes, ships, publishes OrderShipped
      ```

      **Characteristics**:
      - No central coordinator
      - Services emit events
      - Other services subscribe and react
      - Asynchronous via pub/sub
      - Hard to follow flow (events scattered)
      - Loose coupling: Services don't know about each other

      **When to use**:
      - Complex workflows (> 5 steps, many branches)
      - Multiple systems involved independently
      - Loose coupling is priority
      - Scale is priority (no central bottleneck)
      - Event-driven architecture already present

      **Gotchas**:
      - Saga logic scattered across services (hard to debug)
      - Concurrent event processing (ordering issues)
      - Eventual consistency (state eventually catches up)
      - Dead Letter Queue needed (event processing failures)

      **Example**:
      ```
      // Order Service
      public class CreateOrderHandler {
        public async Task HandleAsync(CreateOrderCommand cmd) {
          var order = Order.Create(cmd);
          await _orderRepo.SaveAsync(order);
          await _eventBus.PublishAsync(new OrderCreatedEvent { OrderId = order.Id });
        }
      }

      // Inventory Service
      public class OrderCreatedEventHandler : IEventHandler<OrderCreatedEvent> {
        public async Task HandleAsync(OrderCreatedEvent @event) {
          await _inventory.ReserveAsync(@event.OrderId, ...);
          await _eventBus.PublishAsync(new InventoryReservedEvent { OrderId = @event.OrderId });
        }
      }

      // Payment Service
      public class InventoryReservedEventHandler : IEventHandler<InventoryReservedEvent> {
        public async Task HandleAsync(InventoryReservedEvent @event) {
          await _payment.ChargeAsync(@event.OrderId);
          await _eventBus.PublishAsync(new PaymentProcessedEvent { OrderId = @event.OrderId });
        }
      }
      ```

      **DECISION MATRIX**:

      | Factor | Orchestration | Choreography |
      |--------|---|---|
      | Coupling | Tight | Loose |
      | Visibility | Easy (one place) | Hard (scattered) |
      | Scale | Limited | Better |
      | Debugging | Easy | Hard |
      | Workflows | Simple (<5 steps) | Complex (>5 steps) |
      | Failure handling | Centralized | Distributed |
      | Performance | Fast (sync) | Eventual consistency |
      | Team size | 2-3 services | Many services |

      **HYBRID APPROACH**:
      - Use orchestration for core happy path
      - Use choreography for side effects (logging, notifications)
      - Example: Order orchestrator coordinates critical path; EventBus notifies analytics/email

      **When to choose**:
      - **Tuesday/Wednesday**: Simple orders → Orchestration; Complex microservices → Choreography
      - **Existing event-driven system**: Choreography (already have infrastructure)
      - **New system**: Start with orchestration (simpler), migrate to choreography if needed

  # ── v3.8.0 Product Manager Rules (4) ────────────────────

  - name: product-roadmap
    description: "Define product roadmap — vision, phases, success metrics, stakeholder alignment"
    invokable: true
    prompt: |
      Define a product roadmap:
      Step 1: Vision — north star (1-3 year goal), mission statement
      Step 2: Strategic themes — Q1/Q2/Q3/Q4 priorities aligned to business goals
      Step 3: Features — per phase, with user stories (who, what, why, success criteria)
      Step 4: Dependencies — cross-team blocking dependencies, external constraints
      Step 5: Success metrics — OKRs per phase (user engagement, conversion, NPS, revenue impact)
      Step 6: Stakeholder alignment — exec, marketing, customer success sign-off on sequencing
      Output: Roadmap document (Vision | Themes | Features | Dependencies | Metrics | Sign-off).

  - name: competitive-analysis
    description: "Competitive analysis — market positioning, feature gaps, differentiation strategy"
    invokable: true
    prompt: |
      Competitive analysis for product positioning:
      Step 1: Competitor map — list 3-5 direct competitors, positioning (low-cost, premium, niche)
      Step 2: Feature comparison — your product vs competitors, feature parity, gaps
      Step 3: Differentiation — your unique value (speed, quality, support, price, UX)
      Step 4: Market trends — emerging technologies, user behavior shifts, regulatory changes
      Step 5: Go-to-market strategy — pricing model, distribution, messaging, sales motion
      Step 6: Recommended actions — features to build, partnerships, pricing adjustments
      Output: Competitive analysis table (Competitor | Strengths | Weaknesses | Our Advantage).

  - name: stakeholder-management
    description: "Stakeholder management — identify, prioritize, engagement plan, feedback loops"
    invokable: true
    prompt: |
      Stakeholder management framework:
      Step 1: Identify — all stakeholders (executives, customers, team, partners, regulatory)
      Step 2: Assess — per stakeholder: power (high/low), interest (high/low), concern (top 3)
      Step 3: Prioritize — power × interest matrix (manage closely / keep satisfied / monitor / minimal effort)
      Step 4: Engagement plan — per stakeholder, communication cadence (weekly/monthly), channels
      Step 5: Feedback loops — how/when to collect input, decision-making process
      Step 6: Conflict resolution — trade-off decisions, escalation path
      Output: Stakeholder matrix (Name | Role | Power | Interest | Concerns | Engagement | Frequency).

  - name: product-metrics
    description: "Define product KPIs — usage, engagement, retention, revenue, NPS tracking"
    invokable: true
    prompt: |
      Define product KPIs and dashboards:
      Step 1: Metric taxonomy — Input KPIs (what we control), Output KPIs (business impact), Guardrail metrics (don't break)
      Step 2: Usage metrics — DAU/MAU, session length, feature adoption rate
      Step 3: Engagement metrics — feature depth (average features used per user), time-to-value
      Step 4: Retention metrics — churn rate, D1/D7/D30 retention, cohort analysis
      Step 5: Revenue metrics — ARPU (average revenue per user), LTV/CAC ratio, expansion revenue
      Step 6: Health metrics — NPS (Net Promoter Score), support tickets, feature request volume
      Output: Metric dashboard spec (KPI | Definition | Target | Tracking Method | Cadence | Owner).

  # ── v3.8.0 QA/Test Rules (5) ──────────────────────────────

  - name: load-testing-plan
    description: "Load testing strategy — capacity planning, scalability testing, soak tests"
    invokable: true
    prompt: |
      Design a load testing plan:
      Step 1: Baseline definition — current user load, concurrent users, transaction rate, peak hours
      Step 2: Scenarios — happy path (browse → search → add to cart → checkout) weighted by real behavior
      Step 3: Ramp strategy — ramp from baseline to 2x → 5x → 10x over 10 min
      Step 4: Metrics to monitor — response time (p50/p95/p99), error rate, CPU/memory, database connections
      Step 5: Tool selection — JMeter vs Gatling vs k6 vs Locust (based on tech stack)
      Step 6: Success criteria — response time < 500ms (p95) at 10x load, 0 errors, no connection pool exhaustion
      Output: Load test plan (Scenarios | Ramp Profile | Metrics | Tool | Success Criteria).

  - name: chaos-engineering
    description: "Chaos engineering — fault injection, resilience testing, recovery validation"
    invokable: true
    prompt: |
      Chaos engineering strategy for resilience testing:
      Step 1: Failure modes — network delays, timeouts, service crashes, database unavailability, quota limits
      Step 2: Hypothesis — "If payment service is down for 30s, orders retry and succeed without data loss"
      Step 3: Blast radius — test in staging first, then canary production with 1% traffic
      Step 4: Fault injection — use Chaos Toolkit, Gremlin, or custom tools to inject faults
      Step 5: Observability — monitor metrics, logs, traces; alert on anomalies
      Step 6: Recovery validation — confirm system recovers without manual intervention or data corruption
      Output: Chaos test plan (Failure Mode | Hypothesis | Blast Radius | Duration | Success Criteria).

  - name: api-contract-testing
    description: "API contract testing — schema validation, backward compatibility, version management"
    invokable: true
    prompt: |
      API contract testing strategy:
      Step 1: Contract definition — OpenAPI 3.0 spec as source of truth for request/response schemas
      Step 2: Consumer expectations — what consumers (frontend, mobile, partners) depend on
      Step 3: Backward compatibility rules — never remove fields, never change type, always add optional first
      Step 4: Breaking change detection — compare current spec vs previous version, flag removals/type changes
      Step 5: Test generation — auto-generate tests from OpenAPI spec (request validators, response validators)
      Step 6: Contract-driven development — tests run against spec; deploy only if no breaking changes
      Output: Contract testing plan (Spec URL | Consumers | Backward Compatibility Rules | Test Tool | Validation Gates).

  - name: test-automation-frameworks
    description: "Test automation frameworks — selecting, structuring, maintenance, scalability"
    invokable: true
    prompt: |
      Test automation framework strategy:
      Step 1: Pyramid assessment — current ratio (unit/integration/E2E), ideal ratio (70/20/10)
      Step 2: Tool selection — Unit (xUnit, Jest, pytest), Integration (Docker-based), E2E (Playwright, Cypress, Selenium)
      Step 3: Page Object Model — structure E2E tests with page objects to decouple selectors from test logic
      Step 4: Test data strategy — fixtures, factories, database snapshots, cleanup strategy
      Step 5: CI/CD integration — parallel test execution, flaky test detection, failure isolation
      Step 6: Maintenance — test review in PRs, deprecation of old tests, continuous improvement of assertion clarity
      Output: Automation framework plan (Tools | Pyramid Target | Structure | Data Strategy | CI/CD | Maintenance).

  - name: mutation-testing
    description: "Mutation testing — verify test quality by mutating code and checking test failure rates"
    invokable: true
    prompt: |
      Mutation testing to improve test quality:
      Step 1: Tool selection — Stryker, PIT, mutmut (by language)
      Step 2: Baseline run — generate mutations, run tests, record survival/kill rates
      Step 3: Analysis — identify surviving mutants (tests missing edge cases)
      Step 4: Mutation categories — arithmetic operators (+ → -), boundary conditions (> → >=), logic inversions
      Step 5: Test improvement — write additional assertions to kill surviving mutants
      Step 6: Reporting — mutation score per module, target > 80% mutation kill rate
      Output: Mutation testing report (Module | Mutation Score | Surviving Mutants | Recommended Tests).

  # ── v3.8.0 Security Rules (5) ──────────────────────────────

  - name: threat-modeling
    description: "Threat modeling — STRIDE framework, attack surfaces, mitigation strategies"
    invokable: true
    prompt: |
      Threat modeling using STRIDE:
      Step 1: Identify assets — data (PII, payment, credentials), systems (API, database, auth)
      Step 2: STRIDE analysis — per asset, apply each threat type:
        - **Spoofing**: Can attacker impersonate users? → Mitigate: MFA, OAuth, JWT validation
        - **Tampering**: Can attacker modify data in transit? → Mitigate: TLS, HMAC, digital signatures
        - **Repudiation**: Can user deny actions? → Mitigate: Audit logs, timestamped records
        - **Information Disclosure**: Can attacker access secrets? → Mitigate: Encryption, RBAC, secrets management
        - **Denial of Service**: Can attacker crash service? → Mitigate: Rate limiting, circuit breaker, load testing
        - **Elevation of Privilege**: Can attacker gain admin access? → Mitigate: RBAC, least privilege, regular audits
      Step 3: Attack surface map — external entry points, internal trust boundaries
      Step 4: Risk scoring — probability × impact, prioritize mitigations
      Step 5: Mitigation plan — controls (preventive, detective, response), owner, timeline
      Step 6: Verification — penetration testing, security scanning, audit
      Output: Threat model (Asset | Threat Type | Risk Level | Mitigation | Owner | Verification).

  - name: supply-chain-security
    description: "Supply chain security — dependency audits, SBOMs, vulnerability scanning, pinning"
    invokable: true
    prompt: |
      Supply chain security strategy:
      Step 1: Dependency inventory — enumerate direct + transitive dependencies (npm, NuGet, pip, Maven)
      Step 2: SBOM (Software Bill of Materials) — list all components, versions, licenses (CycloneDX or SPDX format)
      Step 3: Vulnerability scanning — Dependabot, Snyk, WhiteSource; auto-update or alert on CVEs
      Step 4: License compliance — audit license types (MIT, Apache, GPL), flag viral licenses, export restrictions
      Step 5: Dependency pinning — pin exact versions in lock files, avoid floating versions
      Step 6: Periodic audits — quarterly review, deprecation of unmaintained dependencies
      Output: Supply chain security plan (SBOM URL | Scanning Tool | Update Policy | License Rules | Audit Cadence).

  - name: secret-management
    description: "Secret management — detection, storage, rotation, least privilege access"
    invokable: true
    prompt: |
      Secret management strategy:
      Step 1: Inventory — identify all secrets (API keys, DB credentials, JWTs, OAuth tokens, SSH keys)
      Step 2: Storage — never hardcode; use HashiCorp Vault, AWS Secrets Manager, Azure Key Vault, or encrypted environment variables
      Step 3: Rotation — auto-rotate passwords/tokens (quarterly for manual, weekly for tokens)
      Step 4: Access control — RBAC, audit logs (who accessed which secret, when), time-limited tokens
      Step 5: Detection — scan repos for accidental commits (GitGuardian, TruffleHog)
      Step 6: Incident response — revoke compromised secrets, rotate downstream dependencies, audit logs for misuse
      Output: Secret management plan (Storage | Rotation Schedule | Access Rules | Detection Tool | Incident Response).

  - name: dependency-scanning-continuous
    description: "Continuous dependency scanning — automated, remediation, compliance gating"
    invokable: true
    prompt: |
      Continuous dependency scanning and remediation:
      Step 1: Scanning cadence — on every commit, nightly, or per schedule (Dependabot, Renovate, Snyk)
      Step 2: Severity levels — critical (remote code execution), high (data breach), medium (DoS), low (non-exploitable)
      Step 3: Remediation policy — auto-merge low/medium PRs, require review for high/critical
      Step 4: Compliance gates — CI/CD blocks merge if critical vulnerabilities present (no exceptions)
      Step 5: Reporting — weekly/monthly summary, trends (improving/degrading), SLA (critical fixed within 24h)
      Step 6: Exclusions policy — justify suppressions (false positive, not applicable, acceptable risk)
      Output: Scanning strategy (Tool | Cadence | Severity Rules | Remediation Policy | SLA | Dashboard).

  - name: cloud-security-posture
    description: "Cloud security posture — IAM, encryption, monitoring, compliance (CIS, SOC2)"
    invokable: true
    prompt: |
      Cloud security posture assessment:
      Step 1: IAM audit — users with unnecessary permissions, service accounts, cross-account access
      Step 2: Data encryption — encryption at rest (KMS), in transit (TLS 1.2+), encryption key rotation
      Step 3: Network isolation — security groups, NACLs, VPC boundaries, zero trust architecture
      Step 4: Monitoring — CloudTrail/Audit Logs enabled, unexpected activity alerted
      Step 5: Compliance scanning — CIS Benchmarks, Security Hub, Config Rules; remediate findings
      Step 6: Incident response — runbooks, backup/disaster recovery tested quarterly
      Output: Security posture report (Control | Status | Risk | Remediation | Owner | Due Date).

  # ── v3.8.0 Designer Rules (6) — NEW ROLE ────────────────

  - name: design-system-setup
    description: "Design system foundation — component library, tokens, documentation, contribution guide"
    invokable: true
    prompt: |
      Establish a design system:
      Step 1: Component library — identify 15-20 core components (Button, Input, Modal, Dropdown, Card, Layout grid)
      Step 2: Design tokens — colors (primary, secondary, error, success), typography (font-size, line-height, weight), spacing (8px grid)
      Step 3: Figma structure — file organization (Foundations, Components, Patterns, Templates)
      Step 4: Code sync — Figma → code via plugins (e.g., Design Tokens Studio, Pug); maintain single source of truth
      Step 5: Documentation — Storybook or Figma Wiki; component anatomy, usage, dos/don'ts, accessibility
      Step 6: Contribution guide — PR process for new components, review checklist, deprecation policy
      Output: Design system foundation document (Token list | Component inventory | Figma structure | Sync process | Docs link).

  - name: wireframing-guide
    description: "Wireframing methodology — low-fi to high-fi progression, tools, annotation, handoff"
    invokable: true
    prompt: |
      Wireframing workflow from concept to handoff:
      Step 1: Low-fi sketches — pen and paper or Balsamiq, rough layouts, no visual design
      Step 2: Mid-fi wireframes — greyscale, Figma, grid-based, clear information hierarchy, CTA placement
      Step 3: Flows and states — happy path, error states, empty states, loading states
      Step 4: Annotations — labels for every element, content guidelines, behavior notes
      Step 5: User testing — test wireframes with 5 users, iterate based on feedback
      Step 6: Handoff to visual design — pass approved wireframes to designer for high-fi mockups
      Output: Wireframe set + annotation spec (Layout | Labels | States | User Test Feedback | Approved By).

  - name: interaction-design
    description: "Interaction design — micro-interactions, animations, feedback, state transitions"
    invokable: true
    prompt: |
      Interaction design for delightful UX:
      Step 1: Micro-interactions — hover states (color change, icon animation), focus states (visible ring), loading states (skeleton or spinner)
      Step 2: Animations — transitions (button press → form submit), page transitions (fade, slide), notification entry/exit (slide in, slide out)
      Step 3: Feedback — visual (color feedback), auditory (optional sound), haptic (vibration on mobile)
      Step 4: Timing — fast interactions (50-100ms), slower animations (200-400ms), avoid cumulative delays > 1s
      Step 5: Accessibility — respect prefers-reduced-motion, ensure focus always visible, keyboard equivalents for gestures
      Step 6: Animation library — Framer Motion (React), ng-animate (Angular), or CSS transitions
      Output: Interaction spec (Element | Interaction Type | Animation | Duration | Accessibility Notes).

  - name: prototyping-guide
    description: "Prototyping strategy — high-fi interactive prototypes, user testing, iteration"
    invokable: true
    prompt: |
      High-fidelity prototyping for validation:
      Step 1: Scope — define prototype scope (one critical flow, not entire product)
      Step 2: Tool selection — Figma prototype, Adobe XD, or code prototype (React/Vue)
      Step 3: Data integration — connect prototype to real API or mock backend
      Step 4: User flows — define critical path (sign up → verify → onboard → create item)
      Step 5: Testing plan — recruit 5-8 users, moderated or unmoderated testing, task-based scenarios
      Step 6: Findings — measure time-on-task, error rate, satisfaction (SUS score), iterate
      Output: Prototype + test report (Test Summary | User Quotes | Findings | Iteration Plan | Next Steps).

  - name: design-handoff
    description: "Design-to-dev handoff — specs, assets, tokens, accessibility, responsive breakpoints"
    invokable: true
    prompt: |
      Seamless design-to-development handoff:
      Step 1: Spec document — per page/component: layout, typography (font-family, size, weight, line-height), colors (hex codes), spacing (padding, margin)
      Step 2: Asset export — all icons (SVG), images (WebP/JPEG), in multiple densities (1x, 2x, 3x for mobile)
      Step 3: Design tokens — structured token export (Figma tokens plugin) in JSON/CSS vars format
      Step 4: Responsive specs — behavior at breakpoints (320px, 768px, 1024px, 1280px); stack order, text truncation
      Step 5: Accessibility — color contrast (4.5:1 for text), ARIA labels needed, focus states, keyboard navigation
      Step 6: Component API — props, states (default, hover, focus, disabled, loading), composition examples
      Output: Handoff package (Figma link + spec doc + tokens + asset folder + responsive grid + accessibility checklist).

  - name: design-qa
    description: "Design QA process — cross-browser testing, responsive validation, accessibility audit, design debt"
    invokable: true
    prompt: |
      Design QA and quality assurance:
      Step 1: Cross-browser testing — Chrome, Firefox, Safari, Edge on desktop; Chrome, Safari on mobile
      Step 2: Responsive validation — test layouts at 320px, 768px, 1024px, 1280px; check text reflow, image scaling
      Step 3: Color contrast audit — WebAIM contrast checker, verify all text meets WCAG AA (4.5:1 for small, 3:1 for large)
      Step 4: Interaction QA — hover states, focus rings, animations smooth, error messages clear
      Step 5: Design consistency — fonts match spec, spacing follows 8px grid, colors match token library
      Step 6: Design debt tracking — document deviations, prioritize fixes, update system documentation
      Output: QA report (Category | Issue | Severity | Browser/Breakpoint | Recommendation | Owner | Status).

  # ── v3.8.0 Phase 2 Tech Stack Rules (14) ────────────────

  # GCP Rules (4)
  - name: gcp-architecture-design
    description: "GCP architecture — compute options, serverless, CDN, network, load balancing"
    invokable: true
    prompt: |
      Design a scalable GCP architecture:
      Step 1: Compute options — App Engine (PaaS), Cloud Run (containers), Compute Engine (VMs), GKE (Kubernetes)
      Step 2: Serverless — Cloud Functions (event-driven), Cloud Tasks (async), Cloud Scheduler (cron)
      Step 3: Storage — Cloud Storage (objects), Firestore (NoSQL), BigQuery (analytics), Spanner (ACID)
      Step 4: Networking — VPC, Cloud Load Balancing (global, regional), Cloud CDN, Cloud Armor (DDoS)
      Step 5: Integration — Pub/Sub (messaging), Dataflow (pipelines), Workflows (orchestration)
      Step 6: Cost optimization — Committed Use Discounts, preemptible VMs, auto-scaling policies
      Output: Architecture diagram + service selection matrix + cost estimate + decision rationale.

  - name: gcp-iam-setup
    description: "GCP IAM — service accounts, roles, cross-project access, audit logging, least privilege"
    invokable: true
    prompt: |
      Design GCP IAM (Identity & Access Management):
      Step 1: Service accounts — create per application/workload, separate dev/staging/prod accounts
      Step 2: Custom roles — audit default roles for least privilege, create custom roles if needed
      Step 3: Bindings — grant roles at project/folder/organization level, avoid Owner/Editor roles
      Step 4: Cross-project access — service account in Project A can access resources in Project B via IAM binding
      Step 5: Audit logging — Cloud Audit Logs enabled, admin activity, data access, system events
      Step 6: Key management — Cloud KMS for encryption keys, automatic rotation, audit trail
      Output: IAM policy document (Principals | Roles | Resources | Conditions | Audit Strategy).

  - name: gcp-monitoring-observability
    description: "GCP monitoring — Cloud Trace, Cloud Monitoring, Cloud Logging, SLO dashboards"
    invokable: true
    prompt: |
      Set up comprehensive GCP observability:
      Step 1: Cloud Monitoring — metrics, dashboards, alert policies (CPU, memory, latency, error rate)
      Step 2: Cloud Logging — log aggregation, filtering, advanced search, log retention policy
      Step 3: Cloud Trace — distributed tracing, trace sampling rate, latency analysis
      Step 4: SLOs — define SLI (indicators), SLO targets (e.g., 99.9% uptime), error budgets
      Step 5: Custom metrics — application metrics via Cloud Monitoring API
      Step 6: Alerting — alert policies with escalation, PagerDuty/Slack integration, runbooks
      Output: Monitoring blueprint (Dashboards | Alerts | SLOs | Logging Strategy | Runbooks).

  - name: bigquery-optimization
    description: "BigQuery optimization — schema design, partitioning, clustering, cost optimization"
    invokable: true
    prompt: |
      Optimize BigQuery data warehouse:
      Step 1: Schema design — denormalize for query patterns, RECORD/ARRAY types for nested data
      Step 2: Partitioning — partition by date, integer, or column; improves query performance & cost
      Step 3: Clustering — cluster by high-cardinality columns (customer_id, region); works with partitioning
      Step 4: Query optimization — use approximate aggregation (APPROX_QUANTILES), avoid full table scans
      Step 5: Cost control — on-demand pricing vs flat-rate slots, query reservation, reserved slots
      Step 6: Data lifecycle — archive to Cloud Storage after 90 days, delete old data, data retention policy
      Output: Schema design + partitioning/clustering strategy + cost model + query optimization checklist.

  # Firebase Rules (4)
  - name: firebase-setup
    description: "Firebase project setup — authentication, hosting, Realtime Database, Cloud Storage, Functions"
    invokable: true
    prompt: |
      Firebase project initialization:
      Step 1: Authentication — enable Email/Password, Google, GitHub, or custom auth providers
      Step 2: Firestore vs Realtime Database — choose based on consistency needs (Firestore → strong; RTDB → eventual)
      Step 3: Cloud Storage — setup for file uploads (images, documents), set CORS for web access
      Step 4: Firebase Hosting — deploy static assets, custom domain, automatic SSL, CDN
      Step 5: Cloud Functions — setup Node.js or Python runtime, environment variables, VPC connectors
      Step 6: Security Rules — write rules for auth, data access, file uploads; test with Emulator
      Output: Firebase initialization checklist + configuration code + security rules template.

  - name: firestore-design
    description: "Firestore schema design — collections, documents, subcollections, indexing, query patterns"
    invokable: true
    prompt: |
      Design a Firestore data model:
      Step 1: Collections vs documents — organize by entity (users, orders, items); decide on hierarchy
      Step 2: Subcollections — nested collections for 1-N relationships (orders/{orderId}/items)
      Step 3: References vs denormalization — use refs for relationships; denormalize frequently accessed data
      Step 4: Indexing — create composite indexes for multi-field queries, single-field indexes for sorting
      Step 5: Query patterns — design collections to support your actual queries (no cross-collection joins)
      Step 6: Costs — each query/write charged per document accessed; avoid fan-out writes (broadcast updates)
      Output: Firestore schema diagram + collection structure + indexing strategy + query examples.

  - name: firebase-security-rules
    description: "Firebase security rules — auth-based access control, field-level security, validation"
    invokable: true
    prompt: |
      Write Firebase security rules:
      Step 1: Authentication checks — allow only authenticated users, validate custom claims
      Step 2: User-owned data — uid must match user_id in document, prevent cross-user access
      Step 3: Role-based rules — admin role can update any document, user role is limited to own data
      Step 4: Field-level security — some fields readable but not writable, sensitive fields hidden
      Step 5: Validation — check data types, required fields, max string length, number ranges
      Step 6: Testing — use Firebase Emulator to test rules, cover happy path + edge cases
      Output: Security rules file + test cases + access control matrix (Role | Collection | Operations).

  - name: firebase-functions
    description: "Firebase Cloud Functions — HTTP triggers, Firestore triggers, environment variables, performance"
    invokable: true
    prompt: |
      Deploy Cloud Functions on Firebase:
      Step 1: HTTP functions — callable functions for API endpoints, CORS setup, authorization
      Step 2: Firestore triggers — onCreate, onUpdate, onDelete for side effects (notifications, aggregations)
      Step 3: Environment variables — config via .env or Firebase config, secrets via Secret Manager
      Step 4: Performance — cold start optimization, memory sizing (256MB-4GB), timeout settings
      Step 5: Logs — structured logging, error tracking via Cloud Logging, debug mode
      Step 6: Testing — test locally with emulator, deploy to staging before production
      Output: Functions deployment guide + code templates + performance tuning checklist.

  # MongoDB Rules (3)
  - name: mongodb-schema-design
    description: "MongoDB schema — document structure, normalization vs embedding, references, polymorphic docs"
    invokable: true
    prompt: |
      Design a MongoDB schema:
      Step 1: Document structure — organize by access patterns, embed data accessed together
      Step 2: Embedding vs references — embed for small/fixed relationships, reference for 1-many/many-many
      Step 3: Array handling — use BSON arrays for 1-few relationships, separate collections for 1-many
      Step 4: Polymorphic documents — store type field to distinguish different document shapes (orders with different items)
      Step 5: Normalization — avoid data duplication, or allow duplication for performance (denormalize selectively)
      Step 6: Versioning — include schema_version field to handle migrations gracefully
      Output: Schema design with examples + embedding strategy + query patterns.

  - name: mongodb-indexing-optimization
    description: "MongoDB indexing — index types, query optimization, explain plans, index bloat prevention"
    invokable: true
    prompt: |
      Optimize MongoDB queries with indexing:
      Step 1: Single-field indexes — create indexes on frequently queried/sorted fields
      Step 2: Compound indexes — for multi-field queries, order by equality → range → sort
      Step 3: Explain plans — use .explain('executionStats') to check index usage, identify scans
      Step 4: Index cardinality — high-cardinality indexes more selective, low-cardinality less helpful
      Step 5: Index bloat — monitor index size, drop unused indexes, rebuild fragmented indexes
      Step 6: Cost-benefit — measure query performance before/after indexing, monitor memory impact
      Output: Indexing strategy + explain plan analysis + recommended indexes + performance improvement metrics.

  - name: mongodb-transactions-consistency
    description: "MongoDB transactions — multi-document ACID, session management, eventual consistency patterns"
    invokable: true
    prompt: |
      Implement consistency in MongoDB:
      Step 1: Multi-document transactions — available in replicated clusters, all-or-nothing atomicity
      Step 2: Session management — create session for transaction, pass to all operations, close when done
      Step 3: Retry logic — transient errors trigger automatic retry with exponential backoff
      Step 4: Eventual consistency — when transactions not viable, use idempotency keys + acknowledgement pattern
      Step 5: Write concern — MAJORITY for consistency, ACKNOWLEDGED for performance, balance trade-offs
      Step 6: Read concern — LOCAL (fast), MAJORITY (consistent), LINEARIZABLE (strict ordering)
      Output: Transaction implementation guide + code examples + consistency strategy.

  # Kubernetes Rules (3)
  - name: k8s-manifests-deployment
    description: "Kubernetes manifests — Deployments, StatefulSets, ConfigMaps, Secrets, DaemonSets"
    invokable: true
    prompt: |
      Write Kubernetes manifests:
      Step 1: Deployments — stateless applications, replicas, rolling updates, liveness/readiness probes
      Step 2: StatefulSets — stateful applications (databases), persistent volumes, stable network IDs
      Step 3: ConfigMaps — configuration files, environment variables, mounted as volumes
      Step 4: Secrets — encrypted credentials, API keys, TLS certificates, base64-encoded
      Step 5: DaemonSets — run pod on every node (logging, monitoring, CNI plugins)
      Step 6: Resource limits — CPU/memory requests & limits, prevent node overload, enable auto-scaling
      Output: Kubernetes manifests (YAML files) + resource specifications + deployment strategy.

  - name: helm-package-deployment
    description: "Helm charts — package management, templates, values, releases, upgrades"
    invokable: true
    prompt: |
      Create and deploy Helm charts:
      Step 1: Chart structure — Chart.yaml, values.yaml, templates/, dependencies
      Step 2: Templates — use {{ }} variables for configuration, loops for multiple resources
      Step 3: Values — default values.yaml, override per environment (dev/staging/prod)
      Step 4: Dependencies — reference other charts (PostgreSQL, Redis), manage versions
      Step 5: Releases — helm install, helm upgrade, rollback to previous release if needed
      Step 6: Validation — helm lint, helm template to validate before deploying
      Output: Complete Helm chart + values for dev/staging/prod + deployment guide.

  - name: k8s-security-networking
    description: "Kubernetes security — RBAC, network policies, pod security standards, image scanning"
    invokable: true
    prompt: |
      Secure Kubernetes clusters:
      Step 1: RBAC — ClusterRoles, ClusterRoleBindings, Roles, RoleBindings for least privilege
      Step 2: Network policies — restrict pod-to-pod communication, deny ingress by default
      Step 3: Pod security — Pod Security Standards (restricted, baseline, privileged), admission controllers
      Step 4: Image scanning — scan container images for vulnerabilities before deployment, use private registries
      Step 5: Secrets encryption — encrypt etcd at rest, use external secret managers (Vault, AWS Secrets)
      Step 6: Audit logging — enable audit logs, monitor failed API requests, suspicious activity
      Output: RBAC policy + network policies + pod security standards + security checklist.

  # ── v3.8.0 Phase 3 SDLC Rules (7) ───────────────────────

  - name: effort-estimation-techniques
    description: "Effort estimation — story pointing, velocity tracking, cone of uncertainty"
    invokable: true
    prompt: |
      Estimate effort accurately:
      Step 1: Story pointing — use Fibonacci scale (1, 2, 3, 5, 8, 13) relative to baseline stories
      Step 2: Velocity — track completed story points per sprint, predict capacity for future sprints
      Step 3: Cone of uncertainty — estimates are ±50% initially, tighten to ±10% as work progresses
      Step 4: Estimation techniques — planning poker (team consensus), t-shirt sizing (XS/S/M/L/XL), time-based (hours)
      Step 5: Calibration — compare estimates to actuals, adjust future estimates based on historical velocity
      Step 6: Risk buffers — add 20-30% buffer for unknowns, account for dependencies and reviews
      Output: Estimation matrix (Feature | Story Points | Effort Hours | Confidence | Risk Buffer).

  - name: dependency-mapping
    description: "Dependency mapping — critical path, blocking dependencies, constraint analysis"
    invokable: true
    prompt: |
      Map project dependencies:
      Step 1: Identify dependencies — which tasks block which, cross-team dependencies, external constraints
      Step 2: Critical path — longest sequence of dependent tasks, determines minimum project duration
      Step 3: Slack analysis — tasks with flexibility (non-critical) vs tasks with zero flexibility (critical)
      Step 4: Risk assessment — high-risk dependencies need buffer time, consider parallelization opportunities
      Step 5: Constraint analysis — resource constraints (team size, environment access), schedule constraints (deadlines)
      Step 6: Mitigation — identify parallel work paths, reduce blocking dependencies, allocate resources strategically
      Output: Dependency graph + critical path + resource allocation + risk mitigation plan.

  - name: visual-regression-testing
    description: "Visual regression testing — baseline comparison, pixel diffing, CI integration, tools"
    invokable: true
    prompt: |
      Implement visual regression testing:
      Step 1: Baseline capture — screenshot reference pages in controlled environment (resolution, browser, fonts)
      Step 2: Pixel diffing — compare new screenshots to baseline, highlight pixel-level differences
      Step 3: Threshold tuning — allow small differences (compression artifacts), fail on layout changes (>1% diff)
      Step 4: Tools — Percy, BackstopJS, Pixelmatch, or Playwright visual comparisons
      Step 5: CI integration — run on every PR, fail if visual changes exceed threshold, require review for intentional changes
      Step 6: Maintenance — update baselines when design changes intentionally, version control baselines
      Output: Visual regression testing setup + tools selection + integration guide + maintenance plan.

  - name: exploratory-testing-guide
    description: "Exploratory testing — session-based testing, heuristics, bug advocacy, test reporting"
    invokable: true
    prompt: |
      Conduct exploratory testing effectively:
      Step 1: Session planning — define charter (what area, what to test, time limit 60-90 min)
      Step 2: Heuristics — CRUD (create, read, update, delete), boundaries, state changes, error handling
      Step 3: Bug advocacy — reproduce bugs with clarity, document steps, environment, expected vs actual
      Step 4: Notes — keep detailed session notes (what you tested, what you found, anomalies)
      Step 5: Risk-based — focus on high-risk areas, features with recent changes, complexity zones
      Step 6: Reporting — classify findings by severity, provide actionable reproduction steps, suggest fixes
      Output: Exploratory test report (Charter | Findings | Severity | Steps to Reproduce | Recommendations).

  - name: cost-optimization-monitoring
    description: "Cost monitoring — cost tracking, budget alerts, waste identification, optimization opportunities"
    invokable: true
    prompt: |
      Monitor and optimize cloud costs:
      Step 1: Cost tracking — aggregate costs by service, team, project, environment (dev/staging/prod)
      Step 2: Budget alerts — set monthly budgets per project, alert at 50%/80%/100% spend
      Step 3: Waste identification — unused resources (idle VMs, unattached storage), over-provisioned capacity
      Step 4: Reserved instances — commit to 1-3 year terms for compute, 20-40% discount vs on-demand
      Step 5: Rightsizing — monitor actual usage vs allocated capacity, downsize over-provisioned resources
      Step 6: Showback — report costs by business unit, create accountability for resource usage
      Output: Cost dashboard + monthly cost report + waste analysis + optimization recommendations.

  - name: capacity-planning
    description: "Capacity planning — trend analysis, forecasting, scaling decisions, resource headroom"
    invokable: true
    prompt: |
      Plan for future capacity:
      Step 1: Trend analysis — track growth in users, requests/sec, data volume; plot trends over 12 months
      Step 2: Forecasting — project 6/12-month growth, identify when capacity limits hit
      Step 3: Scaling triggers — define thresholds (CPU > 70%, latency > 500ms), auto-scaling policies
      Step 4: Headroom — maintain 30-50% spare capacity for traffic spikes, deployments, failures
      Step 5: Test plan — load test at projected peak, validate scaling strategies before they're needed
      Step 6: Review cycle — quarterly capacity reviews, adjust forecasts based on actual growth
      Output: Capacity plan (Current | 6-month forecast | 12-month forecast | Scaling plan | Headroom policy).

  - name: trend-analysis-dashboards
    description: "Trend analysis — time-series visualization, anomaly detection, correlation analysis"
    invokable: true
    prompt: |
      Create trend analysis dashboards:
      Step 1: Time-series visualization — line charts for metrics over time (hours, days, weeks, months)
      Step 2: Seasonal patterns — identify repeating patterns (higher traffic on weekdays, lower on weekends)
      Step 3: Anomaly detection — flag unexpected spikes/dips, investigate root causes (deployment, incident, traffic surge)
      Step 4: Correlation analysis — correlate metrics (memory usage vs response time, errors vs traffic)
      Step 5: Forecasting — project future values based on historical trends, estimate time to resource exhaustion
      Step 6: Alerting — automated alerts when trends diverge from expected (e.g., error rate increasing over days)
      Output: Dashboard specification (Metrics | Time window | Seasonality | Anomaly detection rules | Alerts).

  # ── v3.9.0 New Orchestrator Patterns ────────────────────

  - name: validate-requirements
    description: "Validate requirements quality — INVEST criteria, completeness, clarity, feasibility, acceptance criteria"
    invokable: true
    prompt: |
      Validate a list of requirements against quality criteria.
      Input: requirements list (plain text, numbered list, or JSON Requirement[])
      Step 1: Parse — extract id, name, description, priority, estimatedEffort from input
      Step 2: INVEST scoring — score each criterion Independent/Negotiable/Valuable/Estimable/Small/Testable (0-10)
      Step 3: Completeness — has name, non-empty description, acceptance criteria signals, priority assigned
      Step 4: Clarity — flag ambiguous words (may, might, some, appropriate, several, etc), verify measurable language
      Step 5: Feasibility — estimated effort present, no contradictory constraints, dependencies identified
      Step 6: Verdict — Pass (score ≥80) | Needs Work (50-79) | Fail (<50)
      Output: Validation report table (Requirement | Score | INVEST breakdown | Issues | Severity | Recommendations).

  - name: optimize-database-schema
    description: "Optimize SQL schema — normalization, missing indexes, constraints, naming conventions, migration script"
    invokable: true
    prompt: |
      Analyze and optimize a SQL schema (CREATE TABLE statements or description).
      Step 1: Parse — extract tables, columns, types, existing constraints and indexes
      Step 2: Normalization — check 1NF (no repeating groups), 2NF (no partial deps), 3NF (no transitive deps)
      Step 3: Indexes — flag FK columns without indexes, frequently-queried columns, composite index candidates
      Step 4: Constraints — flag missing NOT NULL, missing FK references, missing UNIQUE on natural keys
      Step 5: Naming — PascalCase tables, consistent column casing, no SQL reserved word conflicts
      Step 6: Artifacts — corrected schema DDL + CREATE INDEX statements + ALTER TABLE migration skeleton
      Output: Corrected schema + index recommendations + migration script (ready to review and run).

  - name: generate-helm-charts
    description: "Generate Helm charts — Chart.yaml, values.yaml, deployment/service/ingress/configmap templates"
    invokable: true
    prompt: |
      Generate a complete Helm chart from a Docker image and deployment specification.
      Input: image name (repo/name:tag), replicas, ports, env vars (plain + secret), resource limits, optional ingress
      Step 1: Chart.yaml — name, version, appVersion, description, type: application
      Step 2: values.yaml — image.repository/tag, replicaCount, resources, service ports, ingress config, env
      Step 3: templates/deployment.yaml — Deployment with {{ .Values.* }}, resource limits, liveness/readiness probes
      Step 4: templates/service.yaml — ClusterIP mapping container ports to service ports
      Step 5: templates/ingress.yaml — conditional ({{- if .Values.ingress.enabled }}), host/path, optional TLS
      Step 6: templates/configmap.yaml — conditional (configMap non-empty), env or volume mount
      Output: Complete Helm chart (6 files) + helm install/upgrade commands.

