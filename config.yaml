      Step 2: Data structure — format data for chart library, handle large datasets (aggregate or virtualize)
      Step 3: Implementation — complete chart code with Recharts/D3/Chart.js, formatted tooltips, legend
      Step 4: Responsive — mobile-first sizing, responsive container, adaptive layout
      Step 5: Accessibility — color contrast (WCAG AA), text alternatives (data table), no color-only meaning
