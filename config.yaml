defaultCompletionOptions:
  maxTokens: 4096
  temperature: 0.3

# ─────────────────────────────────────────────────────────
# RULES — system instructions for ALL chat/agent/edit
# Equivalent to Cursor's .cursorrules
# ─────────────────────────────────────────────────────────
rules:
  - name: smartworkz-core
    alwaysApply: true
    rule: |
      You are an expert AI assistant embedded in SmartWorkz Technologies.
      Stack: .NET 8, ASP.NET Core, Angular 17+, SQL Server 2022, Azure DevOps, AWS.
      Always:
        - Use C# 12 features (primary constructors, collection expressions)
        - Prefer async/await with CancellationToken parameters
        - Use ILogger<T>, never Console.Write
        - Angular: standalone components, inject(), OnPush, typed forms
      Never:
        - Leave TODO comments in generated code
        - Use Thread.Sleep — always Task.Delay
        - Expose raw exceptions to API consumers
        - Hardcode secrets or connection strings

  - name: dotnet-rules
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      .NET/C# standards:
      - Controllers: [ApiController] + [Route("api/v1/[controller]")] — no business logic
      - Services: interface + Scoped implementation
      - Repositories: Dapper with parameterised queries only
      - Validation: FluentValidation at controller boundary
      - Errors: ProblemDetails RFC 7807
      - All DB calls must be async with Async suffix
      - Enable nullable reference types (#nullable enable)
      - XML docs required on all public members

  - name: angular-rules
    globs: ["**/*.ts", "**/*.html"]
    alwaysApply: false
    rule: |
      Angular 17+ standards:
      - Standalone components only — no NgModules for new code
      - inject() not constructor injection
      - ChangeDetectionStrategy.OnPush everywhere
      - Signals preferred over BehaviorSubject for local state
      - DevExtreme: DxDataGrid/DxTreeList — explicit column definitions always
      - Typed reactive forms: FormGroup<T>
      - HTTP: typed responses, takeUntilDestroyed()
      - Routes: lazy-loaded with loadComponent

  - name: sql-rules
    globs: ["**/*.sql"]
    alwaysApply: false
    rule: |
      SQL Server standards:
      - SET NOCOUNT ON at top of every stored procedure
      - Parameterised queries only — never string concatenation
      - WITH (NOLOCK) on read-heavy SELECTs
      - Temp tables over CTEs for > 10k rows
      - BEGIN TRY / BEGIN CATCH on all procedures
      - Set-based operations over cursors always
      - SARGable WHERE clauses (no functions wrapping columns)

  - name: security-always
    alwaysApply: true
    rule: |
      Security (applied everywhere):
      - Never hardcode secrets, API keys, connection strings
      - Parameterised queries only — flag string concatenation
      - Sanitise all user input before use
      - Flag any code logging passwords, tokens, or PII
      - Angular: use DomSanitizer — never bypass security

  - name: performance-audit
    globs: ["**/*.cs", "**/*.ts", "**/*.sql"]
    alwaysApply: false
    rule: |
      Performance standards:
      - SQL: Avoid N+1 queries, SELECT specific columns, add indexes, parameterised only
      - C#: Use async/await, minimize allocations, use Span<T> for perf-critical code
      - TypeScript: Lazy-load modules, OnPush change detection, signals over subscriptions
      - General: Profile before optimizing, use benchmarks, avoid premature optimization

  - name: memory-management
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      Memory management standards:
      - using statement for all IDisposable, IAsyncDisposable
      - Unsubscribe from events in Dispose or use weak event pattern
      - No circular references or event handler leaks
      - WeakReference for caches, not strong references
      - Profile for memory leaks: unregistered event handlers, unreleased resources

  - name: async-best-practices
    globs: ["**/*.cs", "**/*.ts"]
    alwaysApply: false
    rule: |
      Async/await standards:
      - Never use .Result or .Wait() — always await
      - CancellationToken on all async methods
      - ConfigureAwait(false) in libraries (C#)
      - No async/await in constructors — use factory or separate Init method
      - Never fire-and-forget: if you Task.Run, always await or .ContinueWith() error handling

  - name: error-handling-advanced
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      Error handling standards:
      - Custom exception hierarchy — never throw base Exception
      - HTTP: ProblemDetails RFC 7807 format for errors
      - Structured logging: correlation IDs, context, severity
      - Polly for resilience: retry policies, circuit breakers, timeouts
      - Never expose raw stack traces to API clients
      - Log with ILogger<T>, never Console — include context

  # ── v1.2.0 Rules ───────────────────────────────────────

  - name: testing-pyramid
    globs: ["**/*Tests.cs", "**/*.spec.ts", "**/*.test.ts"]
    alwaysApply: false
    rule: |
      Testing pyramid standards:
      - 70% unit tests (fast, focused, isolated)
      - 20% integration tests (realistic, slower)
      - 10% e2e tests (slow, full workflow)
      - Mock at infrastructure boundary only, not internal business logic
      - AAA pattern (Arrange/Act/Assert) always
      - Test names describe scenario and expected result
      - No testing logic in production code

  - name: documentation-standards
    globs: ["**/*.cs", "**/*.ts", "**/*.md"]
    alwaysApply: false
    rule: |
      Documentation standards:
      - C#: XML docs on all public members (<summary>, <param>, <returns>, <exception>, <example>)
      - TypeScript: JSDoc on all exported functions (/** @param, @returns, @throws */)
      - README in each major folder (purpose, usage, key classes/functions)
      - No undocumented public API
      - Update docs when code changes
      - Examples in docs must be runnable

  - name: deployment-safety
    globs: ["**/appsettings*.json", "**/Dockerfile", "**/*.yml", "**/*.yaml"]
    alwaysApply: false
    rule: |
      Deployment safety standards:
      - Environment-specific config in appsettings.{env}.json only
      - No secrets in source code (API keys, passwords, connection strings)
      - Health check endpoints (/health) required
      - Dockerfile: non-root user, minimal image, security scan
      - CI gate: all checks must pass before merge
      - Pre-deploy: run integration tests in staging
      - Rollback plan documented for major changes

  - name: accessibility
    globs: ["**/*.html", "**/*.ts"]
    alwaysApply: false
    rule: |
      Accessibility standards (WCAG 2.1 AA):
      - ARIA labels on all interactive elements (buttons, inputs, modals)
      - Keyboard navigation: Tab, Enter, Escape must work
      - Color contrast 4.5:1 (text/background)
      - No content conveyed by color alone
      - Focus indicators visible and clear
      - Angular: use ARIA roles, test with screen readers
      - Images: alt text describing content, not "image" or "picture"

  - name: performance-budget
    globs: ["**/*.cs", "**/*.ts", "**/*.sql"]
    alwaysApply: false
    rule: |
      Performance budget standards:
      - API response time < 200ms (95th percentile)
      - Initial bundle size < 1MB (gzipped)
      - SQL queries < 100ms (95th percentile)
      - Maximum 5 database calls per request
      - Images: WebP format, compressed, responsive sizes
      - No N+1 queries
      - No blocking operations (always async)
      - Profile before optimizing, use benchmarks

  # ── v2.0.0 Agent Rules ────────────────────────────────

  - name: agent-behavior
    alwaysApply: false
    rule: |
      Multi-step autonomous agent behavior:
      - Plan before executing (show plan, get approval for unsafe operations)
      - Verify each step before proceeding (no blind forward motion)
      - Surface blockers immediately (don't hallucinate file paths)
      - Leave audit trail (explain reasoning, show evidence)
      - Preserve user intent (don't reinterpret requests)
      See .continue/rules/agent-behavior.md for detailed patterns.

  - name: pr-standards
    globs: ["**/*.cs", "**/*.ts", "**/*.md", "**/*.yml"]
    alwaysApply: false
    rule: |
      Pull request standards:
      - Maximum 400 lines of changes per PR
      - One feature/fix per PR (not multiple unrelated changes)
      - Linked to ticket (issue number in title)
      - Tests included and passing (coverage >= 80%)
      - CHANGELOG updated if user-facing
      - Description explains: What | Why | How | Testing
      See .continue/rules/pr-standards.md for detailed standards.

  - name: code-review-standards
    globs: ["**/*.cs", "**/*.ts"]
    alwaysApply: false
    rule: |
      Code review mindset and severity levels:
      - Assume good intent, ask questions before critiquing
      - Use severity levels: 🔴 Critical, 🟠 High, 🟡 Medium, 🔵 Low
      - Be specific: show problem AND fix
      - Approve when: tests pass, coverage maintained, no Critical issues
      - Praise good code, bikeshed sparingly
      See .continue/rules/code-review-standards.md for detailed guidelines.

  - name: ci-cd-standards
    globs: ["**/*.yml", "**/*.yaml", "**/Dockerfile"]
    alwaysApply: false
    rule: |
      CI/CD pipeline standards and gates:
      - Lint → Test → Build → Security Scan → Coverage Check → Deploy
      - Hard blocks: linter fails, tests fail, coverage decreases, security vulns
      - Secrets in CI/CD environ, never hardcoded
      - Auto-deploy to staging, manual approval for production
      - Rollback triggers: error rate > 5%, response time > 2x baseline
      See .continue/rules/ci-cd-standards.md for full pipeline details.

  - name: workspace-conventions
    alwaysApply: false
    rule: |
      Project-specific conventions and architectural patterns:
      - Naming: PascalCase files, camelCase functions, UPPER_SNAKE_CASE constants
      - Services: interface + DI, no direct instantiation
      - Repositories: parameterized queries always, no SQL injection
      - Tests: AAA pattern (Arrange/Act/Assert), 80%+ coverage target
      - Errors: custom exceptions, not generic Error()
      See .continue/rules/workspace-conventions.md for full project conventions.

  # ── v2.4.0 Cloud & DevOps Rules ───────────────────────

  - name: aws-patterns
    globs: ["**/*.ts", "**/*.js", "**/*.py", "**/*.yaml", "**/*.yml", "**/*.json", "**/*.tf"]
    alwaysApply: false
    rule: |
      AWS architecture patterns and best practices:
      - Lambda: Cold start optimization, connection pooling, structured logging, error handling, async with DLQ
      - RDS: Multi-AZ Aurora, automated backups, IAM auth, connection pooling (RDS Proxy), monitoring
      - DynamoDB: On-demand or auto-scaling, TTL for cleanup, GSI for queries, PITR enabled, partition key design
      - API Gateway: Request validation, throttling, WAF, CORS restricted, security headers, logging
      - CloudFront: Origin Access Identity (S3 only), cache policies, security headers, compression, access logging
      - IAM: Least privilege roles per service, no root access, MFA, credentials rotated, audit with CloudTrail
      See .continue/rules/aws-patterns.md for complete AWS standards.

  - name: azure-deployment
    globs: ["**/*.ts", "**/*.js", "**/*.cs", "**/*.yaml", "**/*.yml", "**/*.json", "**/*.bicep"]
    alwaysApply: false
    rule: |
      Azure deployment patterns and best practices:
      - App Service: Health check endpoint, auto-scaling, deployment slots (blue-green), HTTPS only, Managed Identity
      - Azure Functions: Consumption Plan for bursty, Premium Plan for VPC, timeout configured, durable functions for long operations
      - SQL Database: TDE enabled, Elastic Pools for cost, Always Encrypted for PII, auditing enabled, automated backups
      - Cosmos DB: Partition key design, TTL for cleanup, change feed for events, auto-scaling, global replication
      - Application Insights: Custom metrics/events, dependency tracking, alerts configured, structured logging
      - Key Vault: All secrets stored, Managed Identity access, soft delete, access logging, rotation policy
      See .continue/rules/azure-deployment.md for complete Azure standards.

  - name: docker-kubernetes
    globs: ["**/Dockerfile*", "**/*.dockerfile", "**/docker-compose*.yml", "**/*.yaml", "**/*.yml", "**/.dockerignore"]
    alwaysApply: false
    rule: |
      Docker and Kubernetes standards:
      - Dockerfile: Multi-stage builds, specific base version (not latest), minimal layers, non-root user, health check
      - Docker Compose: Named volumes, service networking, resource limits, health checks, .env for secrets
      - Kubernetes: Deployments (not bare Pods), resource requests/limits, liveness/readiness probes, ConfigMaps/Secrets separation
      - Security: securityContext (non-root), RBAC, network policies, private registries, image scanning
      - Scaling: HPA configured, pod disruption budgets, anti-affinity for reliability
      - Networking: Services for DNS, Ingress for routing, network policies for isolation
      See .continue/rules/docker-kubernetes.md for Docker/K8s patterns.

  - name: infrastructure-iac
    globs: ["**/*.tf", "**/*.json", "**/*.bicep", "**/*.yaml", "**/*.yml", "**/terraform/**", "**/cloudformation/**"]
    alwaysApply: false
    rule: |
      Infrastructure as Code standards (Terraform, CloudFormation, Bicep):
      - Terraform: Remote state (S3/Terraform Cloud), state locking, modules for reusability, version pins, workspaces per environment
      - CloudFormation: YAML format, nested stacks, change sets for review, parameter validation, mappings for regions
      - Bicep: Symbolic names, metadata documentation, module organization, parameter decorators
      - State management: Encryption at rest, versioning, access control, no local state, regular backups
      - Secrets: External storage (Secrets Manager/Key Vault), never in code/state, regular rotation
      - GitOps: All changes via CI/CD, PR approvals required, tags for releases, audit trail
      See .continue/rules/infrastructure-iac.md for IaC standards.

  - name: ci-cd-automation
    globs: [".github/workflows/**", ".azure-pipelines/**", "**/*.yml", "**/*.yaml", "**/Jenkinsfile", "**/deploy/**"]
    alwaysApply: false
    rule: |
      CI/CD automation standards (GitHub Actions, Azure Pipelines):
      - GitHub Actions: Workflow matrix for multi-version testing, cache dependencies, status checks on PRs, job separation (lint/test/build/deploy)
      - Azure Pipelines: Multi-stage (build/test/deploy), template reuse, approval gates, variable groups for secrets
      - Deployment: Blue-green deployments, health checks, automated rollback, smoke tests, canary/rolling updates
      - Testing: Unit, integration, security tests before deploy, coverage reports, artifact archiving
      - Secrets: GitHub Secrets, Azure variable groups, no hardcoded credentials, regular rotation
      - Monitoring: Post-deploy health checks, metrics monitoring, deployment alerts, audit logs
      See .continue/rules/ci-cd-automation.md for CI/CD standards.

  # ── v2.3.0 Advanced UI Patterns Rules ─────────────────

  - name: component-patterns
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.js", "**/*.css", "**/*.scss"]
    alwaysApply: false
    rule: |
      Component library patterns (Material Design, Chakra UI, Tailwind):
      - Material Design 3: Elevation, 8dp grid, ripple effects, semantic colors
      - Chakra UI: Design tokens, Box/Flex/Grid, responsive syntax [mobile, tablet, desktop], dark mode
      - Tailwind CSS: Utility-first, custom theme tokens, dark: prefix, responsive prefixes (sm:, md:, lg:)
      - Component API: Typed props, size/variant presets, disabled/loading/error states, ref forwarding
      - Theme customization: Single design system, CSS variables or theme tokens, light/dark support
      See .continue/rules/component-patterns.md for library patterns.

  - name: data-visualization
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.js", "**/*.html"]
    alwaysApply: false
    rule: |
      Data visualization standards (charts, dashboards, D3):
      - Chart selection: Bar (categories), Line (trends), Pie (proportions ≤5 slices), Scatter (correlation)
      - Recharts: Responsive containers, labeled axes, legend, formatted tooltips, no 3D effects
      - Dashboard layout: 3-column grid (desktop), metrics cards, time range picker, refresh button
      - D3.js: Use for custom interactive visualizations, scales for coordinate mapping, enter/update/exit
      - Accessibility: Text alternatives (data table), sufficient contrast, legends, no color-only meaning
      - Performance: Lazy-load chart libraries, aggregate data if > 1000 points, canvas for > 10k points
      See .continue/rules/data-visualization.md for chart patterns.

  - name: table-patterns
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.js", "**/*.html"]
    alwaysApply: false
    rule: |
      Data table patterns (sorting, filtering, pagination):
      - Semantic HTML: <table>, <thead>, <th scope="col">, <tbody>, aria-sort on headers
      - Sorting: Clickable column headers, aria-sort (ascending/descending/none)
      - Filtering: Debounced search (300ms), status/date filters, active filter badges, reset button
      - Pagination: Client-side for < 1000 rows, server-side for >= 1000, prev/next, page numbers, goto input
      - Items per page: Selector (10, 25, 50, 100), show total count ("X of Y results")
      - Virtualization: Use react-window for > 500 rows (only render visible rows)
      - Responsive: Horizontal scroll or card layout on mobile
      See .continue/rules/table-patterns.md for table implementation.

  - name: storybook-standards
    globs: ["**/*.stories.tsx", "**/*.stories.jsx", "**/*.stories.ts", "**/*.stories.js", "**/storybook/**"]
    alwaysApply: false
    rule: |
      Storybook component documentation standards:
      - Story structure: One file per component, default export with title/component, decorators for layout
      - ArgTypes: Prop documentation with control types (select, boolean, text), descriptions
      - Variants: Create stories for each state (default, primary, secondary, danger, disabled, loading, error)
      - Accessibility: a11y addon enabled, no WCAG AA violations, test color contrast, keyboard nav
      - Chromatic: Visual regression testing on every story variant, screenshot baselines
      - Interaction testing: play() function with userEvent for clicks, form submission, keyboard nav
      - Documentation: DocBlock comments, usage examples, component purpose, design system links
      See .continue/rules/storybook-standards.md for story patterns.

  - name: performance-monitoring
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.js", "**/*.json"]
    alwaysApply: false
    rule: |
      Web performance monitoring standards:
      - Core Web Vitals: LCP < 2.5s, INP < 200ms, CLS < 0.1 (measure in RUM, set alerts)
      - Performance budgets: Bundle < 250KB (gzip), set in CI, fail build if exceeded
      - Lighthouse: Run in CI on every PR, target > 90 score, assertions for performance/accessibility
      - Image optimization: WebP + JPEG fallback, responsive srcset, lazy load, aspect-ratio to prevent CLS
      - Code splitting: Dynamic imports by route, lazy-load heavy libraries (D3, editors), no blocking JS
      - Monitoring: Sentry, Google Analytics RUM, track metrics in analytics, set up alerts
      - Low-end testing: Profile on slow 4G, mid-range device, monitor main thread < 50ms tasks
      See .continue/rules/performance-monitoring.md for monitoring setup.

  # ── v2.2.0 UX Design Rules ────────────────────────────

  - name: ux-design-system
    globs: ["**/*.tsx", "**/*.jsx", "**/*.css", "**/*.scss"]
    alwaysApply: false
    rule: |
      UI/UX design system standards:
      - Color: 60-30-10 rule, semantic tokens (primary, secondary, success, danger)
      - Typography: 1.25 Major Third scale, 1.5-1.75 line height, 65ch max width
      - Spacing: 8-point grid (4px, 8px, 16px, 24px, 32px, 48px, 64px)
      - Responsive: Mobile-first, breakpoints 320px/480px/768px/1024px/1280px
      - Components: Button hierarchy (primary, secondary, tertiary, destructive)
      - Dark mode: Semantic tokens for light/dark variants
      See .continue/rules/ux-design-system.md for complete design system.

  - name: accessibility-wcag
    globs: ["**/*.tsx", "**/*.jsx", "**/*.html"]
    alwaysApply: false
    rule: |
      WCAG 2.1 AA accessibility standards:
      - Contrast: 4.5:1 normal text, 3:1 large text (≥18px bold), 3:1 UI components
      - Focus: Visible focus indicators on ALL interactive elements (2px outline, 2px offset)
      - Keyboard: Full keyboard navigation, no keyboard traps, skip links
      - ARIA: Semantic HTML (<button>, <nav>, <main>), aria-label for icons, aria-expanded
      - Touch: 44×44px minimum target size, 8px gaps between targets
      - Color: Never convey information by color alone, use patterns/text/icons
      See .continue/rules/accessibility-wcag.md for WCAG checklist.

  - name: responsive-mobile-first
    globs: ["**/*.tsx", "**/*.jsx", "**/*.css", "**/*.scss"]
    alwaysApply: false
    rule: |
      Mobile-first responsive design standards:
      - Base styles: Start at 320px (mobile), progressive enhancement
      - Breakpoints: 480px (small), 768px (tablet), 1024px (lg), 1280px (xl), 1536px (2xl)
      - Fluid typography: Use clamp() for smooth scaling across viewport sizes
      - Container widths: Mobile 100% + padding, Desktop max-width 1280px centered
      - Images: Responsive images with srcset, WebP format, lazy loading, aspect-ratio
      - Layout shift: Avoid with aspect-ratio, reserved space for ads/images
      See .continue/rules/responsive-mobile-first.md for responsive patterns.

  - name: animation-motion
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.css"]
    alwaysApply: false
    rule: |
      Animation and motion standards:
      - GPU acceleration: ONLY animate transform and opacity (never width, height, margin)
      - Durations: instant=50ms, fast=100ms, normal=200ms, slow=300ms, slower=500ms
      - Easing: ease-out (default), ease-in (exit), bounce (playful)
      - Accessibility: Always support prefers-reduced-motion media query
      - Performance: No layout thrashing, smooth 60fps animations
      - Micro-interactions: Loading states, transitions, hover effects
      See .continue/rules/animation-motion.md for motion guidelines.

  - name: design-tokens
    globs: ["**/*.css", "**/*.scss", "**/tokens/*"]
    alwaysApply: false
    rule: |
      Design tokens and CSS variables standards:
      - Token structure: Colors, spacing, typography, shadows, border radius
      - CSS custom properties: --color-primary, --spacing-base, --font-scale, --shadow-lg
      - Dark mode: Paired tokens (--bg-primary light/dark, --text-primary light/dark)
      - Naming: Semantic (primary, secondary, danger), not color-based (blue-500)
      - Format: CSS file with organized sections, documented with comments
      - Usage: Use tokens in all components, sync with design tools (Figma)
      See .continue/rules/design-tokens.md for token standards.

  # ── v2.1.0 Data & Observability Rules ──────────────────

  - name: database-design
    globs: ["**/*.sql", "**/Migrations/**", "**/*Migration*.cs", "**/DbContext*.cs"]
    alwaysApply: false
    rule: |
      Database schema design standards:
      - Normalization: 1NF, 2NF, 3NF (no transitive dependencies)
      - Naming: PascalCase tables/columns, Primary key = Id, Foreign key = [Table]Id
      - Indexes: Foreign keys, WHERE columns, JOIN columns, ORDER BY columns
      - Constraints: NOT NULL on required, UNIQUE on unique data, CHECK for valid values
      - Soft delete: IsDeleted (BIT) + DeletedAt (nullable DATETIME), never hard delete
      - Migrations: reversible, safe (add nullable, backfill, then add NOT NULL)
      See .continue/rules/database-design.md for complete schema standards.

  - name: observability-standards
    globs: ["**/*.cs", "**/*.ts", "**/appsettings*.json"]
    alwaysApply: false
    rule: |
      Observability standards — logging, tracing, metrics:
      - Structured logging: ILogger<T>, key=value format (not string interpolation)
      - Never log secrets: passwords, tokens, API keys, PII
      - Correlation ID on all logs (request tracing end-to-end)
      - Metrics: track key business operations + system health (latency, errors)
      - Health checks: /health (liveness), /health/ready (readiness + dependencies)
      - Log levels: Debug (dev only), Info (user events), Warn (unexpected but handled), Error (needs attention)
      See .continue/rules/observability-standards.md for full standards.

  - name: api-versioning
    globs: ["**/*Controller*.cs", "**/*.ts", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      API versioning and breaking change management:
      - Version in URL: /api/v1/, /api/v2/ (never query string)
      - Backward compatible: add fields/endpoints, don't remove (breaking = major version bump)
      - Deprecation: 6-month notice (Deprecation header), migration guide, 410 Gone after sunset
      - Non-breaking: add optional params, add response fields, add endpoints
      - Breaking requires: new major version + migration documentation
      See .continue/rules/api-versioning.md for full versioning strategy.

  - name: input-validation
    globs: ["**/*.cs", "**/*.ts"]
    alwaysApply: false
    rule: |
      Input validation and sanitization standards:
      - Validate at boundaries: API controllers, message handlers (not in business logic)
      - Use declarative validators: FluentValidation (C#), Zod (TypeScript)
      - Parameterized queries always: never string concatenation in SQL
      - HTML encoding: safe rendering in views (prevent XSS)
      - File uploads: validate size, MIME type, magic bytes; random filenames; outside web root
      - Reject invalid early: never pass unvalidated data to services/database
      See .continue/rules/input-validation.md for validation patterns.

  - name: git-workflow
    alwaysApply: false
    rule: |
      Git workflow standards — branch naming, commits, merge strategy:
      - Branch names: feature/123-description, fix/456-description (lowercase, hyphens, ticket ID)
      - Commits: Conventional Commits format: feat(scope): subject, explain WHY in body
      - Granularity: one logical change per commit (git bisect safe)
      - Merge strategy: squash features before merge to main, merge commit for multi-commit work
      - Never rebase public branches (breaks others' history)
      - Conflict resolution: test after merging (understand both sides)
      See .continue/rules/git-workflow.md for complete git standards.

  # ── v2.5.0 Security & Compliance Rules ────────────────────

  - name: zero-trust-security
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.tf", "**/*.bicep", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Zero-trust security assumes every access request is potentially compromised.
      Always:
        - Verify every identity (MFA mandatory, never trust source IP)
        - Authenticate before authorizing (OAuth 2.0, PKCE, JWT short-lived tokens)
        - Encrypt all data in transit (TLS 1.2+) and at rest (AES-256)
        - Segment networks (microsegmentation, no flat networks)
        - Log and monitor all access (immutable audit trails)
        - Apply least privilege (minimum permissions needed)
        - Assume breach mentality (defense in depth)
      Never:
        - Trust network perimeter (assume compromised)
        - Use single-factor authentication
        - Allow unencrypted internal traffic
        - Grant broad "admin" permissions
      See .continue/rules/zero-trust-security.md for full architecture.

  - name: secrets-rotation
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.tf", "**/*.bicep", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Secrets (API keys, passwords, tokens) are attack targets. Rotate automatically, store securely, audit access.
      Always:
        - Store secrets in vault (AWS Secrets Manager, Azure Key Vault)
        - Never commit secrets to git (use .gitignore, .env not committed)
        - Use managed identity instead of credentials when possible
        - Encrypt secrets at rest and in transit
        - Audit all secret access (who, when, what)
        - Rotate automatically (every 30-90 days)
        - Maintain version history (last 3 versions)
      Never:
        - Hardcode secrets in code
        - Store secrets in config files
        - Commit .env files with real secrets
        - Use same secret across environments
      See .continue/rules/secrets-rotation.md for rotation automation.

  - name: compliance-standards
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.tf", "**/*.bicep", "**/*.md", "**/*.yaml"]
    alwaysApply: false
    rule: |
      Compliance frameworks (SOC 2, ISO 27001, HIPAA, PCI-DSS) establish security and privacy controls.
      Always:
        - Document all policies, procedures, and evidence
        - Maintain audit logs (1+ year retention)
        - Implement controls systematically (map to framework requirements)
        - Schedule annual independent audits (SOC 2 Type II)
        - Address audit findings (remediate within SLA)
        - Track non-conformities and remediation (ISO 27001)
      Never:
        - Skip documentation (auditors verify everything)
        - Ignore audit findings
        - Make exceptions to controls
      See .continue/rules/compliance-standards.md for SOC 2, ISO 27001, HIPAA, PCI-DSS details.

  - name: penetration-testing
    globs: ["**/*.md", "**/*.yaml", "**/*.yml", "**/*.tf"]
    alwaysApply: false
    rule: |
      Penetration testing systematically identifies security weaknesses before attackers do.
      Always:
        - Define scope clearly (systems in/out of scope)
        - Obtain written authorization (signed Rules of Engagement)
        - Follow NIST phases (reconnaissance → scanning → enumeration → exploitation)
        - Test OWASP Top 10 vulnerabilities (Web, Mobile, API)
        - Document findings with CVSS scores
        - Provide clear remediation steps (actionable, specific)
        - Assign remediation owners with deadlines
        - Re-test to confirm fixes
      Never:
        - Test without authorization (illegal)
        - Exceed scope (test only in-scope systems)
        - Disclose findings before remediation window closes
      See .continue/rules/penetration-testing.md for planning and methodology.

  - name: incident-response
    globs: ["**/*.md", "**/*.yaml", "**/*.yml", "**/*.tf"]
    alwaysApply: false
    rule: |
      Security incidents are inevitable. Respond quickly, communicate clearly, investigate thoroughly.
      Always:
        - Follow IR playbook (don't improvise)
        - Establish incident commander (single decision maker)
        - Document timeline of events (evidence preservation)
        - Communicate status regularly (internal + external)
        - Isolate affected systems (prevent spread)
        - Schedule post-mortem within 48 hours (blameless, systems-focused)
        - Create action items with owners & deadlines
        - Share findings widely (learn as organization)
      Never:
        - Panic or make hasty decisions
        - Delete logs (destroy evidence)
        - Blame individuals (focus on systems)
        - Skip the post-mortem
      See .continue/rules/incident-response.md for playbooks and post-mortem templates.

  # ── v2.6.0 Integration & APIs Rules ─────────────────────

  - name: event-driven-architecture
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.tf", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Event-driven systems decouple services via events (immutable facts).
      Always:
        - Use event sourcing (append-only event log, replay for state)
        - Implement CQRS (separate read model from write model)
        - Design idempotent handlers (same event processed twice = same result)
        - Handle eventual consistency (accept temporary lag)
        - Use saga pattern for multi-step processes (compensating transactions)
        - Implement event deduplication (prevent duplicate processing)
      Never:
        - Mix events and commands (event = fact, command = request)
        - Update event log (immutable append-only)
        - Assume synchronous consistency
      See .continue/rules/event-driven-architecture.md for patterns.

  - name: api-gateway-patterns
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      API gateways route requests, compose responses, rate limit, cache, secure.
      Always:
        - Route by path, method, header (service discovery)
        - Compose responses from multiple services (parallel calls)
        - Rate limit per user & endpoint (sliding window, Redis-backed)
        - Cache GET responses (reduce backend load)
        - Version APIs (/api/v1, /api/v2, maintain backward compat)
        - Add security headers (CORS, CSP, HSTS, X-Frame-Options)
      Never:
        - Expose backend services directly
        - Add business logic (belongs in services)
        - Store state (gateways are stateless)
      See .continue/rules/api-gateway-patterns.md for composition.

  - name: message-queue-patterns
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Message queues enable async communication (RabbitMQ, Kafka).
      Always:
        - Use queues for tasks (point-to-point), topics for events (pub-sub)
        - Implement dead letter queue (handle failures)
        - Use durable queues (survive broker restart)
        - Retry with exponential backoff (1s, 2s, 4s, 8s, 16s)
        - Make handlers idempotent (safe to process same message twice)
        - Use consumer groups (distribute load)
        - Set message TTL (prevent infinite queuing)
      Never:
        - Lose messages (configure durability)
        - Process messages out of order (use partition keys)
        - Retry forever (set max retries: 5)
      See .continue/rules/message-queue-patterns.md for RabbitMQ/Kafka.

  - name: webhook-standards
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Webhooks push events to subscribers (real-time integrations).
      Always:
        - Use HTTPS only (encrypted delivery)
        - Sign with HMAC-SHA256 (prevent spoofing)
        - Include timestamp & event ID (prevent replay, detect duplicates)
        - Retry with exponential backoff (max 5 retries)
        - Provide webhook logs/history (delivery status)
        - Disable after max retries (alert subscriber)
        - Verify signature on subscriber side (constant-time comparison)
      Never:
        - Send webhooks over HTTP
        - Skip signature verification
        - Retry forever (DoS vector)
      See .continue/rules/webhook-standards.md for implementation.

  - name: integration-testing
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Integration tests validate components working together.
      Always:
        - Use contract testing (APIs honor contracts)
        - Test E2E workflows (critical paths)
        - Use real/test databases (not mocks)
        - Test data in version control (factories, seeds)
        - Clean up after tests (isolation)
        - Run integration tests in CI/CD (every commit)
        - Maintain ~70% unit, ~20% integration, ~10% E2E tests
      Never:
        - Mock databases in integration tests
        - Skip integration tests
        - Use production data in tests
      See .continue/rules/integration-testing.md for contract testing.

  # ── v2.7.0 Mobile & Cross-Platform Rules ────────────────

  - name: mobile-development
    globs: ["**/*.swift", "**/*.kt", "**/*.tsx", "**/*.dart", "**/*.ts", "**/*.js"]
    alwaysApply: false
    rule: |
      Mobile app standards for iOS (Swift), Android (Kotlin), React Native, Flutter.
      Always:
        - Use platform-native patterns (SwiftUI, Jetpack Compose, React Navigation)
        - Store credentials in secure storage (Keychain, KeyStore, secure_storage)
        - Test on real devices + simulators (different perf profiles)
        - Optimize for battery + memory (lazy load, memoize, unsubscribe)
        - Use async/await (no blocking calls, Thread.sleep, UIViewController.present synchronously)
        - Handle offline gracefully (local DB, sync queue, conflict resolution)
        - Never hardcode API keys, secrets, or configuration
      Never:
        - Store tokens/passwords in plaintext SharedPreferences/AsyncStorage
        - Make synchronous network calls (blocks UI)
        - Log PII, tokens, passwords
        - Ignore memory leaks (retain cycles, unmanaged listeners)
      See .continue/rules/mobile-development.md for platform-specific standards.

  - name: cross-platform-design
    globs: ["**/*.tsx", "**/*.ts", "**/*.dart", "**/*.js"]
    alwaysApply: false
    rule: |
      Cross-platform design: write once, respect platform conventions.
      Always:
        - Use platform abstraction layer (no Platform.OS scattered in components)
        - Adapt UI per platform (iOS: stack nav + swipe back, Android: tabs + back button)
        - Use design tokens (colors, spacing adapt per platform)
        - Test on 2+ platforms + screen sizes (responsive + adaptive)
        - Follow each platform's HIG (Human Interface Guidelines)
      Never:
        - Hardcode platform checks in business logic
        - Use web UI patterns on mobile (hover states, right-click)
        - Assume same screen size (mobile portrait ≠ tablet landscape)
      See .continue/rules/cross-platform-design.md for architecture patterns.

  - name: offline-first
    globs: ["**/*.swift", "**/*.kt", "**/*.tsx", "**/*.dart", "**/*.ts", "**/*.js"]
    alwaysApply: false
    rule: |
      Offline-first: app works without network, syncs when available.
      Always:
        - Load from local DB first (don't wait for network)
        - Queue changes locally when offline (event log, transaction log)
        - Sync in background (don't block user)
        - Handle conflicts (latest-write-wins, merge, user prompt)
        - Use soft deletes (IsDeleted + DeletedAt, enable recovery)
        - Show sync status to user (synced ✓, syncing ↻, offline ⚠)
        - Encrypt local database if storing PII
      Never:
        - Block on network in main thread
        - Hard-delete immediately (prevents sync/recovery)
        - Lose queued changes on app restart (persist event log)
      See .continue/rules/offline-first.md for sync strategies.

  - name: mobile-security
    globs: ["**/*.swift", "**/*.kt", "**/*.tsx", "**/*.dart", "**/*.ts", "**/*.js"]
    alwaysApply: false
    rule: |
      Mobile security: devices are threatened (lost, rooted, jailbroken).
      Always:
        - Store credentials in native secure storage (Keychain, KeyStore)
        - Use OAuth 2.0 + PKCE (not password flow, not implicit)
        - HTTPS only, never HTTP (no exceptions)
        - Implement certificate pinning for sensitive APIs
        - Expire tokens (1hr access, 7d refresh)
        - Detect jailbreak/root (deny access or warn)
        - Obfuscate code (ProGuard, R8, link-time optimization)
        - Don't log sensitive data (PII, tokens, passwords)
      Never:
        - Store passwords (use OAuth, SSO)
        - Hardcode API keys (use remote config)
        - Mix HTTP and HTTPS
        - Skip certificate validation
        - Log debug info to device (screenshot capture risk)
      See .continue/rules/mobile-security.md for credential + network standards.

  - name: app-distribution
    globs: ["**/*.swift", "**/*.kt", "**/*.tsx", "**/*.dart", "**/*.ts", "**/*.js", "*.gradle", "*.plist", "*.pbxproj"]
    alwaysApply: false
    rule: |
      App distribution: signing, submission, beta testing, versioning.
      Always:
        - Use semantic versioning (MAJOR.MINOR.PATCH)
        - Sign releases with appropriate certificates (iOS: distribution, Android: upload key)
        - Beta test 48+ hours before submission (TestFlight, internal testing)
        - Include privacy policy URL, accurate description, screenshots
        - Monitor crashes, ratings, user feedback post-launch
        - Plan update strategy (OTA, forced updates only for critical security)
        - Test on actual devices before submission (not simulator)
      Never:
        - Increment version after submission without changes
        - Hardcode API keys in release builds
        - Submit untested builds
        - Use test/development certificates for production
      See .continue/rules/app-distribution.md for store submission + versioning.

  # ── v2.8.0 AI Behavior Rules ──────────────────────────

  - name: honesty-and-uncertainty
    alwaysApply: true
    rule: |
      Epistemic standards for all responses:
      - Signal confidence: "I'm confident...", "I'm inferring...", "I'm not certain..."
      - Never assert file paths, function names, or API behavior not seen in current context
      - "I don't know" is a valid and correct answer — prefer it over fabrication
      - Distinguish: verified fact (read it) vs. inference (reasoning from patterns) vs. guess
      - Constitutional hierarchy: accuracy > helpfulness
      See .continue/rules/honesty-and-uncertainty.md for confidence signaling patterns.

  - name: adaptive-reasoning
    alwaysApply: true
    rule: |
      Chain-of-thought and self-verification for all chat responses:
      - Non-trivial questions: restate interpretation, then answer, then caveats
      - Before delivering code: mentally verify async/await, null safety, CancellationToken
      - Adapt depth to expertise: novice gets WHY, expert gets trade-offs only
      - Never deliver two contradictory recommendations in the same response
      See .continue/rules/adaptive-reasoning.md for reasoning templates and expertise signals.

  - name: session-context
    alwaysApply: true
    rule: |
      Session memory and consistency for all responses:
      - Reference earlier conversation decisions rather than re-deciding silently
      - Contradict a prior decision only by explicitly flagging the contradiction
      - Never ask for information the user already provided in this session
      - Build on prior answers — don't restate established facts
      See .continue/rules/session-context.md for consistency patterns.

  # ── v2.9.0 Orchestrator Intelligence Rule ─────────────

  - name: routing-intelligence
    alwaysApply: false
    rule: |
      PowerPlay command routing heuristics:
      - /security-scan (quick table) vs /security-agent (table + fix code) vs /zero-trust-design (architecture)
      - /add-tests (single class) vs /generate-tests-complete (full suite) vs /coverage-gaps (gap analysis)
      - /performance-check (issue table) vs /perf-optimize (with before/after code)
      - /optimize-sql (stored procedure) vs /database-design (schema review) vs /data-model (from requirements)
      - /refactor-inline (one transformation, code only) vs /refactor-large (plan) vs /refactor-module (dependency map)
      - /review (standard) vs /pr-review (diff + approve/reject) vs /audit-all (all dimensions)
      - /inline-review (quick) vs /review (standard) vs /audit-all (comprehensive)
      - Complexity tiers: Quick (< 100 lines, user says "just/quick") | Standard | Full ("complete/entire/suite")
      - Multi-intent rule: Execute primary intent fully, then suggest follow-up command
      - Default routing: Code → /review, Concepts → /think-through, Unknown → ask one clarifying question
      - /pp-requirements (full 4-phase chain, shared memory) vs individual agents with HANDOFF BLOCK copy-paste for manual stepping
      - /requirements-to-specs (business req → spec) vs /acceptance-criteria (story → criteria) vs /requirements-review (quality check)
      See .continue/rules/routing-intelligence.md for full routing decision trees.

  # ── v3.0.0 Requirements Phase Rules ──────────────────

  - name: requirements-elicitation
    alwaysApply: false
    rule: |
      User story format: As a [role], I want [feature], so that [benefit].
      Acceptance criteria: Given/When/Then (Gherkin). One criterion = one scenario.
      INVEST: Independent, Negotiable, Valuable, Estimable, Small, Testable.
      ALWAYS: Measurable thresholds ("< 200ms at P95"), specific roles, testable outcomes.
      NEVER: "fast", "easy", "should", "many", "appropriate" — replace with measurable specifics.
      Completeness: functional reqs (REQ-F-###), NFRs, edge cases, error scenarios, security, performance.
      See .continue/rules/requirements-elicitation.md for templates and anti-patterns.

  - name: feasibility-assessment
    alwaysApply: false
    rule: |
      3 feasibility dimensions: Technical (can we build it?) | Resource (capacity?) | Timeline (deliver by X?)
      Risk tiers: Low (start directly) | Medium (document + mitigate) | High (spike first) | Critical (STOP, mandatory spike)
      Estimation: T-shirt sizing at requirements, story points at architecture, hours in sprint only.
      Definition of Ready: story format, acceptance criteria, INVEST, feasibility assessed, risk tier assigned,
        spike complete if High/Critical, dependencies identified, NFRs documented, story sized.
      NEVER start development on Critical-tier risk without a completed spike.
      See .continue/rules/feasibility-assessment.md for DoR checklist and estimation patterns.

