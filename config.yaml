      Step 3: Volumes — persistent data, code hot-reload for development
      Step 4: Networking — service-to-service DNS, health checks
      Step 5: Security — non-root user, secrets via .env, no hardcoded credentials
      Output: Dockerfile + docker-compose.yml + .dockerignore + local development guide.

  - name: kubernetes-deploy
    description: "Generate Kubernetes manifests — deployments, services, ingress, ConfigMaps, Secrets"
    invokable: true
    prompt: |
