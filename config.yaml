      Step 2: Request bodies — define schemas for POST/PUT/PATCH request bodies
      Step 3: Responses — define 200, 400, 401, 403, 404, 500 response schemas
      Step 4: Auth — document security schemes (JWT bearer token, API key, etc.)
      Step 5: Examples — add realistic request/response examples for each endpoint
      Output: Complete OpenAPI 3.0 YAML spec, ready to paste into swagger config or tools.

