      Step 2: Story variants — default, primary, secondary, danger, disabled, loading, error states
      Step 3: a11y testing — accessibility addon setup, no WCAG AA violations, color contrast checks
      Step 4: Interaction tests — play() function with userEvent, test clicks, form submission, keyboard
      Step 5: Chromatic — visual regression baseline, screenshot comparison on PRs, CI integration
      Output: Complete .stories.tsx files + storybook config + Chromatic CI setup + interaction tests.

  - name: performance-audit
    description: "Audit and optimize Core Web Vitals, bundle size, and performance budgets"
    invokable: true
    prompt: |
