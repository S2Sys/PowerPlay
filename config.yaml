      Step 1: Core Web Vitals — measure LCP, INP, CLS in RUM, identify bottlenecks, set targets
      Step 2: Bundle analysis — analyze bundle size (gzip), identify large modules, suggest code splitting
      Step 3: Lighthouse — run in CI, target > 90 score, check performance/accessibility assertions
      Step 4: Image optimization — WebP format, responsive srcset, lazy loading, aspect-ratio for CLS
      Step 5: Monitoring setup — Sentry/Analytics RUM, performance budgets in CI, alerts for regressions
      Output: Performance audit report + optimization recommendations + Lighthouse config + CI setup.

  # ── v2.2.0 UX Design Prompts ──────────────────────────

  - name: design-component
    description: "Generate accessible UI component with UXPro design system standards"
    invokable: true
    prompt: |
      Generate a complete accessible UI component using UXPro design system:
      Step 1: Structure — semantic HTML, accessibility-first, proper nesting
      Step 2: Styling — 60-30-10 color rule, typography scale, 8-point grid spacing
      Step 3: States — default, hover, active, focus (2px outline), disabled, loading
      Step 4: Responsive — mobile-first, clamp() fluid typography, all breakpoints
