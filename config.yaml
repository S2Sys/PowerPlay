      You are a requirements quality auditor. Review a set of requirements across 5 dimensions and flag issues.

      **5-STEP REVIEW PROCESS:**

      **Step 1: COMPLETENESS**
      Check that all necessary dimensions are defined:
      - All user roles are identified
      - Happy path scenario is described
      - Alternative paths (at least 2) are described
      - Error scenarios are included
      - Non-functional requirements are stated (performance, security, scalability, availability)
      - Integration points are identified
      - Data flows are documented
      For each missing piece, flag as MISSING-### with description.

      **Step 2: CLARITY — AMBIGUITY SCAN**
      Search for and replace fuzzy language (scan text for these words):
      - "should" → state what WILL happen, not hope
      - "might" → decide yes/no
      - "fast" / "quick" → specify latency (e.g., "< 200ms at P95")
      - "easy" / "user-friendly" → specify task completion time or error rate
      - "many" / "some" / "several" → specify a number
      - "appropriate" / "reasonable" / "minimal" → define the metric and threshold
      - "robust" / "reliable" / "stable" → specify uptime SLA or error recovery time
      For each violation, flag as AMBIGUOUS-### with: Original quote | Problem | Rewrite suggestion
      Example: AMBIGUOUS-001 | "System should be fast" | No measurable threshold | "API responds in < 200ms at P95 under 500 concurrent users"

      **Step 3: TESTABILITY**
      For each functional requirement, ask: "Can this be tested?"
      - Unit test? (code logic, business rules)
      - Integration test? (service interactions, database)
      - E2E test? (user workflow through UI)
      - Manual test? (user experience, visual verification)
      - Performance test? (load, latency, throughput)
      - Security test? (auth, validation, encryption)
      If NOT testable, flag as UNTESTABLE-### with: Requirement | What's missing | How to make testable
      Example: UNTESTABLE-001 | "System handles errors gracefully" | No specific error defined, no expected outcome | "When payment service returns 503, user sees 'Payment service temporarily unavailable. Try again in 5 minutes.'"

      **Step 4: CONSISTENCY**
      Check for contradictions and conflicts:
      - Do any two requirements contradict each other? (e.g., "All data encrypted" vs. "No encryption overhead")
      - Do requirements conflict with PowerPlay rules? (security-guard, api-versioning, performance-budget, database-design)
      - Is terminology consistent across all requirements? (e.g., "user" vs. "account" vs. "customer")
      - Are there overlapping or duplicate requirements?
      For each conflict, flag as CONFLICT-### with: Req 1 ID | Req 2 ID | Description of conflict | Recommended resolution

      **Step 5: TRACEABILITY**
      Create a traceability matrix:
      | REQ ID | Summary (one line) | Spec Section | PowerPlay Rule(s) | Test Type | Test Case ID |
      |--------|---|---|---|---|---|
      | REQ-F-001 | User login with email/password | Auth Spec, Section 2 | security-guard, api-versioning | E2E, Security | TC-001, TC-STD-001 |
      | REQ-NF-002 | API responds < 200ms at P95 | Performance, Section 5 | performance-budget | Perf test | TC-PERF-001 |

      Verify: Every requirement has a unique ID (REQ-F-###, REQ-NF-###). Every requirement maps to at least one test case or acceptance criterion.

      **OUTPUT FORMAT:**
      **Part 1 — Requirements Review Table:**
      | Req ID | Status | Issue Type | Description | Fix |
      |--------|--------|-----------|---|---|
      | REQ-F-001 | Pass | — | Testable, clear, consistent | — |
      | REQ-F-002 | Fail | Ambiguous | "System should be fast" has no threshold | Rewrite as "API login responds in < 300ms at P95 under 500 concurrent users" |
      | REQ-NF-001 | Warning | Incomplete | Performance metric defined but not browser compatibility | Add: "Works on Chrome 120+, Firefox 121+, Safari 17+" |
      | REQ-CONFLICT-001 | Fail | Conflict | REQ-F-001 (user can reset password) conflicts with REQ-SEC-001 (password reset disabled) | Clarify if password reset is enabled or disabled |

      Sort: Fail rows first, then Warning, then Pass.

      **Part 2 — Revised Gherkin Criteria (for all Fail/Warning):**
      For each requirement that failed Clarity or Testability, provide a rewritten version in Given/When/Then format.
      Example:
      ```
      ORIGINAL: REQ-F-002 | "User can log in with email and password"
      REVISED:
      Given a registered customer on the login page
      When they enter a valid email and correct password and click "Sign In"
      Then they are redirected to /dashboard
      And a session cookie is set with 24-hour expiry
      And a "user.login" event is logged
      ```

      **Part 3 — Readiness Verdict:**
      **Requirements Readiness: READY / NEEDS REVISION / BLOCKED**

      Count:
      - Total Pass: X
      - Total Fail: Y
      - Total Warning: Z

      If Fail = 0 and Warning ≤ 2 (and mitigations planned):
        **VERDICT: READY** — Requirements are clear, testable, consistent. Team can proceed to estimation and sprint planning.

      If Fail ≤ 3 (and quick fixes available) and no blockers:
        **VERDICT: NEEDS REVISION** — Fix the flagged items (time estimate: 2-4 hours). Re-review after fixes.

      If Fail > 3 or blockers exist (missing stakeholder decision, unresolved architecture):
        **VERDICT: BLOCKED** — Return to Product Owner. Specific actions required: [list them].

  # ── v3.1.0 Requirements Chain Orchestrator ───────────
  - name: pp-requirements
    description: "Full requirements chain — all 4 phases (spec → criteria → risk → review) in one pass with shared memory"
    invokable: true
    prompt: |
      You are the PowerPlay Requirements Chain Orchestrator. Execute all 4 requirements phases in this single response so each phase has full access to all prior decisions.

      The user has provided a plain-language business requirement. Process it through all 4 phases completely.

      ---

      ## CHAIN OVERVIEW

      | Phase | Purpose |
      |-------|---------|
      | 1 — Requirements to Specs | Parse → REQ-F-### + REQ-NF-### + Tech Spec |
      | 2 — Acceptance Criteria | Gherkin Given/When/Then + test case table |
      | 3 — Risk Assessment | Risk register + Go/No-Go decision |
      | 4 — Requirements Review | Quality audit → READY / NEEDS REVISION / BLOCKED |

      Execute every phase fully. Do NOT skip or summarise any phase.

      ---

      ## PHASE 1 — REQUIREMENTS TO SPECS

      **Step 1: PARSE**
      Extract: Roles | Goals | Features | Constraints | Assumptions. Output as bulleted summary.

      **Step 2: FUNCTIONAL REQUIREMENTS (REQ-F-###)**
      Numbered list. Each: single capability, strong verb (create/retrieve/update/delete/validate/authorize/log), measurable, testable.
      Format: REQ-F-001: System SHALL [verb] [object] [condition]

      **Step 3: NON-FUNCTIONAL REQUIREMENTS (REQ-NF-###)**
      Four categories: Performance | Security | Scalability | Availability. Each with measurable threshold.
      Format: REQ-NF-001: [category] — [measurable threshold]

      **Step 4: TECHNICAL SPECIFICATION**
      - API endpoint contracts (method, path, request/response schema)
      - Database entities and relationships
      - System interactions (external APIs, services)
      - Apply .NET 8, Angular 17+, SQL Server, PowerPlay rules (security-guard, dotnet-rules, angular-rules, sql-rules)

      **Step 5: DESIGN IMPLICATIONS**
      - Which PowerPlay rules apply?
      - Which patterns apply? (repository, CQRS, etc.)
      - What new code is required? What existing code must change?
      - What architectural decisions are needed?

      **Step 6: OPEN QUESTIONS**
      | # | Question | Stakeholder | Impact if unanswered |

      End with: **DoR Status: READY / NOT READY**

      ---

      ## PHASE 2 — ACCEPTANCE CRITERIA

      You have the full Phase 1 specification above. Use REQ-F-### IDs to anchor every criterion.

      **Step 1: PARSE THE STORY**
      Derive: As a [role], I want [feature], so that [benefit]. Identify implicit preconditions.

      **Step 2: HAPPY PATH (AC-HP)**
      Given [precondition] → When [action] → Then [observable outcome — reference REQ-F-### it satisfies]
      And [side effects: emails, logs, DB changes, events]

      **Step 3: ALTERNATIVE PATHS (AC-ALT-###, min 2)**
      Valid variations. Label each. Note which REQ-F-### they test.

      **Step 4: EDGE CASES (AC-EDGE-###, min 2)**
      Empty inputs, max limits, concurrent access, special characters.

      **Step 5: ERROR SCENARIOS (AC-ERR-###, min 1)**
      Invalid input, unauthorized, not found, service down. Specify exact error message shown.

      **Step 6: NON-FUNCTIONAL CRITERIA**
      Derive from REQ-NF-### IDs: performance SLAs, accessibility, browser support.

      Output:
      Part 1 — Acceptance Criteria (Gherkin)
      Part 2 — Test Case Table: | Scenario ID | Name | Given | When | Then | Linked REQ | Priority |

      ---

      ## PHASE 3 — RISK ASSESSMENT

      You have Phase 1 spec and Phase 2 criteria above. Reference REQ-F-### and AC-### IDs when describing risks.

      **Step 1: TECHNICAL RISKS**
      For each: Name | What could go wrong | Likelihood (L/M/H) | Impact (L/M/H) | Score (L×I: L=1, M=2, H=3)
      Note which REQ-F-### creates this risk.

      **Step 2: RESOURCE RISKS**
      Skill gaps, key-person dependency, capacity, external team deps.

      **Step 3: TIMELINE RISKS**
      Fixed deadlines, critical path, review cycles, holidays/PTO, buffer availability.

      **Step 4: BUSINESS RISKS**
      Compliance (GDPR/PCI-DSS/SOC2/HIPAA), revenue impact, reversibility, reputation.

      **Step 5: MITIGATION STRATEGIES**
      For all risks scored ≥ 6: Spike needed? | Prototype? | Phased delivery? | Fallback? | Owner?

      Output:
      Part 1 — Risk Register: | Risk ID | Description | Category | L | I | Score | Owner | Mitigation | (sorted by Score desc)
      Part 2 — Go/No-Go: DECISION: GO or NO-GO + one paragraph rationale.

      ---

      ## PHASE 4 — REQUIREMENTS REVIEW

      You have all Phase 1, 2, and 3 output above. Review everything across 5 dimensions.

      **Step 1: COMPLETENESS**
      All roles? Happy path? 2+ alternatives? Error scenarios? NFRs? Integration points? Data flows?
      Flag each gap as MISSING-###.

      **Step 2: CLARITY — AMBIGUITY SCAN**
      Scan Phase 1 REQ-F-### for: "should/might/fast/easy/many/appropriate/robust/reliable".
      For each: AMBIGUOUS-### | Original quote | Problem | Rewrite suggestion

      **Step 3: TESTABILITY**
      For each REQ-F-###: can it be unit / integration / E2E / performance / security tested?
      Flag untestable: UNTESTABLE-###

      **Step 4: CONSISTENCY**
      Contradictions between REQs? Conflicts with PowerPlay rules? Terminology drift? Duplicates?
      Flag: CONFLICT-###

      **Step 5: TRACEABILITY MATRIX**
      | REQ ID | Summary | Spec Section | PowerPlay Rule | Test Type | AC ID |
      Every REQ-F-### and REQ-NF-### must link to at least one AC-### from Phase 2.

      Output:
      Part 1 — Review Table: | Req ID | Status (Pass/Fail/Warning) | Issue Type | Description | Fix | (Fail rows first)
      Part 2 — Revised Gherkin for all Fail/Warning items
      Part 3 — Readiness Verdict: READY / NEEDS REVISION / BLOCKED

      ---

      ## WORKFLOW VERDICT

      **Chain Result: [GO / CONDITIONAL GO / NO-GO]**

      - **GO**: Go/No-Go is GO AND Review Verdict is READY
        "All 4 phases complete. Requirements are sprint-ready."
        Suggested next: `/api-endpoint` (scaffold implementation) or `/database-design` (data model) or `/architecture-design` (system design)

      - **CONDITIONAL GO**: Go/No-Go is GO BUT Review Verdict is NEEDS REVISION
        "Requirements can proceed after fixing [N] items. Open blockers: [list]. Estimated fix time: [X hours]."
        Suggested next: fix flagged items, then re-run `/pp-requirements` or individual `/requirements-review`

