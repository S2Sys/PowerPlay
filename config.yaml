# ─────────────────────────────────────────────────────────
# PARALLEL PROCESSING — v3.9.0 Configuration
# ─────────────────────────────────────────────────────────

parallelProcessing:
  enabled: true
  workerPoolSize: 4                    # Range: 4-8 workers
  maxConcurrentPatterns: 3             # Max patterns per group
  defaultTimeout: 600                  # Default timeout in seconds

  # Load balancing strategy
  loadBalancing:
    strategy: least-busy               # Options: round-robin, least-busy, weighted
    retryPolicy: exponential-backoff   # Options: exponential-backoff, linear, none
    maxRetries: 3

  # Circuit breaker for resilience
  circuitBreaker:
    enabled: true
    failureThreshold: 5                # Failures before opening
    resetTimeout: 30                   # Seconds before half-open attempt
    monitorInterval: 10                # Health check interval in seconds

  # Output caching
  caching:
    enabled: true
    ttl: 3600                          # 1 hour cache lifetime in seconds
    strategy: lru                      # Options: lru, lfu, fifo
    maxSize: 1000                      # Max cached pattern results
    invalidateOn:
      - architecture-change
      - requirement-update
      - config-change

  # Parallel group definitions (pattern sets that can run together)
  parallelGroups:

    codeGeneration:
      name: "Code Generation Phase"
      patterns: [/api-endpoint, /ng-component, /react-component]
      timeout: 600
      conflictResolution: merge
      dependencies: []
      priority: 1

    architecture:
      name: "Architecture & Design Phase"
      patterns: [/architecture-design, /database-design, /design-system-setup]
      timeout: 300
      conflictResolution: merge
      dependencies: []
      priority: 1

    testing:
      name: "Testing Phase"
      patterns: [/add-tests, /visual-regression-testing, /api-contract-testing]
      timeout: 300
      conflictResolution: merge
      dependencies: [codeGeneration, architecture]
      priority: 2

    deployment:
      name: "Deployment & Infrastructure"
      patterns: [/docker-containerize, /kubernetes-deploy, /iac-generate]
      timeout: 300
      conflictResolution: merge
      dependencies: [codeGeneration]
      priority: 3

    security:
      name: "Security & Compliance"
      patterns: [/threat-modeling, /cloud-security-posture, /dependency-scanning-continuous]
      timeout: 300
      conflictResolution: merge
      dependencies: [architecture]
      priority: 2

# ─────────────────────────────────────────────────────────
# PROMPTS — /slash commands
# ─────────────────────────────────────────────────────────
prompts:
  - name: review
    description: "Full code review — bugs, patterns, security"
    invokable: true
    prompt: |
      Perform a thorough code review. Structure as:
      ## Summary — one sentence
      ## Issues Found — table: Severity | Line | Issue | Fix
      ## Security Concerns — SQL injection, XSS, exposed secrets, auth
      ## Performance Notes — N+1, blocking calls, missing indexes
      ## Suggested Refactors — SOLID violations, design patterns
      Be direct. Include code snippets for every fix.

  - name: add-docs
    description: "Add XML documentation comments"
    invokable: true
    prompt: |
      Add XML docs to all public members:
      <summary>, <param>, <returns>, <exception>, <remarks>.
      Add <example> for utility methods. Keep logic unchanged.

  - name: ng-component
    description: "Generate Angular standalone component"
    invokable: true
    prompt: |
      Generate a complete Angular 17+ standalone component:
      - inject(), OnPush, standalone: true
      - Typed FormGroup<T> if form needed
      - Service interface + implementation
      - DevExtreme HTML template
      - SCSS with sw- BEM naming
      Output: compilable component + service + model files.

  - name: explain-deep
    description: "Deep explanation of complex code"
    invokable: true
    prompt: |
      Explain this code:
      1. Problem it solves
      2. Step-by-step logic
      3. Key design decisions
      4. Potential failure modes
      5. How to improve it
      Use ASCII diagrams for complex flows.

  # ── v1.1.0 Inline Actions ──────────────────────────────
  - name: inline-review
    description: "Inline code review — annotated issues with severity"
    invokable: true
    prompt: |
      Quick inline review of selected code.
      Format: Severity | Line | Issue | Fix Code
      Keep it tight — one issue per row, no explanations.
      Severity: Critical | Warning | Info
      Include specific line numbers and code snippets.

  - name: quick-fix
    description: "Auto-fix the selected code — apply best practices"
    invokable: true
    prompt: |
      Fix the selected code. Output ONLY the corrected code block.
      No explanation, no comments, just the fixed code.
      Apply: proper naming, async/await, error handling, nullable types, IDisposable.
      Make it production-ready in one pass.

  - name: explain-inline
    description: "Explain selected code with inline comments"
    invokable: true
    prompt: |
      Add // comments to explain the selected code.
      One comment per meaningful line.
      Tone: explain to a junior developer.
      Output: same code with // comments added.
      Never change logic, only add explanations.

  - name: add-types
    description: "Add TypeScript types or C# explicit types"
    invokable: true
    prompt: |
      Add types to the selected code.
      TypeScript: replace 'any', add param/return types, add generic constraints.
      C#: replace 'var' with explicit types, add nullable annotations (#nullable enable).
      Output: typed code only, no explanation.
      Make every type as specific as possible.

  # ── v1.1.0 Utility Prompts ─────────────────────────────
  # ── v1.2.0 Automation Prompts ──────────────────────────
  - name: doc-complete
    description: "Generate complete documentation — XML docs, examples, README"
    invokable: true
    prompt: |
      Generate complete documentation for this code:
      1. XML docs on all public members (<summary>, <param>, <returns>, <exception>, <example>)
      2. Usage examples (2-3 realistic scenarios with code)
      3. README section: description, how to use, error handling, gotchas
      Keep logic unchanged. Output annotated code + README markdown block.

  - name: migrate-version
    description: "Create migration plan for version/framework upgrade"
    invokable: true
    prompt: |
      Create a migration plan for the described version or framework upgrade.
      Step 1: Breaking changes — what will break, why, impact assessment
      Step 2: Migration steps — ordered, safe, incremental steps
      Step 3: Code changes — before/after examples for key patterns
      Step 4: Testing plan — how to verify migration succeeded, integration test steps
      Output: numbered migration guide with code examples and safety notes.

  - name: audit-all
    description: "Full audit — security, performance, quality, coverage, docs"
    invokable: true
    prompt: |
      Full audit of selected code across all dimensions.
      ## Security (OWASP Top 10)
      Table: Severity | Issue | Fix Code | Recommendation
      ## Performance
      Table: Issue | Impact | Fix | Estimated Improvement
      ## Code Quality
      SOLID violations, complexity, duplication, naming, patterns
      ## Test Coverage
      What's missing, high-value tests to add, coverage gap estimate
      ## Documentation
      What's undocumented, examples missing
      Be direct and specific. Include fix code for every issue. Prioritize by impact.

  # ── v2.0.0 Agent Prompts ──────────────────────────────
  - name: pr-review
    description: "Autonomous PR review — quality, security, performance, testing, docs"
    invokable: true
    prompt: |
      Autonomous PR review of this diff or selection:
      Step 1: Code quality — complexity, duplication, SOLID, naming conventions
      Step 2: Security — OWASP Top 10, injection risks, secrets, auth
      Step 3: Performance — N+1 queries, allocations in loops, blocking awaits
      Step 4: Testing — coverage gaps, test quality, edge cases missing
      Step 5: Documentation — missing docs, stale comments, API changes
      Step 6: Summary — table: Category | Severity | Issue | Line | Fix
      Output: Approve if no High/Critical issues. Request changes otherwise.

  - name: workspace-learn
    description: "Analyse project conventions, detect SmartWorkz patterns, suggest top 5 relevant PowerPlay commands"
    invokable: true
    prompt: |
      You are a codebase analyst. Analyse this project and produce a structured conventions document.

      ## Step 1: STANDARD CONVENTIONS
      Examine:
      1. Naming conventions — files, classes, methods, variables (C#, TypeScript, SCSS)
      2. Folder structure and module boundaries — where do controllers/services/repos live?
      3. Recurring patterns — repository pattern, service layer, component patterns, DI registration
      4. Error handling — ProblemDetails? global exception middleware? controller-level try/catch?
      5. Testing approach — framework (xUnit/Jasmine), naming pattern, coverage targets, test data strategy
      6. Key architectural decisions — layering, DI, state management (signals/BehaviorSubject), auth flow

      ## Step 2: SMARTWORKZ PATTERN DETECTION
      Detect and report each (PRESENT / ABSENT / PARTIAL):
      - **DevExtreme components** — dxGrid, dxForm, dxButton etc.? What version?
      - **Dapper vs EF Core** — which ORM? Are both present (mixed)?
      - **Angular inject()** — constructor injection or inject() dominant pattern?
      - **ILogger<T>** — structured logging used? Log levels correct?
      - **sw- BEM CSS prefix** — does SCSS follow sw-component__element--modifier naming?
      - **async/await with CancellationToken** — are CancellationToken parameters passed through?
      - **FluentValidation** — used at controller boundary or inline only?
      - **Primary constructors (C# 12)** — used, or old-style constructors?

      ## Step 3: POWERPLAY FIT ANALYSIS
      Based on detected patterns, suggest the top 5 most relevant PowerPlay commands for THIS project:
      Format: `/command-name` — [one sentence why this fits this specific codebase]
      Rank by: estimated usage frequency × impact.

      ## Step 4: WORKSPACE CONTEXT BLOCK
      Emit this block at the end (future /pp calls can read it as context):
      ---
      ## WORKSPACE CONTEXT — [ProjectName]
      **Generated**: [date]
      **Stack**: [detected stack — e.g., .NET 8 / Angular 17 / SQL Server / Dapper]
      **ORM**: [Dapper | EF Core | Mixed]
      **CSS Convention**: [sw-BEM | BEM | utility-first | none detected]
      **Injection Pattern**: [inject() | constructor | mixed]
      **Logging**: [ILogger<T> structured | Console | none detected]
      **Test Framework**: [xUnit | Jasmine | both | none detected]
      **CancellationToken**: [consistent | inconsistent | absent]
      **DevExtreme**: [version X.Y | absent]
      **C# Version**: [12 (primary constructors) | 11 | 10 | unknown]
      **Key Deviations from PowerPlay Rules**: [list or "None detected"]
      **Top 5 Relevant Commands**: /[cmd1], /[cmd2], /[cmd3], /[cmd4], /[cmd5]
      ---

      ## Step 5: OUTPUT FILE
      Save full output (Steps 1-4) to: docs/WORKSPACE_CONVENTIONS.md
      If the file already exists, prepend a ## Update — [date] section and keep prior content below it.

  # ── v2.1.0 Data & Observability Prompts ───────────────
  - name: observability-audit
    description: "Audit logging, tracing, metrics — find gaps and suggest fixes"
    invokable: true
    prompt: |
      Audit observability in this code:
      Step 1: Logging gaps — identify missing log statements for errors and critical paths
      Step 2: Log quality — check for structured logging (key=value), not string interpolation
      Step 3: Sensitive data — flag any PII, secrets, tokens being logged
      Step 4: Tracing — identify missing correlation IDs and activity spans
      Step 5: Metrics — suggest counters/histograms for key operations
      Output: Table of gaps (Operation | Gap | Severity) + exact code fixes (structured log statements).

  - name: git-workflow
    description: "Git branch naming, commit message rewrite, squash plan"
    invokable: true
    prompt: |
      Git workflow assistance:
      Step 1: Branch name — suggest branch name from ticket/description (feature/123-title)
      Step 2: Commits — rewrite staged commit messages to Conventional Commits format
               (feat(scope): description | fix(scope): description | chore: description)
      Step 3: Squash plan — identify which commits should be squashed before merge
      Step 4: Conflict guidance — explain merge conflicts and resolution strategy
      Output: Suggested branch name + rewritten commit messages + squash plan (commit 1 pick, 2-3 squash, 4 pick).

  - name: dep-update
    description: "Audit dependencies, identify outdated packages, CVEs, safe update path"
    invokable: true
    prompt: |
      Dependency audit and update guidance:
      Step 1: Outdated — list packages behind latest stable version
      Step 2: CVE check — flag packages with known security vulnerabilities
      Step 3: Breaking changes — for each outdated package, identify breaking changes
      Step 4: Safe update path — ordered update steps (patch → minor → major if needed)
      Step 5: Test plan — what to test after each update (unit tests, integration tests)
      Output: Table: Package | Current | Latest | Days Outdated | CVE | Breaking Changes | Safe to Update.

  # ── v2.4.0 Cloud & DevOps Prompts ─────────────────────
  - name: aws-design
    description: "Design AWS architecture — Lambda, S3, RDS, DynamoDB, API Gateway, CloudFront"
    invokable: true
    prompt: |
      Design AWS architecture for this application:
      Step 1: Serverless decision — Lambda vs containers vs managed services (App Runner, Fargate)
      Step 2: Database choice — RDS (relational), DynamoDB (NoSQL), or specialized (ElastiCache, Redshift)
      Step 3: API layer — API Gateway + Lambda or ALB + instances, rate limiting, WAF
      Step 4: Storage — S3 for static assets, CloudFront for CDN, versioning and lifecycle policies
      Step 5: Monitoring — CloudWatch metrics/logs, X-Ray tracing, alarms for critical metrics
      Output: AWS architecture diagram + resource list + estimated costs + security checklist.

  - name: azure-setup
    description: "Generate Azure deployment — App Service, Functions, SQL Database, monitoring setup"
    invokable: true
    prompt: |
      Generate Azure deployment configuration:
      Step 1: Compute choice — App Service, Azure Functions, Container Instances, App Service Environment
      Step 2: Database — Azure SQL Database, Cosmos DB, MySQL/PostgreSQL managed
      Step 3: Networking — Virtual Network, private endpoints, Application Gateway, WAF
      Step 4: Security — Managed Identity, Key Vault, TLS/HTTPS, encryption at rest
      Step 5: Monitoring — Application Insights setup, metric alerts, log queries
      Output: Bicep infrastructure code + deployment guide + cost estimation.

  - name: docker-containerize
    description: "Generate Dockerfile and Docker Compose for containerization"
    invokable: true
    prompt: |
      Generate containerization setup:
      Step 1: Multi-stage Dockerfile — separate builder and runtime, minimize image size
      Step 2: Docker Compose — define app, database, cache, nginx services
      Step 3: Volumes — persistent data, code hot-reload for development
      Step 4: Networking — service-to-service DNS, health checks
      Step 5: Security — non-root user, secrets via .env, no hardcoded credentials
      Output: Dockerfile + docker-compose.yml + .dockerignore + local development guide.

  - name: kubernetes-deploy
    description: "Generate Kubernetes manifests — deployments, services, ingress, ConfigMaps, Secrets"
    invokable: true
    prompt: |
      Generate Kubernetes deployment manifests:
      Step 1: Namespace — isolation for environment (dev, staging, production)
      Step 2: Deployments — replicas, resource requests/limits, liveness/readiness probes
      Step 3: Services — ClusterIP for internal, LoadBalancer/Ingress for external
      Step 4: ConfigMaps — non-secret configuration (environment variables)
      Step 5: HPA — auto-scaling based on CPU/memory metrics
      Output: YAML manifests (namespace, deployment, service, ingress, hpa) + Helm chart structure.

  - name: iac-generate
    description: "Generate Terraform or Bicep infrastructure code"
    invokable: true
    prompt: |
      Generate Infrastructure as Code:
      Step 1: Provider setup — AWS/Azure configuration, remote state (S3/Terraform Cloud)
      Step 2: Modules — network, compute, database, storage modules
      Step 3: Variables — input variables with validation, environment-specific overrides
      Step 4: State management — encryption, locking, backup configuration
      Step 5: Outputs — reference created resources, export for other stacks
      Output: Complete Terraform .tf files or Bicep .bicep files + variables.tf + outputs.tf + backend config.

  # ── v2.3.0 Advanced UI Patterns Prompts ───────────────
  # ── v2.2.0 UX Design Prompts ──────────────────────────
  # ── v2.6.0 Integration & APIs Prompts ──────────────────
  # ── v2.7.0 Mobile & Cross-Platform Prompts ────────────────
  # ── v2.8.0 AI Behavior Prompts ────────────────────────
  - name: think-through
    description: "Force explicit chain-of-thought — decompose, state assumptions, reason, rate confidence"
    invokable: true
    prompt: |
      Work through this problem explicitly. Do not skip to the answer.

      Step 1: RESTATE
        Restate the problem in your own words (1-2 sentences).
        If ambiguous, state the interpretation you are using.

      Step 2: DECOMPOSE
        Break into sub-problems. List them as numbered items.
        If any sub-problem requires information you don't have: name it as an unknown.

      Step 3: ASSUMPTIONS
        List every assumption you are making.
        Format: "Assuming [X] because [reason]. Confidence: HIGH / MEDIUM / LOW"

      Step 4: REASONING
        For each sub-problem: state reasoning in 2-4 sentences.
        Show trade-offs where multiple valid approaches exist.
        Do not jump to code until reasoning is complete.

      Step 5: ANSWER
        Give the actual answer, informed by the above reasoning.
        Include code where relevant, but let the reasoning precede it.

      Step 6: CONFIDENCE + CAVEATS
        Confidence rating: HIGH (verified) / MEDIUM (reasoning from patterns) / LOW (guess)
        Caveats: what could make this answer wrong?
        What should the user verify independently?

  - name: calibrate
    description: "Calibrate AI responses — rate accuracy/depth/format, adjust approach for session"
    invokable: true
    prompt: |
      Calibrate my responses to be more useful to you.

      About my last response:

      1. ACCURACY CHECK
         Was the information correct?
         If anything was wrong or misleading, what was it?

      2. DEPTH CHECK
         Too detailed, too brief, or about right for your expertise level?
         Did I explain things you already know? Skip things you needed?

      3. FORMAT CHECK
         Too much prose? Not enough code? Too many steps?
         What format would have worked better?

      4. WHAT WOULD HAVE BEEN MORE USEFUL
         If you could rewrite my response, what would you change?

      Based on your answers I will adjust:
      - Explanation depth for the rest of this session
      - How much I narrate reasoning vs. just give the answer
      - Whether to show alternatives or just recommend one approach
      - How much validation/caveats to include

      Short answers are fine — "too verbose", "just the code", "too simple" is enough.

