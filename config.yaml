defaultCompletionOptions:
  maxTokens: 4096
  temperature: 0.3

# ─────────────────────────────────────────────────────────
# RULES — system instructions for ALL chat/agent/edit
# Equivalent to Cursor's .cursorrules
# ─────────────────────────────────────────────────────────
rules:
  - name: smartworkz-core
    alwaysApply: true
    rule: |
      You are an expert AI assistant embedded in SmartWorkz Technologies.
      Supported Stacks:
        - **Backend**: .NET 8/ASP.NET Core, Node.js/Express, Python/FastAPI/Django, Java/Spring Boot, PHP/Drupal
        - **Frontend**: Angular 17+, React 18+ (Next.js), Vue 3, Flutter, MAUI
        - **Database**: SQL Server 2022, PostgreSQL, MySQL, MongoDB
        - **ORMs**: Dapper, Entity Framework Core, Prisma, SQLAlchemy, TypeORM, Hibernate
        - **Cloud**: Azure DevOps, AWS, GCP

      Always:
        - Use C# 12 features (primary constructors, collection expressions) for .NET
        - Prefer async/await with CancellationToken parameters for backend (C#, Python, Node.js)
        - Use ILogger<T> (C#), structured logging (Node.js/Python/Java), never console.log/print in production
        - Angular: standalone components, inject(), OnPush, typed forms
        - React: functional components, hooks, TypeScript strict mode
        - Next.js: Server Components default, Client Components for interactivity
        - Vue 3: Composition API, <script setup>, typed props and emits
        - Flutter/MAUI: null safety, immutable widgets, provider/bloc state management
        - Node.js: async/await, error middleware, validation at boundary
        - Python: type hints on all functions, dependency injection, ORM for database access
        - PHP: type hints, PSR-12 standards, dependency injection
      Never:
        - Leave TODO comments in generated code
        - Use Thread.Sleep (C#) or setTimeout (blocking) — always Task.Delay or async patterns
        - Expose raw exceptions to API consumers
        - Hardcode secrets or connection strings
        - Use plain text passwords or tokens in code

  - name: dotnet-rules
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      .NET/C# standards:
      - Controllers: [ApiController] + [Route("api/v1/[controller]")] — no business logic
      - Services: interface + Scoped implementation
      - Repositories: Dapper with parameterised queries only
      - Validation: FluentValidation at controller boundary
      - Errors: ProblemDetails RFC 7807
      - All DB calls must be async with Async suffix
      - Enable nullable reference types (#nullable enable)
      - XML docs required on all public members

  - name: angular-rules
    globs: ["**/*.ts", "**/*.html"]
    alwaysApply: false
    rule: |
      Angular 17+ standards:
      - Standalone components only — no NgModules for new code
      - inject() not constructor injection
      - ChangeDetectionStrategy.OnPush everywhere
      - Signals preferred over BehaviorSubject for local state
      - DevExtreme: DxDataGrid/DxTreeList — explicit column definitions always
      - Typed reactive forms: FormGroup<T>
      - HTTP: typed responses, takeUntilDestroyed()
      - Routes: lazy-loaded with loadComponent

  - name: react-rules
    globs: ["**/*.tsx", "**/*.jsx"]
    alwaysApply: false
    rule: |
      React 18+ standards:
      - Functional components only — no class components
      - Hooks: useState, useEffect, useCallback, useMemo, useContext
      - TypeScript strict mode: type all props and state
      - Custom hooks for logic extraction (useAsync, useForm, usePagination)
      - State management: Redux Toolkit, Zustand, or Context + useReducer
      - No inline function definitions in JSX — use useCallback
      - memo() for expensive components, useCallback for callbacks
      - Suspense for async component loading
      - Controlled forms: onChange handlers, no uncontrolled components

  - name: flutter-rules
    globs: ["**/*.dart"]
    alwaysApply: false
    rule: |
      Flutter standards:
      - Null safety: prefer non-nullable types, use ? only when needed
      - Immutable widgets: use const constructors everywhere
      - State management: Provider, BLoC, GetX (pick one, not mixed)
      - Avoid mutable StatefulWidget — prefer functional + state manager
      - Use FutureBuilder/StreamBuilder for async UI
      - Hot reload safety: avoid global variables and static state
      - Linting: use analysis_options.yaml with strict rules
      - Asset handling: define all assets in pubspec.yaml
      - Formatting: dartfmt (2-space indentation)

  - name: maui-rules
    globs: ["**/*.xaml.cs", "**/*.xaml"]
    alwaysApply: false
    rule: |
      MAUI standards:
      - MVVM pattern: ViewModel, Model, View separation
      - Data binding: {Binding} syntax with proper paths
      - Command pattern: ICommand or RelayCommand for button actions
      - Null safety: use #nullable enable in .cs files
      - Platform-specific code: use #if WINDOWS / #if MACCATALYST etc
      - Async methods: use async/await, never Task.Result blocking
      - ResourceDictionary: centralize colors, fonts, styles
      - Triggers: use DataTrigger, EventTrigger for conditional UI
      - Layout: use Grid with RowDefinitions/ColumnDefinitions, avoid AbsoluteLayout

  - name: php-drupal-rules
    globs: ["**/*.php"]
    alwaysApply: false
    rule: |
      PHP/Drupal standards:
      - Type hints: declare(strict_types=1) at top of every file
      - PSR-12: code standard, 2-space indentation
      - Drupal hooks: implement hook_* following naming convention
      - Module structure: module.info.yml, module.module, src/ folder
      - Dependency injection: use services and ContainerInterface
      - Database: use $database service, parameterised queries (not db_query)
      - Forms: use Form API, FormInterface implementation
      - Validation: use validator service for business logic
      - Comments: PHPDoc on all functions with @param @return @throws
      - No global functions — use service classes

  - name: nodejs-express-rules
    globs: ["**/*.js", "**/*.ts"]
    alwaysApply: false
    rule: |
      Node.js / Express standards:
      - Use async/await exclusively, never callback hell or promise chains
      - Middleware: request → response order, proper error handling
      - Route handlers: single responsibility, extract to service layer
      - Error handling: custom error classes, central error middleware
      - Validation: joi, yup, or class-validator at controller boundary
      - Authentication: JWT with secure token storage (httpOnly cookies or secure headers)
      - Database: use parameterised queries or ORM (Prisma, TypeORM, Sequelize)
      - Logging: structured logging with winston or pino (not console.log)
      - Environment variables: use dotenv, never hardcode config
      - Testing: Jest with ts-jest for TypeScript projects

  - name: python-fastapi-rules
    globs: ["**/*.py"]
    alwaysApply: false
    rule: |
      Python / FastAPI standards:
      - Type hints on all functions: def function(param: Type) → Type:
      - Pydantic models for request/response validation
      - Dependency injection via Depends()
      - Async routes: async def endpoint() — leverage uvicorn async
      - Error handling: HTTPException with proper status codes, custom exception handlers
      - Authentication: JWT with secure token handling
      - Database: SQLAlchemy ORM with async driver (sqlalchemy[asyncio])
      - Logging: use logging module (not print()), structured format
      - Configuration: BaseSettings from pydantic for environment variables
      - Testing: pytest with pytest-asyncio for async tests

  - name: nextjs-rules
    globs: ["**/*.tsx", "**/*.jsx"]
    alwaysApply: false
    rule: |
      Next.js standards:
      - Use App Router (not Pages Router) for new projects
      - Server Components default, Client Components (use client) for interactivity
      - API Routes (route.ts): treat as backend endpoints, validate inputs
      - Data fetching: fetch() in Server Components, SWR/React Query in Client
      - Environment variables: .env.local (never expose secrets to browser)
      - Middleware: for auth, redirects, rate limiting at edge
      - Image optimization: use <Image> component (next/image)
      - Font optimization: use next/font for custom/system fonts
      - Static generation: generateStaticParams for dynamic routes when possible
      - Error handling: error.tsx and not-found.tsx for UI error boundaries

  - name: python-django-rules
    globs: ["**/*.py"]
    alwaysApply: false
    rule: |
      Python / Django standards:
      - Models: define all fields with explicit choices, use Meta for ordering/indexes
      - Migrations: always commit migrations, use data migrations for data changes
      - Views: use Class-Based Views (CBV) and mixins for reusability
      - ViewSets: with ModelSerializer and Router for REST APIs (Django REST Framework)
      - Serializers: nested serializers for relationships, custom validation methods
      - URL routing: use path() with clear names, namespace for reusability
      - Middleware: document order, keep logic minimal
      - Signals: use sparingly (avoid over-coupling), document purpose
      - Forms: ModelForm for CRUD, custom Form for complex logic
      - Testing: use Django TestCase with transaction rollback, fixtures for data
      - Queryset: use select_related() and prefetch_related() to avoid N+1
      - Settings: use environment variables, separate settings by environment (dev/prod)

  # ── Phase 2 Rules: High Priority ────────────────────────────

  - name: vue3-rules
    globs: ["**/*.vue"]
    alwaysApply: false
    rule: |
      Vue 3 standards:
      - Use Composition API (not Options API) for new components
      - <script setup> syntax preferred: no manual expose, auto-import, cleaner syntax
      - Type props and emits explicitly: defineProps<T>(), defineEmits<T>()
      - Reactive state: ref() for single values, reactive() for objects
      - Computed properties: computed(() => ...) instead of getters
      - Custom composables for logic extraction (useAsync, useForm, useCounter)
      - Lifecycle hooks: onMounted, onUnmounted (Composition API preferred)
      - Template: v-bind shorthand :, v-on shorthand @, event handling
      - Watchers: watch(() => ...) with proper dependencies and cleanup
      - State management: Pinia (not Vuex) for global state, composables for local

  - name: prisma-rules
    globs: ["**/*.ts", "**/*.js"]
    alwaysApply: false
    rule: |
      Prisma standards (Node.js ORM):
      - Schema: define models in schema.prisma, use explicit @relation() for relationships
      - Types: leverage generated types (PrismaClient<T>), never use any for models
      - Queries: use include/select for eager loading, avoid N+1 by default
      - Migrations: always use prisma migrate (not manual schema changes)
      - Transactions: use $transaction() for multi-step operations
      - Unique constraints: @unique, @@unique for business logic constraints
      - Soft deletes: use @updatedAt for timestamp, add custom isDeleted field if needed
      - Indexes: add @@index where queries frequently filter (performance critical)
      - Error handling: wrap operations in try/catch, handle Prisma-specific errors
      - Testing: use separate test database (DATABASE_URL_TEST), reset before each test

  - name: spring-boot-rules
    globs: ["**/*.java"]
    alwaysApply: false
    rule: |
      Java / Spring Boot standards:
      - Annotations: @RestController, @Service, @Repository for layering
      - Dependency Injection: constructor injection (final fields), never @Autowired
      - Validation: @Valid on method params, use validator annotations (@NotNull, @Email, etc.)
      - Exception Handling: @ControllerAdvice with @ExceptionHandler for centralized error responses
      - JPA/Hibernate: @Entity models with proper relationships, use DTOs for responses
      - Async patterns: CompletableFuture, @Async on service methods, reactor for reactive
      - Configuration: @Configuration with @Bean factory methods, not XML
      - Testing: JUnit 5, Mockito for mocks, @SpringBootTest for integration tests
      - Logging: use SLF4J (not System.out), structured with context (MDC for correlation IDs)
      - Properties: use application.yml (not properties), externalize config per environment

  - name: graphql-rules
    globs: ["**/*.ts", "**/*.js", "**/*.py"]
    alwaysApply: false
    rule: |
      GraphQL standards:
      - Schema design: clear naming (not REST-like), types with descriptions, scalar types
      - Queries: flat structure, minimize field selection (prevent over-fetching)
      - Mutations: group by domain (createUser, updateUser, deleteUser), batch operations
      - Subscriptions: for real-time (chat, notifications), use connection-based subscriptions
      - Resolvers: single responsibility, fetch only requested fields (N+1 prevention)
      - Input validation: validate inputs in resolver, use custom scalars for strict types
      - Error handling: return GraphQL errors with proper codes, client can handle gracefully
      - Pagination: cursor-based (not offset), include hasNextPage, endCursor
      - Authorization: implement at field level (@auth directive or resolver check)
      - Federation: use Apollo Federation for microservices (if applicable)

  # ── Phase 3 Rules: Medium Priority ──────────────────────────

  - name: ngrx-rules
    globs: ["**/*.ts"]
    alwaysApply: false
    rule: |
      NgRx standards (Angular state management):
      - Actions: define as classes (not interfaces), one action per file, clear naming
      - Reducers: pure functions, handle all action types, immutable updates
      - Selectors: memoized with createSelector(), reuse selectors, avoid redundant subscriptions
      - Effects: handle side effects (HTTP, navigation, timers), dispatch actions on success/error
      - DevTools: integrate Redux DevTools for time-travel debugging in development
      - Entity adapter: use createEntityAdapter for collections (CRUD operations)
      - Feature state: organize by feature module, use StoreModule.forFeature()
      - Async actions: use ofType(Action.request), switchMap/concatMap/mergeMap for HTTP
      - Testing: test reducers, selectors, effects in isolation with marble testing

  - name: blazor-rules
    globs: ["**/*.razor", "**/*.cs"]
    alwaysApply: false
    rule: |
      Blazor standards (ASP.NET Web UI):
      - Component lifecycle: OnInitializedAsync for data load, OnParametersSetAsync for param changes
      - Data binding: @bind for two-way, @onchange for events, @bind:get/@bind:set for control
      - Event handling: @onclick, @onchange with EventCallback (not Task.Run)
      - Forms: EditForm with DataAnnotationsValidator, cascading parameters for nested forms
      - HTTP: HttpClient injected, use async patterns (not blocking)
      - Routing: NavLink for navigation, @page directive for routes, layout inheritance
      - JS Interop: IJSRuntime for browser APIs (last resort, prefer C# when possible)
      - Child components: use @ChildContent for slots, RenderFragments for flexibility
      - State management: cascading parameters for parent→child, events for child→parent
      - Testing: Blazor test component, render, act, assert pattern

  - name: gcp-rules
    globs: ["**/*.ts", "**/*.py", "**/*.java"]
    alwaysApply: false
    rule: |
      Google Cloud Platform standards:
      - Cloud Functions: event-driven (Pub/Sub, HTTP, Firestore triggers), stateless
      - Firestore: schema design with collections/documents, real-time listeners, indexes for queries
      - BigQuery: append-only analytics, partition by date, cluster for performance
      - Pub/Sub: async messaging, topics/subscriptions, at-least-once delivery
      - Cloud Storage: object versioning, lifecycle policies for cost, signed URLs for security
      - Cloud Run: containerized services, auto-scaling, 15-minute timeout limits
      - Identity: use service accounts, not application credentials on disk
      - Logging: use Cloud Logging client library, structured JSON logs
      - Monitoring: set up Cloud Monitoring alerts, use custom metrics
      - Cost: use GCP cost calculator, set budgets and alerts, monitor commitment usage

  - name: postgres-rules
    globs: ["**/*.sql"]
    alwaysApply: false
    rule: |
      PostgreSQL standards:
      - Types: JSONB for semi-structured (not strings), UUID for IDs, ENUM for fixed choices
      - Window functions: ROW_NUMBER(), RANK(), aggregate window functions for analytics
      - Partitioning: by range (date) or list for large tables, enable constraint exclusion
      - Indexes: B-tree for equality, GIN for JSONB, BRIN for large sequential tables
      - Full-text search: use tsvector and tsquery, FTS operators for text search
      - Array operations: @> (contains), && (overlap), any() with operators
      - Transactions: explicit BEGIN/COMMIT, ISOLATION LEVEL for concurrency control
      - Constraints: CHECK, UNIQUE, FOREIGN KEY with ON DELETE CASCADE/SET NULL
      - Views: materialized views for heavy aggregations, refresh on schedule
      - Extensions: uuid-ossp for UUIDs, pgcrypto for hashing, PostGIS for spatial data

  # ── SDLC & Agile Methodology Rules (v3.5.0+) ─────────────────

  # ── Phase 1: CRITICAL (User Stories, Estimation, Sprint Planning, TDD, Deployment, Backlog)

  - name: user-story-rules
    alwaysApply: true
    rule: |
      User Story standards:
      Format: As a [role], I want [feature], so that [benefit]

      Acceptance Criteria (Gherkin Given/When/Then):
      - Given [initial context]
      - When [user action]
      - Then [expected outcome]

      Definition of Done (DoD) checklist (ALL must pass):
      - [ ] Code written and peer-reviewed
      - [ ] Unit tests written (80%+ coverage for feature code)
      - [ ] Acceptance criteria met
      - [ ] No TODO comments left
      - [ ] Documentation/comments added
      - [ ] Builds and passes all tests locally
      - [ ] Security review passed (input validation, secrets not hardcoded)
      - [ ] Performance verified (no N+1 queries, memory leaks checked)

      Estimation: Use Fibonacci (1, 2, 3, 5, 8, 13, 21...)
      - 1-3 points: Can complete in < 1 day
      - 5-8 points: Full sprint work
      - 13+ points: Too large, break down further

      Dependencies: Always list blocking stories or external dependencies
      Acceptance: No story is "done" until Definition of Done is 100% met

  - name: estimation-velocity-rules
    alwaysApply: true
    rule: |
      Estimation & Velocity standards:

      Estimation Process (Planning Poker):
      1. Product Owner reads story
      2. Team discusses unknowns (5-10 min)
      3. Each person estimates privately (Fibonacci cards)
      4. Reveal estimates simultaneously
      5. If consensus (within 1 point): agree on number
      6. If divergence: high and low estimate explain, re-vote
      7. Repeat until consensus or Product Owner decides

      Velocity Calculation:
      - Sum completed story points per sprint (ONLY done = 100% DoD)
      - Track last 3-4 sprints to identify trend
      - Velocity used for sprint planning capacity (conservative: use last sprint or -10%)

      Sprint Capacity Planning:
      - Available velocity = last sprint velocity (or conservative estimate)
      - Reserve 10% for interruptions (bugs, support)
      - Planned velocity = 90% of available
      - Never commit > planned velocity

      Trends:
      - Increasing velocity: team getting faster (improving or taking on more)
      - Decreasing velocity: impediments, increased interruptions, scope creep
      - Stable velocity: sustainable pace, predictable delivery

      Avoid: Inflating estimates to impress stakeholders, or deflating to appear faster

  - name: sprint-planning-rules
    alwaysApply: true
    rule: |
      Sprint Planning standards:

      Sprint Goal (SMART):
      - Specific: What exactly will the team deliver?
      - Measurable: How will we know it's done? (Definition of Done + acceptance criteria)
      - Achievable: Can this be completed in 1 sprint with current capacity?
      - Relevant: Does this align with product roadmap and business value?
      - Time-bound: By end of sprint (2 weeks)

      Example: "Enable users to upload profiles with image validation and caching" (not just "upload feature")

      Sprint Setup (2 hours typical):
      1. Review product backlog (prioritized)
      2. Discuss top stories until questions answered
      3. Estimate stories (if not pre-estimated)
      4. Team commits to sprint goal + stories
      5. Break down stories into tasks (if desired by team)
      6. Identify blockers and dependencies
      7. Set daily standup time

      Capacity Check:
      - Available hours: (team size × hours/day × sprint days) - meetings
      - Reserved: 10% for interruptions, code review
      - Actual plannable capacity: 90% of available
      - Sum story points should NOT exceed team's velocity

      Commitment vs Forecast:
      - Committed: stories team 100% confident they'll finish
      - Forecasted: stories they "hope to finish if no blockers"
      - Sprint goal: what MUST be done (no "maybe" features)

      Anti-patterns:
      - Overcommitting (velocity > last sprint)
      - Adding stories mid-sprint without removing others
      - Setting impossible sprint goals
      - Underestimating consistently (no learning from past velocity)

  - name: tdd-test-driven-development-rules
    alwaysApply: true
    rule: |
      Test-Driven Development (TDD) standards:

      Red-Green-Refactor Cycle (for EACH feature):

      1. RED: Write failing test
         - Test describes the desired behavior
         - Test fails because feature doesn't exist yet
         - Test is specific and executable
         - Example: test_user_can_login_with_valid_credentials()

      2. GREEN: Write minimal code to pass test
         - Write ONLY code to make the test pass
         - Do not add extra features
         - Do not optimize prematurely
         - Ugly/hacky code is OK at this stage

      3. REFACTOR: Clean up and optimize
         - Refactor code to be readable and maintainable
         - All tests still pass
         - Remove duplication (DRY principle)
         - No new functionality in this step

      Repeat: For each new requirement, start at RED again

      Test-First Benefits:
      - Design (tests force you to think about API design)
      - Documentation (tests show how to use the code)
      - Confidence (if tests pass, code works)
      - Refactoring safety (change code, tests verify it still works)
      - Fewer bugs (bugs caught during development, not production)

      Test Coverage Targets:
      - Unit tests: 80%+ of business logic
      - Integration tests: critical paths (auth, payment, data)
      - E2E tests: main user workflows
      - Avoid 100% coverage (diminishing returns on low-value tests)

      Anti-patterns:
      - Writing tests after code (defeats design benefits)
      - Testing implementation details (fragile tests)
      - Flaky tests (non-deterministic results)
      - Slow tests (90+ min test suite defeats purpose)

  - name: deployment-strategy-rules
    alwaysApply: true
    rule: |
      Deployment Strategy standards:

      Blue-Green Deployment (zero-downtime, easy rollback):
      - BLUE: Current production environment (live traffic)
      - GREEN: New version deployed (no traffic yet)
      - Test GREEN thoroughly before switching
      - Switch traffic from BLUE → GREEN (instant)
      - Rollback: Switch back to BLUE (instant)
      - Keep BLUE running for quick rollback
      - Cost: 2× infrastructure during deployment

      Canary Deployment (gradual rollout, monitor at each step):
      - Deploy to 5% of servers/traffic
      - Monitor metrics (errors, latency, CPU, custom metrics)
      - If healthy, increase to 25%, then 50%, then 100%
      - If problems detected, rollback to 0%
      - Duration: hours/days depending on traffic volume
      - Cost: Minimal (use existing infra)
      - Risk: Medium (some users affected if issue found)

      Rolling Deployment (gradual, no rollback):
      - Replace 1-2 servers at a time
      - Deploy code, start new version, health check passes
      - Move traffic to new version
      - Repeat until all servers updated
      - Rollback: slow (opposite direction)
      - Cost: Minimal
      - Risk: Medium (no instant rollback if issues found)

      Feature Flags (decouple deploy from release):
      - Deploy code with feature behind flag
      - Feature flag OFF in production (code not executed)
      - Gradually enable flag: 5% → 25% → 50% → 100%
      - A/B test: send 50% users to new feature, 50% to old
      - Permanent flags for kill switches (circuit breaker pattern)

      Deployment Checklist:
      - [ ] All tests pass (unit + integration + e2e)
      - [ ] Code reviewed and approved
      - [ ] Database migrations backwards-compatible (if needed)
      - [ ] Secrets/configs not hardcoded
      - [ ] Monitoring/alerting configured for new version
      - [ ] Runbook/rollback procedure documented
      - [ ] Stakeholders notified of deployment window
      - [ ] Health checks configured

      Rollback Decision:
      - IF error rate > SLO threshold → Rollback immediately
      - IF latency > baseline + 20% → Investigate, rollback if root cause unknown
      - IF infrastructure issue (not code) → Scale up/fix infra, don't rollback

      SLO Targets (Service Level Objectives):
      - 99.9% uptime (8 seconds/day downtime allowed)
      - < 100ms p95 latency
      - < 0.1% error rate
      - Adjust per service criticality

  - name: backlog-management-rules
    alwaysApply: true
    rule: |
      Backlog Management standards:

      Prioritization (MoSCoW method):
      - MUST have: Critical for MVP, core features, blockers for other work
      - SHOULD have: High value, improves UX, addresses tech debt
      - COULD have: Nice-to-have, low priority, easy wins
      - WON'T have: Out of scope, defer to future release

      Value-Based Prioritization:
      - Rank by: (Business Value) × (Probability of Success) / (Effort)
      - High value + low effort = do first
      - High value + high effort = plan carefully, break down
      - Low value = defer or consider alternatives

      Risk-Based Prioritization:
      - Address high-risk items early (unfamiliar tech, blocking other work, compliance)
      - De-risk by: spiking, proof-of-concept, expert review

      Story Readiness Checklist (before sprint):
      - [ ] Story has clear acceptance criteria (Gherkin format)
      - [ ] Story estimated (story points assigned)
      - [ ] Dependencies identified and cleared
      - [ ] Acceptance criteria testable and verifiable
      - [ ] No unknowns that would block development
      - [ ] Story fits in 1 sprint (if not, break down)
      - [ ] Definition of Done understood by team

      Epic Breakdown:
      - Epic: large initiative (2-4 sprints worth of work)
      - Stories: single sprint work items (5-13 points)
      - Tasks: sub-tasks within a story (optional, not estimated separately)

      Backlog Health Metrics:
      - % of top 20 stories refined and ready: target 100%
      - Average time story sits in backlog before sprint: should be < 4 weeks
      - Backlog velocity trend: should be stable (same ± 10% each sprint)
      - Tech debt % of sprint: target 20-30% of capacity reserved

      Technical Debt:
      - Track as separate stories in backlog (don't hide in regular stories)
      - Reserve 20-30% of sprint for tech debt/refactoring
      - Don't accumulate debt indefinitely (causes slowdowns)
      - Tag: "tech-debt" for visibility and tracking

  # ── Phase 2: HIGH (Agile Ceremonies, Incident Management, Monitoring/Alerting, Feature Flags)

  - name: agile-ceremonies-rules
    alwaysApply: true
    rule: |
      Agile Ceremonies standards:

      Daily Standup (15 min max, same time each day):
      - Each person (2 min max):
        1. What did I accomplish yesterday?
        2. What am I working on today?
        3. What blockers do I have? (ask for help)
      - Focus: unblock team, not status report
      - Blocker follow-up: assign owner, set 24h resolution target
      - Remote: use video if possible, minimize lag

      Sprint Review/Demo (1 hour, end of sprint):
      - Show completed work only (demo Definition of Done)
      - Walk through acceptance criteria (story by story)
      - Gather stakeholder feedback
      - Discuss: what worked, what was hard, what to improve
      - NOT: review code, debate implementation
      - Outcome: stakeholder sign-off on "done" work

      Sprint Retrospective (1 hour, after review):
      - What went well? (continue doing)
      - What didn't work? (stop doing)
      - What should we try? (experiment this sprint)
      - Action items: assign owner, set deadline (do before next sprint)
      - Blameless: focus on process, not people
      - Outcome: 3-5 actionable improvements for next sprint

      Backlog Refinement (1-2 hours, mid-sprint):
      - Clarify upcoming stories with team
      - Estimate stories (planning poker)
      - Discuss unknowns and dependencies
      - Ensure top 20 stories are "ready" for next sprint
      - NOT: commit to stories (that's sprint planning)
      - Outcome: prioritized, estimated, ready backlog for next sprint

      Meeting Anti-patterns:
      - Standups becoming status reports (devolve to async Slack)
      - Demos only showing features, not quality
      - Retros with no follow-up (action items never assigned/done)
      - Refinement with no estimation (wastes time later)

  - name: incident-management-rules
    alwaysApply: true
    rule: |
      Incident Management standards:

      Severity Classification:
      - SEV-1 (Critical): Total service outage, revenue impact, >5min downtime
      - SEV-2 (High): Partial outage, major feature broken, user-facing error
      - SEV-3 (Medium): Minor feature broken, workaround exists, non-critical path
      - SEV-4 (Low): Cosmetic issue, low-impact bug, can wait for next release

      Incident Response (24/7 on-call rotation):
      1. TRIAGE (5 min): Assess severity, notify relevant teams
      2. INVESTIGATE (5-30 min): Identify root cause, don't fix blind
      3. REMEDIATE (5-60 min): Deploy hotfix or workaround
      4. COMMUNICATE (ongoing): Update status page every 15 min
      5. RECOVER (5-30 min): Full data consistency check, verify fix stable

      Root Cause Analysis (RCA) — 5 Whys Method:
      1. Why did the incident happen? (e.g., database connection pool exhausted)
      2. Why did that happen? (e.g., new feature caused 10x traffic spike)
      3. Why wasn't this caught? (e.g., load test didn't simulate real peak)
      4. Why don't we have better load testing? (e.g., test infra cost constraint)
      5. Why haven't we addressed this constraint? (e.g., budget, priority, staffing)

      Postmortem Template (24-48h after incident):
      - Timeline: when did incident start, what actions taken, when resolved
      - Root cause: the ONE thing that, if fixed, would prevent recurrence
      - Contributing factors: other issues that made it worse
      - Impact: users affected, duration, revenue impact if applicable
      - Action items: 3-5 changes to prevent (owner, deadline)
      - Lessons learned: what we learned about our system

      Action Items (immediate follow-up):
      - Critical: within 1 week (often hotfix deployed same day)
      - Important: within 1 sprint (added to backlog as tech debt)
      - Nice-to-have: future improvements (low priority)

      Blameless Culture:
      - Focus on system failures, not people failures
      - Everyone can make mistakes (no punishment for incident)
      - Goal: fix systems so same incident can't recur
      - Share postmortems publicly (learning for entire org)

  - name: monitoring-alerting-rules
    alwaysApply: true
    rule: |
      Monitoring & Alerting standards:

      Service Level Indicators (SLI) — What to measure:
      - Availability: % of requests that succeed (not errors, not timeouts)
      - Latency: p50, p95, p99 response time (important: p99, not just average)
      - Error rate: % of requests returning 5xx errors
      - Throughput: requests per second (capacity planning)
      - Saturation: % CPU/memory/disk/connections used

      Service Level Objectives (SLO) — What's acceptable:
      - 99.9% availability (< 8.6 hours/month downtime)
      - p95 latency < 100ms
      - Error rate < 0.1%
      - Adjust per service criticality (payment critical, blog less critical)

      Alert Fatigue Prevention:
      - Alert threshold: only when SLO is at risk (not "might be a problem")
      - Example: alert if error rate > 0.5% (threshold), not > 0.1% (noise)
      - Aggregation: combine related alerts (don't page for every instance failure)
      - Runbook: each alert must have a clear runbook (what to do?)
      - SNooze: suppress non-critical alerts during known outages

      Dashboards (at-a-glance health):
      - Green: all SLOs met, system healthy
      - Yellow: approaching SLO threshold, watch closely
      - Red: SLO breached, incident in progress
      - Metrics: availability, latency p95, error rate, saturation

      Logs (detailed diagnostics):
      - Structured format (JSON, not unstructured text)
      - Correlation ID: same request traced through all systems
      - Context: user ID, request ID, feature flag state, deployment version
      - Levels: DEBUG (dev only), INFO (normal), WARN (degraded), ERROR (user impact)
      - Retention: 30 days prod logs, 7 days debug logs

      Alerting Rules:
      - Page on-call (urgent): SEV-1, SEV-2, SLO breach
      - Email alert (less urgent): SEV-3, SLO approaching
      - Slack (informational): metrics, deployments, low-severity issues

  - name: feature-flags-rules
    alwaysApply: true
    rule: |
      Feature Flags standards:

      Types:
      - Kill switch: disable feature if broken (circuit breaker)
      - Canary: rollout to percentage of users (5% → 25% → 100%)
      - A/B test: compare old vs new feature for experiment
      - Dark deploy: deploy code without user-facing change (for performance testing)
      - Operational: enable/disable based on capacity (e.g., throttle signup if DB full)

      Flag Lifecycle:
      1. CREATED: flag OFF, code deployed, only dev environment
      2. TESTING: flag ON for QA, tested before rollout
      3. ROLLOUT: gradually enable 5% → 25% → 50% → 100% of users
      4. STABLE: flag ON for all users, stable in production
      5. CLEANUP: remove flag from code, delete from system (don't accumulate dead flags)

      Flag Management:
      - Flag name: descriptive (payment_method_v2, not flag_x)
      - Owner: which team owns this feature?
      - Expiration: when should this flag be reviewed/removed?
      - Config: which environments? (dev, staging, production)

      Best Practices:
      - Keep flag logic simple: avoid nested flags or complex conditions
      - Test both flag ON and OFF paths (100% coverage for flag code)
      - Monitor flag usage: is this flag actually used? remove if not
      - Cleanup: each sprint, remove 1-2 stable flags to keep system clean
      - Document: why does this flag exist? when will it be removed?

      Gradual Rollout Example (Canary):
      - Deploy feature code (flag OFF)
      - Enable for 5% of traffic (internal users or beta)
      - Monitor SLOs (latency, error rate, saturation) for 4h
      - If healthy: enable for 25% of traffic
      - Continue: 50%, 100% with 4h monitoring between each step
      - If problems: disable immediately (not a long rollback)

  # ── Phase 3: MEDIUM (Kanban, Refactoring, Release Management, Pair Programming, Performance SLO)

  - name: kanban-rules
    alwaysApply: true
    rule: |
      Kanban Board Management standards:

      Kanban Columns (adapt to your workflow):
      - BACKLOG: prioritized work items
      - TODO: selected for current work
      - IN-PROGRESS: being actively worked on
      - IN-REVIEW: code review, QA testing
      - DONE: completed, deployed to production

      Work-in-Progress (WIP) Limits:
      - Set limit per column (e.g., max 5 in TODO, max 3 in IN-PROGRESS)
      - Purpose: prevent overload, focus on finishing work
      - Calculation: WIP limit = (team size × average cycle time) / 7
      - Enforce strictly: no work starts if column at limit (push completion)

      Flow Metrics (measure system health):
      - Lead Time: time from ticket creation to done (includes waiting)
      - Cycle Time: time from started to done (excludes waiting)
      - Throughput: tickets completed per day/week
      - Predictability: % variance in cycle time (low = predictable)

      Service Level Expectation (SLE):
      - 85% of work completed within X days (based on historical data)
      - Example: "85% of tickets completed within 5 days"
      - Track SLE weekly, trend analysis
      - If SLE declining: identify and remove bottleneck

      Bottleneck Identification:
      - Column with most tickets in progress = bottleneck
      - Example: IN-REVIEW has 10 items, others have 2-3 = review bottleneck
      - Action: add reviewer, simplify review process, parallelize reviews

      Continuous Flow (vs Sprint-based):
      - No fixed sprint boundaries
      - Pull model: new item only when capacity exists
      - No sprint commitments, only WIP limits
      - Metrics-driven: measure lead/cycle time, optimize continuously

  - name: refactoring-rules
    alwaysApply: true
    rule: |
      Safe Refactoring standards:

      Prerequisites (before refactoring):
      - [ ] Existing code has 80%+ test coverage (tests protect against breakage)
      - [ ] No ongoing feature work in this module (don't refactor + feature together)
      - [ ] Tests are fast enough to run frequently (can't refactor safely with 10 min test suite)
      - [ ] Team agrees on refactoring goal (not aesthetic, but improve maintainability/performance)

      Refactoring Types:
      - Small: rename variable, extract method (1-4 hours, PR)
      - Medium: redesign class, extract service (4-16 hours, multiple PRs)
      - Large: redesign module architecture (2+ weeks, parallel with features)

      Refactoring Process:
      1. Choose scope: identify code smell (duplication, complexity, unclear naming)
      2. Plan: how will structure change? which tests protect against errors?
      3. Test locally: make changes, run full test suite after each micro-change
      4. Git commits: small incremental commits (revert any one commit without breaking)
      5. Code review: separate refactoring PR (no feature changes mixed in)
      6. Merge: verify tests pass in CI before merging
      7. Monitor: watch for regressions in production

      Big Bang Refactoring Anti-pattern:
      - Rewrite entire module at once (high risk, hard to review, easy to introduce bugs)
      - Better: use Strangler Fig pattern (new code in parallel, gradually replace old)

      Tech Debt Tracking:
      - Track refactoring as "tech debt" stories in backlog
      - Reserve 20-30% of sprint for tech debt
      - Priority tech debt based on: impact on velocity, risk to production, team morale

      Refactoring + Feature Balance:
      - If 100% refactoring: slow feature development (morale, business unhappy)
      - If 0% refactoring: codebase rots, velocity decreases (technical debt compounds)
      - Target: 70% features, 30% tech debt (refactoring + testing + documentation)

  - name: release-management-rules
    alwaysApply: true
    rule: |
      Release Management standards:

      Semantic Versioning (MAJOR.MINOR.PATCH):
      - MAJOR: breaking changes (old clients break, require migration)
      - MINOR: new features, backwards compatible
      - PATCH: bug fixes, no feature changes
      - Example: 2.4.1 → 2.5.0 (new feature) → 3.0.0 (breaking change)

      Release Process:
      1. PLAN: decide version number, identify changes in this release
      2. PREPARE: branch from main (release/2.5.0), lock features
      3. TEST: regression testing, security review, performance baseline
      4. NOTES: write release notes (features, fixes, breaking changes)
      5. TAG: git tag v2.5.0, merge back to main
      6. DEPLOY: blue-green or canary to production
      7. MONITOR: watch SLOs closely, rollback plan ready

      Release Notes Template:
      - Version: 2.5.0 (release date)
      - New Features: [list of MINOR bumps with user impact]
      - Bug Fixes: [list of PATCH fixes with severity]
      - Breaking Changes: [list with migration guide if MAJOR bump]
      - Known Issues: [any known problems, workarounds]
      - Deprecations: [features being removed next version]
      - Security: [any CVE fixes, security notices]

      Hotfix Procedure (critical bug in production):
      1. Create hotfix branch from last release tag (not main)
      2. Fix bug on hotfix branch
      3. Test thoroughly
      4. Deploy hotfix to production (bump PATCH version)
      5. Merge hotfix back to main (catch up main with fix)
      6. Tag as new PATCH version

      Frequency:
      - Major release: quarterly/annually (breaking changes, big refactors)
      - Minor release: weekly/monthly (features, improvements)
      - Patch release: daily (bug fixes, hotfixes)
      - Example: v2.0.0 (major) → v2.1.0 → v2.1.1 → v2.2.0 → v3.0.0

  - name: pair-programming-rules
    alwaysApply: true
    rule: |
      Pair Programming standards:

      Roles (rotate every 15-30 min):
      - DRIVER: hands on keyboard, writes code
      - NAVIGATOR: thinks ahead, spots errors, asks questions, reads docs
      - Switch often: both stay engaged, prevent driver fatigue

      When to Pair:
      - Complex/risky code (critical business logic, security-sensitive)
      - Knowledge transfer (junior learning from senior)
      - Difficult debugging (two minds better than one)
      - Architecture decisions (design while pairing)

      When NOT to Pair:
      - Simple, well-defined tasks (typing exercise, waste of time)
      - Independent work (different developers on different files)
      - Code review can substitute (both parties not coding)

      Remote Pairing Setup:
      - Screen share (driver shows code)
      - Audio: clear audio critical (not video, but voice must be clear)
      - Duration: 1-2 hours max per session (mental fatigue)
      - Tools: VS Code Live Share, Tuple, or tmux over SSH

      Pair Programming Benefits:
      - Knowledge transfer: junior learns patterns, senior learns new approaches
      - Quality: fewer bugs caught real-time (not in code review)
      - Morale: problem-solving together, less isolation
      - Onboarding: new team member learns codebase faster

      Anti-patterns:
      - One person dominating keyboard (driver hogging)
      - Navigator asleep (checking email, not engaged)
      - Pairing on everything (waste of time on simple tasks)
      - Remote pairing with poor audio (frustrating, unproductive)

  - name: performance-slo-rules
    alwaysApply: true
    rule: |
      Performance & SLO Management standards:

      Error Budget:
      - SLO target: 99.9% availability = 8.6 hours downtime/month allowed
      - Error budget: 0.1% downtime allowed
      - If used: no new feature deployments until recovery window
      - If unused: can take calculated risks (major refactor, migration, etc.)

      Performance Targets by Layer:
      - API Gateway/Load Balancer: p95 < 10ms
      - Application Server: p95 < 50ms
      - Database Query: p95 < 20ms
      - Cache: p95 < 5ms
      - Total Latency: p95 < 100ms (API to client)

      Capacity Planning:
      - Current throughput: X requests/second
      - Growth target: 2× or 3× for next year
      - Peak traffic: plan for peak (not average)
      - Example: if avg 1k req/s, peak 5k req/s, plan for 15k req/s (3x safety margin)

      Performance Testing:
      - Baseline: measure current p95 latency (before change)
      - Load test: simulate peak traffic (1.5x expected peak)
      - Soak test: run 24h at load (find memory leaks, connection pool exhaustion)
      - Spike test: sudden 10x traffic increase (test auto-scaling)

      Monitoring Performance:
      - Real User Monitoring (RUM): measure actual users' experience (not synthetic)
      - Custom metrics: business-specific (checkout latency, search quality)
      - Histograms: track p50, p95, p99 (not just average)
      - Anomaly detection: alert if latency suddenly increases 20%+ vs baseline

      Performance Regression Prevention:
      - Performance test in CI (fail build if p95 degrades > 5%)
      - Benchmark before/after code changes
      - Profile before optimizing (measure first, don't guess)
      - Keep optimization focused: don't sacrifice code clarity for 1% improvement

  - name: sql-rules
    globs: ["**/*.sql"]
    alwaysApply: false
    rule: |
      SQL Server standards:
      - SET NOCOUNT ON at top of every stored procedure
      - Parameterised queries only — never string concatenation
      - WITH (NOLOCK) on read-heavy SELECTs
      - Temp tables over CTEs for > 10k rows
      - BEGIN TRY / BEGIN CATCH on all procedures
      - Set-based operations over cursors always
      - SARGable WHERE clauses (no functions wrapping columns)

  - name: security-always
    alwaysApply: true
    rule: |
      Security (applied everywhere):
      - Never hardcode secrets, API keys, connection strings
      - Parameterised queries only — flag string concatenation
      - Sanitise all user input before use
      - Flag any code logging passwords, tokens, or PII
      - Angular: use DomSanitizer — never bypass security

  - name: performance-audit
    globs: ["**/*.cs", "**/*.ts", "**/*.sql"]
    alwaysApply: false
    rule: |
      Performance standards:
      - SQL: Avoid N+1 queries, SELECT specific columns, add indexes, parameterised only
      - C#: Use async/await, minimize allocations, use Span<T> for perf-critical code
      - TypeScript: Lazy-load modules, OnPush change detection, signals over subscriptions
      - General: Profile before optimizing, use benchmarks, avoid premature optimization

  - name: memory-management
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      Memory management standards:
      - using statement for all IDisposable, IAsyncDisposable
      - Unsubscribe from events in Dispose or use weak event pattern
      - No circular references or event handler leaks
      - WeakReference for caches, not strong references
      - Profile for memory leaks: unregistered event handlers, unreleased resources

  - name: async-best-practices
    globs: ["**/*.cs", "**/*.ts"]
    alwaysApply: false
    rule: |
      Async/await standards:
      - Never use .Result or .Wait() — always await
      - CancellationToken on all async methods
      - ConfigureAwait(false) in libraries (C#)
      - No async/await in constructors — use factory or separate Init method
      - Never fire-and-forget: if you Task.Run, always await or .ContinueWith() error handling

  - name: error-handling-advanced
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      Error handling standards:
      - Custom exception hierarchy — never throw base Exception
      - HTTP: ProblemDetails RFC 7807 format for errors
      - Structured logging: correlation IDs, context, severity
      - Polly for resilience: retry policies, circuit breakers, timeouts
      - Never expose raw stack traces to API clients
      - Log with ILogger<T>, never Console — include context

  # ── v1.2.0 Rules ───────────────────────────────────────

  - name: testing-pyramid
    globs: ["**/*Tests.cs", "**/*.spec.ts", "**/*.test.ts"]
    alwaysApply: false
    rule: |
      Testing pyramid standards:
      - 70% unit tests (fast, focused, isolated)
      - 20% integration tests (realistic, slower)
      - 10% e2e tests (slow, full workflow)
      - Mock at infrastructure boundary only, not internal business logic
      - AAA pattern (Arrange/Act/Assert) always
      - Test names describe scenario and expected result
      - No testing logic in production code

  - name: documentation-standards
    globs: ["**/*.cs", "**/*.ts", "**/*.md"]
    alwaysApply: false
    rule: |
      Documentation standards:
      - C#: XML docs on all public members (<summary>, <param>, <returns>, <exception>, <example>)
      - TypeScript: JSDoc on all exported functions (/** @param, @returns, @throws */)
      - README in each major folder (purpose, usage, key classes/functions)
      - No undocumented public API
      - Update docs when code changes
      - Examples in docs must be runnable

  - name: deployment-safety
    globs: ["**/appsettings*.json", "**/Dockerfile", "**/*.yml", "**/*.yaml"]
    alwaysApply: false
    rule: |
      Deployment safety standards:
      - Environment-specific config in appsettings.{env}.json only
      - No secrets in source code (API keys, passwords, connection strings)
      - Health check endpoints (/health) required
      - Dockerfile: non-root user, minimal image, security scan
      - CI gate: all checks must pass before merge
      - Pre-deploy: run integration tests in staging
      - Rollback plan documented for major changes

  - name: accessibility
    globs: ["**/*.html", "**/*.ts"]
    alwaysApply: false
    rule: |
      Accessibility standards (WCAG 2.1 AA):
      - ARIA labels on all interactive elements (buttons, inputs, modals)
      - Keyboard navigation: Tab, Enter, Escape must work
      - Color contrast 4.5:1 (text/background)
      - No content conveyed by color alone
      - Focus indicators visible and clear
      - Angular: use ARIA roles, test with screen readers
      - Images: alt text describing content, not "image" or "picture"

  - name: performance-budget
    globs: ["**/*.cs", "**/*.ts", "**/*.sql"]
    alwaysApply: false
    rule: |
      Performance budget standards:
      - API response time < 200ms (95th percentile)
      - Initial bundle size < 1MB (gzipped)
      - SQL queries < 100ms (95th percentile)
      - Maximum 5 database calls per request
      - Images: WebP format, compressed, responsive sizes
      - No N+1 queries
      - No blocking operations (always async)
      - Profile before optimizing, use benchmarks

  # ── v2.0.0 Agent Rules ────────────────────────────────

  - name: agent-behavior
    alwaysApply: false
    rule: |
      Multi-step autonomous agent behavior:
      - Plan before executing (show plan, get approval for unsafe operations)
      - Verify each step before proceeding (no blind forward motion)
      - Surface blockers immediately (don't hallucinate file paths)
      - Leave audit trail (explain reasoning, show evidence)
      - Preserve user intent (don't reinterpret requests)
      See .continue/rules/agent-behavior.md for detailed patterns.

  - name: pr-standards
    globs: ["**/*.cs", "**/*.ts", "**/*.md", "**/*.yml"]
    alwaysApply: false
    rule: |
      Pull request standards:
      - Maximum 400 lines of changes per PR
      - One feature/fix per PR (not multiple unrelated changes)
      - Linked to ticket (issue number in title)
      - Tests included and passing (coverage >= 80%)
      - CHANGELOG updated if user-facing
      - Description explains: What | Why | How | Testing
      See .continue/rules/pr-standards.md for detailed standards.

  - name: code-review-standards
    globs: ["**/*.cs", "**/*.ts"]
    alwaysApply: false
    rule: |
      Code review mindset and severity levels:
      - Assume good intent, ask questions before critiquing
      - Use severity levels: 🔴 Critical, 🟠 High, 🟡 Medium, 🔵 Low
      - Be specific: show problem AND fix
      - Approve when: tests pass, coverage maintained, no Critical issues
      - Praise good code, bikeshed sparingly
      See .continue/rules/code-review-standards.md for detailed guidelines.

  - name: ci-cd-standards
    globs: ["**/*.yml", "**/*.yaml", "**/Dockerfile"]
    alwaysApply: false
    rule: |
      CI/CD pipeline standards and gates:
      - Lint → Test → Build → Security Scan → Coverage Check → Deploy
      - Hard blocks: linter fails, tests fail, coverage decreases, security vulns
      - Secrets in CI/CD environ, never hardcoded
      - Auto-deploy to staging, manual approval for production
      - Rollback triggers: error rate > 5%, response time > 2x baseline
      See .continue/rules/ci-cd-standards.md for full pipeline details.

  - name: workspace-conventions
    alwaysApply: false
    rule: |
      Project-specific conventions and architectural patterns:
      - Naming: PascalCase files, camelCase functions, UPPER_SNAKE_CASE constants
      - Services: interface + DI, no direct instantiation
      - Repositories: parameterized queries always, no SQL injection
      - Tests: AAA pattern (Arrange/Act/Assert), 80%+ coverage target
      - Errors: custom exceptions, not generic Error()
      See .continue/rules/workspace-conventions.md for full project conventions.

  # ── v2.4.0 Cloud & DevOps Rules ───────────────────────

  - name: aws-patterns
    globs: ["**/*.ts", "**/*.js", "**/*.py", "**/*.yaml", "**/*.yml", "**/*.json", "**/*.tf"]
    alwaysApply: false
    rule: |
      AWS architecture patterns and best practices:
      - Lambda: Cold start optimization, connection pooling, structured logging, error handling, async with DLQ
      - RDS: Multi-AZ Aurora, automated backups, IAM auth, connection pooling (RDS Proxy), monitoring
      - DynamoDB: On-demand or auto-scaling, TTL for cleanup, GSI for queries, PITR enabled, partition key design
      - API Gateway: Request validation, throttling, WAF, CORS restricted, security headers, logging
      - CloudFront: Origin Access Identity (S3 only), cache policies, security headers, compression, access logging
      - IAM: Least privilege roles per service, no root access, MFA, credentials rotated, audit with CloudTrail
      See .continue/rules/aws-patterns.md for complete AWS standards.

  - name: azure-deployment
    globs: ["**/*.ts", "**/*.js", "**/*.cs", "**/*.yaml", "**/*.yml", "**/*.json", "**/*.bicep"]
    alwaysApply: false
    rule: |
      Azure deployment patterns and best practices:
      - App Service: Health check endpoint, auto-scaling, deployment slots (blue-green), HTTPS only, Managed Identity
      - Azure Functions: Consumption Plan for bursty, Premium Plan for VPC, timeout configured, durable functions for long operations
      - SQL Database: TDE enabled, Elastic Pools for cost, Always Encrypted for PII, auditing enabled, automated backups
      - Cosmos DB: Partition key design, TTL for cleanup, change feed for events, auto-scaling, global replication
      - Application Insights: Custom metrics/events, dependency tracking, alerts configured, structured logging
      - Key Vault: All secrets stored, Managed Identity access, soft delete, access logging, rotation policy
      See .continue/rules/azure-deployment.md for complete Azure standards.

  - name: docker-kubernetes
    globs: ["**/Dockerfile*", "**/*.dockerfile", "**/docker-compose*.yml", "**/*.yaml", "**/*.yml", "**/.dockerignore"]
    alwaysApply: false
    rule: |
      Docker and Kubernetes standards:
      - Dockerfile: Multi-stage builds, specific base version (not latest), minimal layers, non-root user, health check
      - Docker Compose: Named volumes, service networking, resource limits, health checks, .env for secrets
      - Kubernetes: Deployments (not bare Pods), resource requests/limits, liveness/readiness probes, ConfigMaps/Secrets separation
      - Security: securityContext (non-root), RBAC, network policies, private registries, image scanning
      - Scaling: HPA configured, pod disruption budgets, anti-affinity for reliability
      - Networking: Services for DNS, Ingress for routing, network policies for isolation
      See .continue/rules/docker-kubernetes.md for Docker/K8s patterns.

  - name: infrastructure-iac
    globs: ["**/*.tf", "**/*.json", "**/*.bicep", "**/*.yaml", "**/*.yml", "**/terraform/**", "**/cloudformation/**"]
    alwaysApply: false
    rule: |
      Infrastructure as Code standards (Terraform, CloudFormation, Bicep):
      - Terraform: Remote state (S3/Terraform Cloud), state locking, modules for reusability, version pins, workspaces per environment
      - CloudFormation: YAML format, nested stacks, change sets for review, parameter validation, mappings for regions
      - Bicep: Symbolic names, metadata documentation, module organization, parameter decorators
      - State management: Encryption at rest, versioning, access control, no local state, regular backups
      - Secrets: External storage (Secrets Manager/Key Vault), never in code/state, regular rotation
      - GitOps: All changes via CI/CD, PR approvals required, tags for releases, audit trail
      See .continue/rules/infrastructure-iac.md for IaC standards.

  - name: ci-cd-automation
    globs: [".github/workflows/**", ".azure-pipelines/**", "**/*.yml", "**/*.yaml", "**/Jenkinsfile", "**/deploy/**"]
    alwaysApply: false
    rule: |
      CI/CD automation standards (GitHub Actions, Azure Pipelines):
      - GitHub Actions: Workflow matrix for multi-version testing, cache dependencies, status checks on PRs, job separation (lint/test/build/deploy)
      - Azure Pipelines: Multi-stage (build/test/deploy), template reuse, approval gates, variable groups for secrets
      - Deployment: Blue-green deployments, health checks, automated rollback, smoke tests, canary/rolling updates
      - Testing: Unit, integration, security tests before deploy, coverage reports, artifact archiving
      - Secrets: GitHub Secrets, Azure variable groups, no hardcoded credentials, regular rotation
      - Monitoring: Post-deploy health checks, metrics monitoring, deployment alerts, audit logs
      See .continue/rules/ci-cd-automation.md for CI/CD standards.

  # ── v2.3.0 Advanced UI Patterns Rules ─────────────────

  - name: component-patterns
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.js", "**/*.css", "**/*.scss"]
    alwaysApply: false
    rule: |
      Component library patterns (Material Design, Chakra UI, Tailwind):
      - Material Design 3: Elevation, 8dp grid, ripple effects, semantic colors
      - Chakra UI: Design tokens, Box/Flex/Grid, responsive syntax [mobile, tablet, desktop], dark mode
      - Tailwind CSS: Utility-first, custom theme tokens, dark: prefix, responsive prefixes (sm:, md:, lg:)
      - Component API: Typed props, size/variant presets, disabled/loading/error states, ref forwarding
      - Theme customization: Single design system, CSS variables or theme tokens, light/dark support
      See .continue/rules/component-patterns.md for library patterns.

  - name: data-visualization
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.js", "**/*.html"]
    alwaysApply: false
    rule: |
      Data visualization standards (charts, dashboards, D3):
      - Chart selection: Bar (categories), Line (trends), Pie (proportions ≤5 slices), Scatter (correlation)
      - Recharts: Responsive containers, labeled axes, legend, formatted tooltips, no 3D effects
      - Dashboard layout: 3-column grid (desktop), metrics cards, time range picker, refresh button
      - D3.js: Use for custom interactive visualizations, scales for coordinate mapping, enter/update/exit
      - Accessibility: Text alternatives (data table), sufficient contrast, legends, no color-only meaning
      - Performance: Lazy-load chart libraries, aggregate data if > 1000 points, canvas for > 10k points
      See .continue/rules/data-visualization.md for chart patterns.

  - name: table-patterns
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.js", "**/*.html"]
    alwaysApply: false
    rule: |
      Data table patterns (sorting, filtering, pagination):
      - Semantic HTML: <table>, <thead>, <th scope="col">, <tbody>, aria-sort on headers
      - Sorting: Clickable column headers, aria-sort (ascending/descending/none)
      - Filtering: Debounced search (300ms), status/date filters, active filter badges, reset button
      - Pagination: Client-side for < 1000 rows, server-side for >= 1000, prev/next, page numbers, goto input
      - Items per page: Selector (10, 25, 50, 100), show total count ("X of Y results")
      - Virtualization: Use react-window for > 500 rows (only render visible rows)
      - Responsive: Horizontal scroll or card layout on mobile
      See .continue/rules/table-patterns.md for table implementation.

  - name: storybook-standards
    globs: ["**/*.stories.tsx", "**/*.stories.jsx", "**/*.stories.ts", "**/*.stories.js", "**/storybook/**"]
    alwaysApply: false
    rule: |
      Storybook component documentation standards:
      - Story structure: One file per component, default export with title/component, decorators for layout
      - ArgTypes: Prop documentation with control types (select, boolean, text), descriptions
      - Variants: Create stories for each state (default, primary, secondary, danger, disabled, loading, error)
      - Accessibility: a11y addon enabled, no WCAG AA violations, test color contrast, keyboard nav
      - Chromatic: Visual regression testing on every story variant, screenshot baselines
      - Interaction testing: play() function with userEvent for clicks, form submission, keyboard nav
      - Documentation: DocBlock comments, usage examples, component purpose, design system links
      See .continue/rules/storybook-standards.md for story patterns.

  - name: performance-monitoring
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.js", "**/*.json"]
    alwaysApply: false
    rule: |
      Web performance monitoring standards:
      - Core Web Vitals: LCP < 2.5s, INP < 200ms, CLS < 0.1 (measure in RUM, set alerts)
      - Performance budgets: Bundle < 250KB (gzip), set in CI, fail build if exceeded
      - Lighthouse: Run in CI on every PR, target > 90 score, assertions for performance/accessibility
      - Image optimization: WebP + JPEG fallback, responsive srcset, lazy load, aspect-ratio to prevent CLS
      - Code splitting: Dynamic imports by route, lazy-load heavy libraries (D3, editors), no blocking JS
      - Monitoring: Sentry, Google Analytics RUM, track metrics in analytics, set up alerts
      - Low-end testing: Profile on slow 4G, mid-range device, monitor main thread < 50ms tasks
      See .continue/rules/performance-monitoring.md for monitoring setup.

  # ── v2.2.0 UX Design Rules ────────────────────────────

  - name: ux-design-system
    globs: ["**/*.tsx", "**/*.jsx", "**/*.css", "**/*.scss"]
    alwaysApply: false
    rule: |
      UI/UX design system standards:
      - Color: 60-30-10 rule, semantic tokens (primary, secondary, success, danger)
      - Typography: 1.25 Major Third scale, 1.5-1.75 line height, 65ch max width
      - Spacing: 8-point grid (4px, 8px, 16px, 24px, 32px, 48px, 64px)
      - Responsive: Mobile-first, breakpoints 320px/480px/768px/1024px/1280px
      - Components: Button hierarchy (primary, secondary, tertiary, destructive)
      - Dark mode: Semantic tokens for light/dark variants
      See .continue/rules/ux-design-system.md for complete design system.

  - name: accessibility-wcag
    globs: ["**/*.tsx", "**/*.jsx", "**/*.html"]
    alwaysApply: false
    rule: |
      WCAG 2.1 AA accessibility standards:
      - Contrast: 4.5:1 normal text, 3:1 large text (≥18px bold), 3:1 UI components
      - Focus: Visible focus indicators on ALL interactive elements (2px outline, 2px offset)
      - Keyboard: Full keyboard navigation, no keyboard traps, skip links
      - ARIA: Semantic HTML (<button>, <nav>, <main>), aria-label for icons, aria-expanded
      - Touch: 44×44px minimum target size, 8px gaps between targets
      - Color: Never convey information by color alone, use patterns/text/icons
      See .continue/rules/accessibility-wcag.md for WCAG checklist.

  - name: responsive-mobile-first
    globs: ["**/*.tsx", "**/*.jsx", "**/*.css", "**/*.scss"]
    alwaysApply: false
    rule: |
      Mobile-first responsive design standards:
      - Base styles: Start at 320px (mobile), progressive enhancement
      - Breakpoints: 480px (small), 768px (tablet), 1024px (lg), 1280px (xl), 1536px (2xl)
      - Fluid typography: Use clamp() for smooth scaling across viewport sizes
      - Container widths: Mobile 100% + padding, Desktop max-width 1280px centered
      - Images: Responsive images with srcset, WebP format, lazy loading, aspect-ratio
      - Layout shift: Avoid with aspect-ratio, reserved space for ads/images
      See .continue/rules/responsive-mobile-first.md for responsive patterns.

  - name: animation-motion
    globs: ["**/*.tsx", "**/*.jsx", "**/*.ts", "**/*.css"]
    alwaysApply: false
    rule: |
      Animation and motion standards:
      - GPU acceleration: ONLY animate transform and opacity (never width, height, margin)
      - Durations: instant=50ms, fast=100ms, normal=200ms, slow=300ms, slower=500ms
      - Easing: ease-out (default), ease-in (exit), bounce (playful)
      - Accessibility: Always support prefers-reduced-motion media query
      - Performance: No layout thrashing, smooth 60fps animations
      - Micro-interactions: Loading states, transitions, hover effects
      See .continue/rules/animation-motion.md for motion guidelines.

  - name: design-tokens
    globs: ["**/*.css", "**/*.scss", "**/tokens/*"]
    alwaysApply: false
    rule: |
      Design tokens and CSS variables standards:
      - Token structure: Colors, spacing, typography, shadows, border radius
      - CSS custom properties: --color-primary, --spacing-base, --font-scale, --shadow-lg
      - Dark mode: Paired tokens (--bg-primary light/dark, --text-primary light/dark)
      - Naming: Semantic (primary, secondary, danger), not color-based (blue-500)
      - Format: CSS file with organized sections, documented with comments
      - Usage: Use tokens in all components, sync with design tools (Figma)
      See .continue/rules/design-tokens.md for token standards.

  # ── v2.1.0 Data & Observability Rules ──────────────────

  - name: database-design
    globs: ["**/*.sql", "**/Migrations/**", "**/*Migration*.cs", "**/DbContext*.cs"]
    alwaysApply: false
    rule: |
      Database schema design standards:
      - Normalization: 1NF, 2NF, 3NF (no transitive dependencies)
      - Naming: PascalCase tables/columns, Primary key = Id, Foreign key = [Table]Id
      - Indexes: Foreign keys, WHERE columns, JOIN columns, ORDER BY columns
      - Constraints: NOT NULL on required, UNIQUE on unique data, CHECK for valid values
      - Soft delete: IsDeleted (BIT) + DeletedAt (nullable DATETIME), never hard delete
      - Migrations: reversible, safe (add nullable, backfill, then add NOT NULL)
      See .continue/rules/database-design.md for complete schema standards.

  - name: observability-standards
    globs: ["**/*.cs", "**/*.ts", "**/appsettings*.json"]
    alwaysApply: false
    rule: |
      Observability standards — logging, tracing, metrics:
      - Structured logging: ILogger<T>, key=value format (not string interpolation)
      - Never log secrets: passwords, tokens, API keys, PII
      - Correlation ID on all logs (request tracing end-to-end)
      - Metrics: track key business operations + system health (latency, errors)
      - Health checks: /health (liveness), /health/ready (readiness + dependencies)
      - Log levels: Debug (dev only), Info (user events), Warn (unexpected but handled), Error (needs attention)
      See .continue/rules/observability-standards.md for full standards.

  - name: api-versioning
    globs: ["**/*Controller*.cs", "**/*.ts", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      API versioning and breaking change management:
      - Version in URL: /api/v1/, /api/v2/ (never query string)
      - Backward compatible: add fields/endpoints, don't remove (breaking = major version bump)
      - Deprecation: 6-month notice (Deprecation header), migration guide, 410 Gone after sunset
      - Non-breaking: add optional params, add response fields, add endpoints
      - Breaking requires: new major version + migration documentation
      See .continue/rules/api-versioning.md for full versioning strategy.

  - name: input-validation
    globs: ["**/*.cs", "**/*.ts"]
    alwaysApply: false
    rule: |
      Input validation and sanitization standards:
      - Validate at boundaries: API controllers, message handlers (not in business logic)
      - Use declarative validators: FluentValidation (C#), Zod (TypeScript)
      - Parameterized queries always: never string concatenation in SQL
      - HTML encoding: safe rendering in views (prevent XSS)
      - File uploads: validate size, MIME type, magic bytes; random filenames; outside web root
      - Reject invalid early: never pass unvalidated data to services/database
      See .continue/rules/input-validation.md for validation patterns.

  - name: git-workflow
    alwaysApply: false
    rule: |
      Git workflow standards — branch naming, commits, merge strategy:
      - Branch names: feature/123-description, fix/456-description (lowercase, hyphens, ticket ID)
      - Commits: Conventional Commits format: feat(scope): subject, explain WHY in body
      - Granularity: one logical change per commit (git bisect safe)
      - Merge strategy: squash features before merge to main, merge commit for multi-commit work
      - Never rebase public branches (breaks others' history)
      - Conflict resolution: test after merging (understand both sides)
      See .continue/rules/git-workflow.md for complete git standards.

  # ── v2.5.0 Security & Compliance Rules ────────────────────

  - name: zero-trust-security
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.tf", "**/*.bicep", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Zero-trust security assumes every access request is potentially compromised.
      Always:
        - Verify every identity (MFA mandatory, never trust source IP)
        - Authenticate before authorizing (OAuth 2.0, PKCE, JWT short-lived tokens)
        - Encrypt all data in transit (TLS 1.2+) and at rest (AES-256)
        - Segment networks (microsegmentation, no flat networks)
        - Log and monitor all access (immutable audit trails)
        - Apply least privilege (minimum permissions needed)
        - Assume breach mentality (defense in depth)
      Never:
        - Trust network perimeter (assume compromised)
        - Use single-factor authentication
        - Allow unencrypted internal traffic
        - Grant broad "admin" permissions
      See .continue/rules/zero-trust-security.md for full architecture.

  - name: secrets-rotation
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.tf", "**/*.bicep", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Secrets (API keys, passwords, tokens) are attack targets. Rotate automatically, store securely, audit access.
      Always:
        - Store secrets in vault (AWS Secrets Manager, Azure Key Vault)
        - Never commit secrets to git (use .gitignore, .env not committed)
        - Use managed identity instead of credentials when possible
        - Encrypt secrets at rest and in transit
        - Audit all secret access (who, when, what)
        - Rotate automatically (every 30-90 days)
        - Maintain version history (last 3 versions)
      Never:
        - Hardcode secrets in code
        - Store secrets in config files
        - Commit .env files with real secrets
        - Use same secret across environments
      See .continue/rules/secrets-rotation.md for rotation automation.

  - name: compliance-standards
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.tf", "**/*.bicep", "**/*.md", "**/*.yaml"]
    alwaysApply: false
    rule: |
      Compliance frameworks (SOC 2, ISO 27001, HIPAA, PCI-DSS) establish security and privacy controls.
      Always:
        - Document all policies, procedures, and evidence
        - Maintain audit logs (1+ year retention)
        - Implement controls systematically (map to framework requirements)
        - Schedule annual independent audits (SOC 2 Type II)
        - Address audit findings (remediate within SLA)
        - Track non-conformities and remediation (ISO 27001)
      Never:
        - Skip documentation (auditors verify everything)
        - Ignore audit findings
        - Make exceptions to controls
      See .continue/rules/compliance-standards.md for SOC 2, ISO 27001, HIPAA, PCI-DSS details.

  - name: penetration-testing
    globs: ["**/*.md", "**/*.yaml", "**/*.yml", "**/*.tf"]
    alwaysApply: false
    rule: |
      Penetration testing systematically identifies security weaknesses before attackers do.
      Always:
        - Define scope clearly (systems in/out of scope)
        - Obtain written authorization (signed Rules of Engagement)
        - Follow NIST phases (reconnaissance → scanning → enumeration → exploitation)
        - Test OWASP Top 10 vulnerabilities (Web, Mobile, API)
        - Document findings with CVSS scores
        - Provide clear remediation steps (actionable, specific)
        - Assign remediation owners with deadlines
        - Re-test to confirm fixes
      Never:
        - Test without authorization (illegal)
        - Exceed scope (test only in-scope systems)
        - Disclose findings before remediation window closes
      See .continue/rules/penetration-testing.md for planning and methodology.

  - name: incident-response
    globs: ["**/*.md", "**/*.yaml", "**/*.yml", "**/*.tf"]
    alwaysApply: false
    rule: |
      Security incidents are inevitable. Respond quickly, communicate clearly, investigate thoroughly.
      Always:
        - Follow IR playbook (don't improvise)
        - Establish incident commander (single decision maker)
        - Document timeline of events (evidence preservation)
        - Communicate status regularly (internal + external)
        - Isolate affected systems (prevent spread)
        - Schedule post-mortem within 48 hours (blameless, systems-focused)
        - Create action items with owners & deadlines
        - Share findings widely (learn as organization)
      Never:
        - Panic or make hasty decisions
        - Delete logs (destroy evidence)
        - Blame individuals (focus on systems)
        - Skip the post-mortem
      See .continue/rules/incident-response.md for playbooks and post-mortem templates.

  # ── v2.6.0 Integration & APIs Rules ─────────────────────

  - name: event-driven-architecture
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.tf", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Event-driven systems decouple services via events (immutable facts).
      Always:
        - Use event sourcing (append-only event log, replay for state)
        - Implement CQRS (separate read model from write model)
        - Design idempotent handlers (same event processed twice = same result)
        - Handle eventual consistency (accept temporary lag)
        - Use saga pattern for multi-step processes (compensating transactions)
        - Implement event deduplication (prevent duplicate processing)
      Never:
        - Mix events and commands (event = fact, command = request)
        - Update event log (immutable append-only)
        - Assume synchronous consistency
      See .continue/rules/event-driven-architecture.md for patterns.

  - name: api-gateway-patterns
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      API gateways route requests, compose responses, rate limit, cache, secure.
      Always:
        - Route by path, method, header (service discovery)
        - Compose responses from multiple services (parallel calls)
        - Rate limit per user & endpoint (sliding window, Redis-backed)
        - Cache GET responses (reduce backend load)
        - Version APIs (/api/v1, /api/v2, maintain backward compat)
        - Add security headers (CORS, CSP, HSTS, X-Frame-Options)
      Never:
        - Expose backend services directly
        - Add business logic (belongs in services)
        - Store state (gateways are stateless)
      See .continue/rules/api-gateway-patterns.md for composition.

  - name: message-queue-patterns
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Message queues enable async communication (RabbitMQ, Kafka).
      Always:
        - Use queues for tasks (point-to-point), topics for events (pub-sub)
        - Implement dead letter queue (handle failures)
        - Use durable queues (survive broker restart)
        - Retry with exponential backoff (1s, 2s, 4s, 8s, 16s)
        - Make handlers idempotent (safe to process same message twice)
        - Use consumer groups (distribute load)
        - Set message TTL (prevent infinite queuing)
      Never:
        - Lose messages (configure durability)
        - Process messages out of order (use partition keys)
        - Retry forever (set max retries: 5)
      See .continue/rules/message-queue-patterns.md for RabbitMQ/Kafka.

  - name: webhook-standards
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Webhooks push events to subscribers (real-time integrations).
      Always:
        - Use HTTPS only (encrypted delivery)
        - Sign with HMAC-SHA256 (prevent spoofing)
        - Include timestamp & event ID (prevent replay, detect duplicates)
        - Retry with exponential backoff (max 5 retries)
        - Provide webhook logs/history (delivery status)
        - Disable after max retries (alert subscriber)
        - Verify signature on subscriber side (constant-time comparison)
      Never:
        - Send webhooks over HTTP
        - Skip signature verification
        - Retry forever (DoS vector)
      See .continue/rules/webhook-standards.md for implementation.

  - name: integration-testing
    globs: ["**/*.cs", "**/*.ts", "**/*.js", "**/*.yaml", "**/*.yml"]
    alwaysApply: false
    rule: |
      Integration tests validate components working together.
      Always:
        - Use contract testing (APIs honor contracts)
        - Test E2E workflows (critical paths)
        - Use real/test databases (not mocks)
        - Test data in version control (factories, seeds)
        - Clean up after tests (isolation)
        - Run integration tests in CI/CD (every commit)
        - Maintain ~70% unit, ~20% integration, ~10% E2E tests
      Never:
        - Mock databases in integration tests
        - Skip integration tests
        - Use production data in tests
      See .continue/rules/integration-testing.md for contract testing.

  # ── v2.7.0 Mobile & Cross-Platform Rules ────────────────

  - name: mobile-development
    globs: ["**/*.swift", "**/*.kt", "**/*.tsx", "**/*.dart", "**/*.ts", "**/*.js"]
    alwaysApply: false
    rule: |
      Mobile app standards for iOS (Swift), Android (Kotlin), React Native, Flutter.
      Always:
        - Use platform-native patterns (SwiftUI, Jetpack Compose, React Navigation)
        - Store credentials in secure storage (Keychain, KeyStore, secure_storage)
        - Test on real devices + simulators (different perf profiles)
        - Optimize for battery + memory (lazy load, memoize, unsubscribe)
        - Use async/await (no blocking calls, Thread.sleep, UIViewController.present synchronously)
        - Handle offline gracefully (local DB, sync queue, conflict resolution)
        - Never hardcode API keys, secrets, or configuration
      Never:
        - Store tokens/passwords in plaintext SharedPreferences/AsyncStorage
        - Make synchronous network calls (blocks UI)
        - Log PII, tokens, passwords
        - Ignore memory leaks (retain cycles, unmanaged listeners)
      See .continue/rules/mobile-development.md for platform-specific standards.

  - name: cross-platform-design
    globs: ["**/*.tsx", "**/*.ts", "**/*.dart", "**/*.js"]
    alwaysApply: false
    rule: |
      Cross-platform design: write once, respect platform conventions.
      Always:
        - Use platform abstraction layer (no Platform.OS scattered in components)
        - Adapt UI per platform (iOS: stack nav + swipe back, Android: tabs + back button)
        - Use design tokens (colors, spacing adapt per platform)
        - Test on 2+ platforms + screen sizes (responsive + adaptive)
        - Follow each platform's HIG (Human Interface Guidelines)
      Never:
        - Hardcode platform checks in business logic
        - Use web UI patterns on mobile (hover states, right-click)
        - Assume same screen size (mobile portrait ≠ tablet landscape)
      See .continue/rules/cross-platform-design.md for architecture patterns.

  - name: offline-first
    globs: ["**/*.swift", "**/*.kt", "**/*.tsx", "**/*.dart", "**/*.ts", "**/*.js"]
    alwaysApply: false
    rule: |
      Offline-first: app works without network, syncs when available.
      Always:
        - Load from local DB first (don't wait for network)
        - Queue changes locally when offline (event log, transaction log)
        - Sync in background (don't block user)
        - Handle conflicts (latest-write-wins, merge, user prompt)
        - Use soft deletes (IsDeleted + DeletedAt, enable recovery)
        - Show sync status to user (synced ✓, syncing ↻, offline ⚠)
        - Encrypt local database if storing PII
      Never:
        - Block on network in main thread
        - Hard-delete immediately (prevents sync/recovery)
        - Lose queued changes on app restart (persist event log)
      See .continue/rules/offline-first.md for sync strategies.

  - name: mobile-security
    globs: ["**/*.swift", "**/*.kt", "**/*.tsx", "**/*.dart", "**/*.ts", "**/*.js"]
    alwaysApply: false
    rule: |
      Mobile security: devices are threatened (lost, rooted, jailbroken).
      Always:
        - Store credentials in native secure storage (Keychain, KeyStore)
        - Use OAuth 2.0 + PKCE (not password flow, not implicit)
        - HTTPS only, never HTTP (no exceptions)
        - Implement certificate pinning for sensitive APIs
        - Expire tokens (1hr access, 7d refresh)
        - Detect jailbreak/root (deny access or warn)
        - Obfuscate code (ProGuard, R8, link-time optimization)
        - Don't log sensitive data (PII, tokens, passwords)
      Never:
        - Store passwords (use OAuth, SSO)
        - Hardcode API keys (use remote config)
        - Mix HTTP and HTTPS
        - Skip certificate validation
        - Log debug info to device (screenshot capture risk)
      See .continue/rules/mobile-security.md for credential + network standards.

  - name: app-distribution
    globs: ["**/*.swift", "**/*.kt", "**/*.tsx", "**/*.dart", "**/*.ts", "**/*.js", "*.gradle", "*.plist", "*.pbxproj"]
    alwaysApply: false
    rule: |
      App distribution: signing, submission, beta testing, versioning.
      Always:
        - Use semantic versioning (MAJOR.MINOR.PATCH)
        - Sign releases with appropriate certificates (iOS: distribution, Android: upload key)
        - Beta test 48+ hours before submission (TestFlight, internal testing)
        - Include privacy policy URL, accurate description, screenshots
        - Monitor crashes, ratings, user feedback post-launch
        - Plan update strategy (OTA, forced updates only for critical security)
        - Test on actual devices before submission (not simulator)
      Never:
        - Increment version after submission without changes
        - Hardcode API keys in release builds
        - Submit untested builds
        - Use test/development certificates for production
      See .continue/rules/app-distribution.md for store submission + versioning.

  # ── v2.8.0 AI Behavior Rules ──────────────────────────

  - name: honesty-and-uncertainty
    alwaysApply: true
    rule: |
      Epistemic standards for all responses:
      - Signal confidence: "I'm confident...", "I'm inferring...", "I'm not certain..."
      - Never assert file paths, function names, or API behavior not seen in current context
      - "I don't know" is a valid and correct answer — prefer it over fabrication
      - Distinguish: verified fact (read it) vs. inference (reasoning from patterns) vs. guess
      - Constitutional hierarchy: accuracy > helpfulness
      See .continue/rules/honesty-and-uncertainty.md for confidence signaling patterns.

  - name: adaptive-reasoning
    alwaysApply: true
    rule: |
      Chain-of-thought and self-verification for all chat responses:
      - Non-trivial questions: restate interpretation, then answer, then caveats
      - Before delivering code: mentally verify async/await, null safety, CancellationToken
      - Adapt depth to expertise: novice gets WHY, expert gets trade-offs only
      - Never deliver two contradictory recommendations in the same response
      See .continue/rules/adaptive-reasoning.md for reasoning templates and expertise signals.

  - name: session-context
    alwaysApply: true
    rule: |
      Session memory and consistency for all responses:
      - Reference earlier conversation decisions rather than re-deciding silently
      - Contradict a prior decision only by explicitly flagging the contradiction
      - Never ask for information the user already provided in this session
      - Build on prior answers — don't restate established facts
      See .continue/rules/session-context.md for consistency patterns.

  # ── v2.9.0 Orchestrator Intelligence Rule ─────────────

  - name: routing-intelligence
    alwaysApply: false
    rule: |
      PowerPlay command routing heuristics:
      - /security-scan (quick table) vs /security-agent (table + fix code) vs /zero-trust-design (architecture)
      - /add-tests (single class) vs /generate-tests-complete (full suite) vs /coverage-gaps (gap analysis)
      - /performance-check (issue table) vs /perf-optimize (with before/after code)
      - /optimize-sql (stored procedure) vs /database-design (schema review) vs /data-model (from requirements)
      - /refactor-inline (one transformation, code only) vs /refactor-large (plan) vs /refactor-module (dependency map)
      - /review (standard) vs /pr-review (diff + approve/reject) vs /audit-all (all dimensions)
      - /inline-review (quick) vs /review (standard) vs /audit-all (comprehensive)
      - Complexity tiers: Quick (< 100 lines, user says "just/quick") | Standard | Full ("complete/entire/suite")
      - Multi-intent rule: Execute primary intent fully, then suggest follow-up command
      - Default routing: Code → /review, Concepts → /think-through, Unknown → ask one clarifying question
      - /pp-requirements (full 4-phase chain, shared memory) vs individual agents with HANDOFF BLOCK copy-paste for manual stepping
      - /requirements-to-specs (business req → spec) vs /acceptance-criteria (story → criteria) vs /requirements-review (quality check)
      See .continue/rules/routing-intelligence.md for full routing decision trees.

  # ── v3.0.0 Requirements Phase Rules ──────────────────

  - name: requirements-elicitation
    alwaysApply: false
    rule: |
      User story format: As a [role], I want [feature], so that [benefit].
      Acceptance criteria: Given/When/Then (Gherkin). One criterion = one scenario.
      INVEST: Independent, Negotiable, Valuable, Estimable, Small, Testable.
      ALWAYS: Measurable thresholds ("< 200ms at P95"), specific roles, testable outcomes.
      NEVER: "fast", "easy", "should", "many", "appropriate" — replace with measurable specifics.
      Completeness: functional reqs (REQ-F-###), NFRs, edge cases, error scenarios, security, performance.
      See .continue/rules/requirements-elicitation.md for templates and anti-patterns.

  - name: feasibility-assessment
    alwaysApply: false
    rule: |
      3 feasibility dimensions: Technical (can we build it?) | Resource (capacity?) | Timeline (deliver by X?)
      Risk tiers: Low (start directly) | Medium (document + mitigate) | High (spike first) | Critical (STOP, mandatory spike)
      Estimation: T-shirt sizing at requirements, story points at architecture, hours in sprint only.
      Definition of Ready: story format, acceptance criteria, INVEST, feasibility assessed, risk tier assigned,
        spike complete if High/Critical, dependencies identified, NFRs documented, story sized.
      NEVER start development on Critical-tier risk without a completed spike.
      See .continue/rules/feasibility-assessment.md for DoR checklist and estimation patterns.

