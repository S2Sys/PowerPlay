  - name: open
    params: {}

# ─────────────────────────────────────────────────────────
# DOCS INDEXING — @docs targets for semantic search
# ─────────────────────────────────────────────────────────
docs:
  - name: Continue.dev
    startUrl: https://docs.continue.dev/intro
  - name: ASP.NET Core 8
    startUrl: https://learn.microsoft.com/en-us/aspnet/core/introduction-to-aspnet-core
  - name: Angular 17
    startUrl: https://angular.dev/overview
  - name: DevExtreme
    startUrl: https://js.devexpress.com/Documentation/ApiReference/
  - name: Dapper
    startUrl: https://www.learndapper.com/
  - name: FluentValidation
    startUrl: https://docs.fluentvalidation.net/en/latest/

# ─────────────────────────────────────────────────────────
# PROMPTS — /slash commands
# ─────────────────────────────────────────────────────────
prompts:
  - name: review
    description: "Full code review — bugs, patterns, security"
    invokable: true
    prompt: |
      Perform a thorough code review. Structure as:
      ## Summary — one sentence
      ## Issues Found — table: Severity | Line | Issue | Fix
      ## Security Concerns — SQL injection, XSS, exposed secrets, auth
      ## Performance Notes — N+1, blocking calls, missing indexes
      ## Suggested Refactors — SOLID violations, design patterns
      Be direct. Include code snippets for every fix.

  - name: optimize-sql
    description: "Optimise SQL stored procedure"
    invokable: true
    prompt: |
      Optimise this SQL Server stored procedure:
      1. Add SET NOCOUNT ON
      2. Add BEGIN TRY/CATCH
      3. Replace cursors with set-based ops
      4. Suggest CREATE INDEX for missing indexes
      5. Replace CTEs with temp tables for > 10k rows
      6. Add WITH (NOLOCK) where safe
      7. Make WHERE clauses SARGable
      Output: complete optimised procedure + index recommendations + change log.

  - name: add-tests
    description: "Generate xUnit unit tests"
    invokable: true
    prompt: |
      Generate xUnit tests with Moq and FluentAssertions.
      Cover: happy path, edge cases, null inputs, exceptions.
      Pattern: MethodName_Scenario_ExpectedResult.
      Use Arrange/Act/Assert comments. Mock all externals.
      Output complete test class — no placeholders.

  - name: add-docs
    description: "Add XML documentation comments"
    invokable: true
    prompt: |
      Add XML docs to all public members:
      <summary>, <param>, <returns>, <exception>, <remarks>.
      Add <example> for utility methods. Keep logic unchanged.

  - name: ng-component
    description: "Generate Angular standalone component"
    invokable: true
    prompt: |
      Generate a complete Angular 17+ standalone component:
      - inject(), OnPush, standalone: true
      - Typed FormGroup<T> if form needed
      - Service interface + implementation
      - DevExtreme HTML template
      - SCSS with sw- BEM naming
      Output: compilable component + service + model files.

  - name: api-endpoint
    description: "Generate complete .NET API endpoint"
    invokable: true
    prompt: |
      Generate a complete ASP.NET Core 8 endpoint:
      - Controller + DTOs + FluentValidation
      - Service interface + Scoped implementation
      - Dapper repository with parameterised SQL
      - ILogger<T> + ProblemDetails error handling
      - DI registration comment for Program.cs
      Output complete compilable C# files.

  - name: security-scan
    description: "Security audit — OWASP Top 10 check"
    invokable: true
    prompt: |
      Security audit (OWASP Top 10):
      Check for: SQL injection, XSS, hardcoded secrets,
      missing auth, insecure deserialization, path traversal,
      sensitive data in logs, CORS misconfiguration,
      missing input validation, exposed stack traces.
      Output: table — Severity | Line | Vulnerability | Fix Code

  - name: explain-deep
    description: "Deep explanation of complex code"
    invokable: true
    prompt: |
      Explain this code:
      1. Problem it solves
      2. Step-by-step logic
      3. Key design decisions
      4. Potential failure modes
      5. How to improve it
      Use ASCII diagrams for complex flows.

  # ── v1.1.0 Inline Actions ──────────────────────────────

  - name: inline-review
    description: "Inline code review — annotated issues with severity"
    invokable: true
    prompt: |
      Quick inline review of selected code.
      Format: Severity | Line | Issue | Fix Code
      Keep it tight — one issue per row, no explanations.
      Severity: Critical | Warning | Info
      Include specific line numbers and code snippets.

  - name: quick-fix
    description: "Auto-fix the selected code — apply best practices"
    invokable: true
    prompt: |
      Fix the selected code. Output ONLY the corrected code block.
      No explanation, no comments, just the fixed code.
      Apply: proper naming, async/await, error handling, nullable types, IDisposable.
      Make it production-ready in one pass.

  - name: explain-inline
    description: "Explain selected code with inline comments"
    invokable: true
    prompt: |
      Add // comments to explain the selected code.
      One comment per meaningful line.
      Tone: explain to a junior developer.
      Output: same code with // comments added.
      Never change logic, only add explanations.

  - name: refactor-inline
    description: "Refactor selected code — extract, simplify, modernize"
    invokable: true
    prompt: |
      Refactor the selected code. Output ONLY the refactored code.
      Pick the most impactful single transformation:
      1. Extract method (if duplicated or complex)
      2. Simplify logic (reduce nesting, early returns)
      3. Modernize syntax (C# 12 features, modern TypeScript)
      One transformation only. Don't change behavior.

  - name: add-types
    description: "Add TypeScript types or C# explicit types"
    invokable: true
    prompt: |
      Add types to the selected code.
      TypeScript: replace 'any', add param/return types, add generic constraints.
      C#: replace 'var' with explicit types, add nullable annotations (#nullable enable).
      Output: typed code only, no explanation.
      Make every type as specific as possible.

  # ── v1.1.0 Utility Prompts ─────────────────────────────

  - name: performance-check
    description: "Identify performance issues — N+1, allocations, blocking"
    invokable: true
    prompt: |
      Performance audit of selected code.
      Check for:
      - SQL N+1 queries, SELECT *, missing indexes
      - Allocations in loops, large object allocations
      - Blocking .Result, .Wait(), Thread.Sleep
      - Unnecessary Enumerable chains
      Output: Severity | Location | Issue | Fix Code table

  - name: memory-audit
    description: "Detect memory leaks and disposal issues"
    invokable: true
    prompt: |
      Memory audit of selected code.
      Check for:
      - IDisposable without using statement
      - Event handler leaks (no unsubscribe)
      - Circular references, cached objects
      - WeakReference misuse
      Output: Issues found with line numbers and fixes.

  - name: database-design
    description: "Review or generate database schema"
    invokable: true
    prompt: |
      Database design analysis:
      If schema provided: review normalization, indexes, FK constraints, naming.
      If feature described: suggest schema design, tables, relationships.
      Output: SQL CREATE TABLE statements + index recommendations + rationale.

  - name: architecture-design
    description: "System architecture advice for the described feature"
    invokable: true
    prompt: |
      Architecture design for the described feature.
      Suggest: layer responsibilities, dependency direction, design pattern.
      Consider: testability, scalability, maintainability.
      Output: ASCII architecture diagram + layer descriptions + pattern rationale.

  - name: refactor-large
    description: "Plan a large refactoring — analysis then steps"
    invokable: true
    prompt: |
      Large refactoring plan for selected code/feature.
      Step 1: Analyze — what needs changing and why
      Step 2: Plan — ordered refactoring steps with risks
      Step 3: Structure — which files to change in what order
      Output: numbered refactoring plan with file paths and estimated effort.

experimental:
  readResponseToCursor: false
