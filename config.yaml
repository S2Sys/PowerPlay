      Step 1: Code quality — complexity, duplication, SOLID, naming conventions
      Step 2: Security — OWASP Top 10, injection risks, secrets, auth
      Step 3: Performance — N+1 queries, allocations in loops, blocking awaits
      Step 4: Testing — coverage gaps, test quality, edge cases missing
      Step 5: Documentation — missing docs, stale comments, API changes
      Step 6: Summary — table: Category | Severity | Issue | Line | Fix
      Output: Approve if no High/Critical issues. Request changes otherwise.

  - name: coverage-gaps
    description: "Find test coverage gaps and generate test cases"
    invokable: true
    prompt: |
      Analyse code coverage gaps and generate test cases:
      Step 1: Identify untested methods and branches
      Step 2: Prioritize by risk (security/data) > complexity > frequency
      Step 3: For top 5 gaps: generate complete test case (AAA pattern)
      Use xUnit + Moq + FluentAssertions (C#) or Jasmine + SpyOn (TypeScript).
      Output: Gap analysis table + complete test cases ready to paste.

  - name: security-agent
    description: "OWASP Top 10 security audit with remediation"
    invokable: true
    prompt: |
      Security audit using OWASP Top 10:
      A1 Broken Access Control — check auth on every endpoint
      A2 Cryptographic Failures — weak ciphers, plaintext secrets
      A3 Injection — SQL, LDAP, OS command injection
      A4 Insecure Design — missing rate limits, no input validation
      A5 Misconfiguration — CORS *, debug mode, verbose errors
      A6 Vulnerable Dependencies — outdated packages, CVEs
      A7 Auth Failures — weak passwords, no MFA, broken sessions
      A8 Integrity Failures — unsigned updates, insecure deserialization
      A9 Logging Failures — no audit trail, sensitive data in logs
      A10 SSRF — unvalidated URLs, internal network access
      Output: Severity | Category | Issue | Line | Exact Fix Code

  - name: perf-optimize
    description: "Profile, identify bottlenecks, suggest optimizations"
    invokable: true
    prompt: |
      Performance optimization for this code:
      Step 1: Profile — identify 3 highest-impact bottlenecks
      Step 2: Diagnose — explain WHY each is slow (with evidence)
      Step 3: Optimize — show exact fix for each (before/after code)
      Step 4: Estimate — improvement percentage for each fix
      Focus: N+1 queries, allocations in loops, blocking awaits, missing indexes.
      Output: Bottleneck table + before/after code blocks per issue.

  - name: workspace-learn
    description: "Analyse project conventions and generate summary"
    invokable: true
    prompt: |
