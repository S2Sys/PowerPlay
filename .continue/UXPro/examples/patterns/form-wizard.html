<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Form Wizard - UXPRo v2.4.0</title>
    <style>
        :root {
            --color-primary: #0066cc;
            --color-accent: #0066cc;
            --color-error: #cc0000;
            --color-background: #ffffff;
            --color-surface: #f5f5f5;
            --color-border: #e0e0e0;
            --color-text: #1a1a1a;
            --color-text-sec: #666666;
            --color-focus: #0066cc;
            --transition: 300ms;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --color-background: #1a1a1a;
                --color-surface: #2a2a2a;
                --color-border: #444444;
                --color-text: #ffffff;
                --color-text-sec: #cccccc;
                --color-focus: #4d9eff;
                --color-accent: #4d9eff;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            transition: background-color var(--transition), color var(--transition);
        }
        .wizard-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
        }
        .wizard-header { margin-bottom: 2rem; }
        .wizard-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 0.5rem;
        }
        .step-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .step-number {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--color-surface);
            border: 2px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--color-text-sec);
            margin-bottom: 0.5rem;
            transition: all var(--transition);
        }
        .step-number[aria-current="step"] {
            background-color: var(--color-accent);
            color: var(--color-background);
            border-color: var(--color-accent);
            transform: scale(1.1);
        }
        .step-label {
            font-size: 0.875rem;
            color: var(--color-text-sec);
            text-align: center;
            line-height: 1.4;
        }
        .step-number[aria-current="step"] + .step-label {
            color: var(--color-text);
            font-weight: 500;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--color-surface);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--color-accent);
            width: 33.33%;
            transition: width var(--transition);
        }
        .sr-announcements {
            position: absolute;
            left: -10000px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
        fieldset { border: none; padding: 0; }
        fieldset[hidden] { display: none; }
        legend {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
        }
        label .required {
            color: var(--color-error);
            margin-left: 0.25rem;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"],
        select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--color-border);
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            background-color: var(--color-background);
            color: var(--color-text);
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--color-focus);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }
        @media (prefers-color-scheme: dark) {
            input:focus, select:focus {
                box-shadow: 0 0 0 3px rgba(77, 158, 255, 0.2);
            }
        }
        input:invalid:not(:placeholder-shown),
        select:invalid:not(:placeholder-shown) {
            border-color: var(--color-error);
        }
        .review-summary {
            background-color: var(--color-surface);
            padding: 1.5rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }
        .review-section {
            margin-bottom: 1.5rem;
        }
        .review-section:last-child {
            margin-bottom: 0;
        }
        .review-section-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--color-text-sec);
            margin-bottom: 0.75rem;
            letter-spacing: 0.5px;
        }
        .review-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--color-border);
        }
        .review-field:last-child {
            border-bottom: none;
        }
        .review-label {
            font-weight: 500;
            color: var(--color-text-sec);
            font-size: 0.9rem;
        }
        .review-value {
            color: var(--color-text);
            font-weight: 500;
        }
        .review-edit-button {
            color: var(--color-accent);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0.25rem 0.5rem;
            margin-left: 0.5rem;
            transition: color var(--transition);
        }
        .review-edit-button:hover,
        .review-edit-button:focus {
            color: var(--color-primary);
            text-decoration: underline;
            outline: 2px solid var(--color-focus);
            outline-offset: 2px;
        }
        .wizard-navigation {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            margin-top: 2rem;
        }
        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--transition);
            min-width: 120px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary {
            background-color: var(--color-accent);
            color: var(--color-background);
            flex: 1;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 102, 204, 0.2);
        }
        .btn-primary:focus {
            outline: 3px solid var(--color-focus);
            outline-offset: 2px;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background-color: var(--color-surface);
            color: var(--color-text);
            border: 2px solid var(--color-border);
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: var(--color-border);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .btn-secondary:focus {
            outline: 3px solid var(--color-focus);
            outline-offset: 2px;
        }
        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button[hidden] { display: none; }
        .success-message {
            background-color: rgba(0, 170, 51, 0.1);
            border: 2px solid #00aa33;
            border-radius: 4px;
            padding: 1rem;
            margin-top: 1rem;
            text-align: center;
            color: var(--color-text);
            font-weight: 500;
            display: none;
        }
        .success-message.show { display: block; }
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background-color: var(--color-accent);
            color: white;
            padding: 0.5rem 1rem;
            text-decoration: none;
            z-index: 100;
        }
        .skip-link:focus { top: 0; }
        @media (max-width: 768px) {
            .wizard-title { font-size: 1.5rem; }
            .step-number { width: 44px; height: 44px; }
            .step-label { font-size: 0.8rem; max-width: 60px; }
            .wizard-navigation { flex-direction: column; gap: 0.75rem; }
            button { width: 100%; }
        }
        @media (max-width: 480px) {
            .wizard-container { padding: 0.75rem; }
            .wizard-title { font-size: 1.25rem; margin-bottom: 0.75rem; }
            .step-number { width: 40px; height: 40px; font-size: 0.85rem; }
            .step-label { font-size: 0.7rem; max-width: 50px; }
            legend { font-size: 1.1rem; margin-bottom: 1rem; }
            label { font-size: 0.9rem; margin-bottom: 0.375rem; }
            button { padding: 0.625rem 1rem; font-size: 0.95rem; min-height: 44px; }
        }
    </style>
</head>
<body>
    <a href="#wizard-form" class="skip-link">Skip to form</a>

    <div class="wizard-container">
        <div class="wizard-header">
            <h1 class="wizard-title">Create Your Account</h1>

            <!-- Step Indicator -->
            <div class="step-indicator" role="tablist" aria-label="Form steps">
                <div class="step-item">
                    <div class="step-number" id="step-1" role="tab" aria-selected="true" aria-current="step">1</div>
                    <div class="step-label">Account Info</div>
                </div>
                <div class="step-item">
                    <div class="step-number" id="step-2" role="tab" aria-selected="false">2</div>
                    <div class="step-label">Profile</div>
                </div>
                <div class="step-item">
                    <div class="step-number" id="step-3" role="tab" aria-selected="false">3</div>
                    <div class="step-label">Review</div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <!-- Announcement Region -->
        <div id="announcements" class="sr-announcements" role="status" aria-live="polite" aria-atomic="true"></div>

        <!-- Wizard Form -->
        <form id="wizard-form" class="wizard-form" novalidate>
            <!-- Step 1: Account Info -->
            <fieldset id="step-1-content">
                <legend>Step 1: Account Information</legend>

                <div class="form-group">
                    <label for="email">Email Address<span class="required">*</span></label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password<span class="required">*</span></label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Minimum 8 characters"
                        required
                        minlength="8"
                    >
                </div>
            </fieldset>

            <!-- Step 2: Profile -->
            <fieldset id="step-2-content" hidden>
                <legend>Step 2: Profile Information</legend>

                <div class="form-group">
                    <label for="fullname">Full Name<span class="required">*</span></label>
                    <input
                        type="text"
                        id="fullname"
                        name="fullname"
                        placeholder="John Doe"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="role">Role<span class="required">*</span></label>
                    <select id="role" name="role" required>
                        <option value="">-- Select a role --</option>
                        <option value="individual">Individual</option>
                        <option value="developer">Developer</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>
            </fieldset>

            <!-- Step 3: Review -->
            <fieldset id="step-3-content" hidden>
                <legend>Step 3: Review Your Information</legend>

                <div class="review-summary">
                    <div class="review-section">
                        <div class="review-section-title">Account Information</div>
                        <div class="review-field">
                            <span class="review-label">Email:</span>
                            <span class="review-value" id="review-email">-</span>
                            <button type="button" class="review-edit-button" data-step="1" aria-label="Edit account information">Edit</button>
                        </div>
                        <div class="review-field">
                            <span class="review-label">Password:</span>
                            <span class="review-value">••••••••</span>
                        </div>
                    </div>

                    <div class="review-section">
                        <div class="review-section-title">Profile Information</div>
                        <div class="review-field">
                            <span class="review-label">Full Name:</span>
                            <span class="review-value" id="review-fullname">-</span>
                            <button type="button" class="review-edit-button" data-step="2" aria-label="Edit profile information">Edit</button>
                        </div>
                        <div class="review-field">
                            <span class="review-label">Role:</span>
                            <span class="review-value" id="review-role">-</span>
                        </div>
                    </div>
                </div>
            </fieldset>

            <!-- Navigation Buttons -->
            <div class="wizard-navigation">
                <button type="button" id="prevBtn" class="btn-secondary" disabled>Previous</button>
                <button type="button" id="nextBtn" class="btn-primary">Next</button>
                <button type="submit" id="submitBtn" class="btn-primary" hidden>Submit</button>
            </div>

            <div class="success-message" id="successMessage">
                Your account has been created successfully!
            </div>
        </form>
    </div>

    <script>
        const state = {
            currentStep: 1,
            totalSteps: 3,
            data: { email: '', password: '', fullname: '', role: '' }
        };

        const els = {
            form: document.getElementById('wizard-form'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            submitBtn: document.getElementById('submitBtn'),
            progressFill: document.getElementById('progressFill'),
            announcements: document.getElementById('announcements'),
            successMessage: document.getElementById('successMessage')
        };

        const stepFieldsets = { 1: document.getElementById('step-1-content'), 2: document.getElementById('step-2-content'), 3: document.getElementById('step-3-content') };
        const stepIndicators = { 1: document.getElementById('step-1'), 2: document.getElementById('step-2'), 3: document.getElementById('step-3') };
        const stepFields = { 1: ['email', 'password'], 2: ['fullname', 'role'], 3: [] };

        function init() {
            els.prevBtn.addEventListener('click', goToPreviousStep);
            els.nextBtn.addEventListener('click', goToNextStep);
            els.submitBtn.addEventListener('click', submitForm);
            els.form.addEventListener('submit', e => e.preventDefault());
            document.querySelectorAll('.review-edit-button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    goToStep(parseInt(btn.dataset.step));
                });
            });
            updateStepDisplay();
            saveCurrentStepData();
        }

        function saveCurrentStepData() {
            stepFields[state.currentStep].forEach(name => {
                const field = document.getElementById(name);
                if (field) state.data[name] = field.value;
            });
        }

        function restoreCurrentStepData() {
            stepFields[state.currentStep].forEach(name => {
                const field = document.getElementById(name);
                if (field) field.value = state.data[name];
            });
        }

        function validateCurrentStep() {
            for (const name of stepFields[state.currentStep]) {
                const field = document.getElementById(name);
                if (field && !field.checkValidity()) {
                    field.focus();
                    return false;
                }
            }
            return true;
        }

        function goToNextStep() {
            if (validateCurrentStep()) {
                saveCurrentStepData();
                if (state.currentStep < state.totalSteps) goToStep(state.currentStep + 1);
            }
        }

        function goToPreviousStep() {
            saveCurrentStepData();
            if (state.currentStep > 1) goToStep(state.currentStep - 1);
        }

        function goToStep(num) {
            state.currentStep = Math.max(1, Math.min(num, state.totalSteps));
            updateStepDisplay();
            restoreCurrentStepData();
            focusFirstInput();
            announceStep();
            if (state.currentStep === state.totalSteps) updateReviewSummary();
        }

        function updateStepDisplay() {
            for (let i = 1; i <= state.totalSteps; i++) {
                stepFieldsets[i].hidden = i !== state.currentStep;
                const isCurrent = i === state.currentStep;
                stepIndicators[i].setAttribute('aria-selected', isCurrent);
                stepIndicators[i].setAttribute('aria-current', isCurrent ? 'step' : 'false');
            }
            els.progressFill.style.width = (state.currentStep / state.totalSteps * 100) + '%';
            els.prevBtn.disabled = state.currentStep === 1;
            if (state.currentStep === state.totalSteps) {
                els.nextBtn.hidden = true;
                els.submitBtn.hidden = false;
            } else {
                els.nextBtn.hidden = false;
                els.submitBtn.hidden = true;
            }
        }

        function updateReviewSummary() {
            saveCurrentStepData();
            document.getElementById('review-email').textContent = state.data.email;
            document.getElementById('review-fullname').textContent = state.data.fullname;
            const roleOption = document.getElementById('role').querySelector(`option[value="${state.data.role}"]`);
            document.getElementById('review-role').textContent = roleOption ? roleOption.textContent : state.data.role;
        }

        function focusFirstInput() {
            const fields = stepFields[state.currentStep];
            if (fields.length > 0) {
                const field = document.getElementById(fields[0]);
                if (field) setTimeout(() => field.focus(), 100);
            }
        }

        function announceStep() {
            const labels = ['Account Information', 'Profile Information', 'Review Your Information'];
            els.announcements.textContent = `Step ${state.currentStep} of ${state.totalSteps}: ${labels[state.currentStep - 1]}`;
        }

        function submitForm(e) {
            e.preventDefault();
            saveCurrentStepData();
            console.log('Form submitted:', state.data);
            els.successMessage.classList.add('show');
            els.submitBtn.disabled = true;
            els.submitBtn.textContent = 'Submitted!';
            els.successMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
