    roles: [chat, edit]
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.3

  # ═══════════════════════════════════════════════════════════
  # OPTION 3: Using Jan.ai
  # ═══════════════════════════════════════════════════════════
  # Jan.ai runs on http://localhost:1337/v1 by default

  - name: DeepSeek Coder 6.7B [Local - Jan.ai]
    provider: openai
    model: deepseek-coder:6.7b
    apiBase: http://localhost:1337/v1
