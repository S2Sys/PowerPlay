# SETUP GUIDE
# ═══════════════════════════════════════════════════════════

## STEP 1: Choose Your Option

Option A: Use Ollama (Recommended for local development)
  - Download: https://ollama.ai
  - Pull model: ollama pull deepseek-coder:6.7b
  - Start: ollama serve
  - Uses: Provider "ollama", model "deepseek-coder:6.7b"

Option B: Use LM Studio (GUI, easier)
  - Download: https://lmstudio.ai
  - Load model: DeepSeek Coder 6.7B
  - Start server on localhost:1234
  - Uses: Provider "openai", apiBase "http://localhost:1234/v1"

Option C: Use Jan.ai (Beginner friendly)
  - Download: https://jan.ai
  - Install model: DeepSeek Coder 6.7B
  - Start server
  - Uses: Provider "openai", apiBase "http://localhost:1337/v1"

Option D: Use OpenRouter (Cloud - No local setup needed)
  - Sign up: https://openrouter.ai (FREE $5/month)
  - Get API key
  - Set env var: OPENROUTER_API_KEY=your-key
  - Uses: Provider "openai", apiBase "https://openrouter.ai/api/v1"

## STEP 2: Update Your Continue.dev Config

1. Open Continue settings (Cmd/Ctrl + Shift + P → Continue: Open Config)
2. Copy the appropriate model configuration from above
3. Make sure the server is running
4. Test by sending a message in Continue

## STEP 3: Verify Connection

Test with a simple message:
  - Send: "Hello, can you respond?"
  - If error: Check server is running at the apiBase address
  - If success: You're set up!

## TROUBLESHOOTING

Error: "No chat model selected"
  Fix: Make sure apiBase server is running (Ollama/LM Studio/Jan)

Error: "Connection refused"
  Fix: Check server address is correct (localhost:11434, 1234, 1337, etc)

Error: "Invalid API key"
  Fix: For local: apiKey can be empty or "not-needed"
       For cloud: Set OPENROUTER_API_KEY environment variable

Error: "Model not found"
  Fix: Download the model first (ollama pull deepseek-coder:6.7b)

## ENVIRONMENT VARIABLES

For OpenRouter (Cloud):
  export OPENROUTER_API_KEY=your-api-key

For Anthropic Claude (if upgrading):
  export ANTHROPIC_API_KEY=your-api-key

## TESTING

After setup, test with:
  1. Open any file in Continue
  2. Send message: "Hello"
  3. Should get response from the model

If it works → You're done!
If error → Check the apiBase server is running

