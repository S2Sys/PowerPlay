# PowerPlay v2.0.0 — FIXED LOCAL MODEL CONFIGURATION
# For use with Continue.dev IDE Extension

# BEFORE USING THIS CONFIG:
# 1. Make sure you have Ollama or similar running locally
# 2. Replace YOUR_LOCAL_SERVER_ADDRESS with your actual server
# 3. Set up environment variables or edit directly
# 4. Test the connection

models:
  # ═══════════════════════════════════════════════════════════
  # OPTION 1: Using Ollama (Most Common)
  # ═══════════════════════════════════════════════════════════
  # Ollama runs on http://localhost:11434 by default

  - name: DeepSeek Coder 6.7B [Local - Ollama]
    provider: ollama
    model: deepseek-coder:6.7b
    # For Ollama, apiBase is: http://localhost:11434/api
    capabilities: [tool_use]
    roles: [chat, edit]
    defaultCompletionOptions:
      maxTokens: 16384
      temperature: 0.05

  - name: Qwen 2.5 7B [Local - Ollama]
    provider: ollama
    model: qwen2.5:7b
    capabilities: [tool_use]
    roles: [chat]
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.3

  # ═══════════════════════════════════════════════════════════
  # OPTION 2: Using LM Studio
  # ═══════════════════════════════════════════════════════════
  # LM Studio runs on http://localhost:1234/v1 by default

  - name: DeepSeek Coder 6.7B [Local - LM Studio]
    provider: openai
    model: local-model
    apiBase: http://localhost:1234/v1
    apiKey: not-needed
    capabilities: [tool_use]
    roles: [chat, edit]
    defaultCompletionOptions:
      maxTokens: 16384
      temperature: 0.05

  - name: Qwen 2.5 Coder [Local - LM Studio]
    provider: openai
