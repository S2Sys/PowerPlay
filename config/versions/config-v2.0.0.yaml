# ─────────────────────────────────────────────────────────
# PROMPTS — /slash commands
# ─────────────────────────────────────────────────────────
prompts:
  - name: review
    description: "Full code review — bugs, patterns, security"
    invokable: true
    prompt: |
      Perform a thorough code review. Structure as:
      ## Summary — one sentence
      ## Issues Found — table: Severity | Line | Issue | Fix
      ## Security Concerns — SQL injection, XSS, exposed secrets, auth
      ## Performance Notes — N+1, blocking calls, missing indexes
      ## Suggested Refactors — SOLID violations, design patterns
      Be direct. Include code snippets for every fix.

  - name: optimize-sql
    description: "Optimise SQL stored procedure"
    invokable: true
    prompt: |
      Optimise this SQL Server stored procedure:
      1. Add SET NOCOUNT ON
      2. Add BEGIN TRY/CATCH
      3. Replace cursors with set-based ops
      4. Suggest CREATE INDEX for missing indexes
      5. Replace CTEs with temp tables for > 10k rows
      6. Add WITH (NOLOCK) where safe
      7. Make WHERE clauses SARGable
      Output: complete optimised procedure + index recommendations + change log.

  - name: add-tests
    description: "Generate xUnit unit tests"
    invokable: true
    prompt: |
      Generate xUnit tests with Moq and FluentAssertions.
      Cover: happy path, edge cases, null inputs, exceptions.
      Pattern: MethodName_Scenario_ExpectedResult.
      Use Arrange/Act/Assert comments. Mock all externals.
      Output complete test class — no placeholders.

  - name: add-docs
    description: "Add XML documentation comments"
    invokable: true
    prompt: |
      Add XML docs to all public members:
      <summary>, <param>, <returns>, <exception>, <remarks>.
      Add <example> for utility methods. Keep logic unchanged.

  - name: ng-component
    description: "Generate Angular standalone component"
    invokable: true
    prompt: |
      Generate a complete Angular 17+ standalone component:
      - inject(), OnPush, standalone: true
      - Typed FormGroup<T> if form needed
      - Service interface + implementation
      - DevExtreme HTML template
      - SCSS with sw- BEM naming
      Output: compilable component + service + model files.

  - name: api-endpoint
    description: "Generate complete .NET API endpoint"
    invokable: true
    prompt: |
      Generate a complete ASP.NET Core 8 endpoint:
      - Controller + DTOs + FluentValidation
      - Service interface + Scoped implementation
      - Dapper repository with parameterised SQL
      - ILogger<T> + ProblemDetails error handling
      - DI registration comment for Program.cs
      Output complete compilable C# files.

  - name: security-scan
    description: "Security audit — OWASP Top 10 check"
    invokable: true
    prompt: |
      Security audit (OWASP Top 10):
      Check for: SQL injection, XSS, hardcoded secrets,
      missing auth, insecure deserialization, path traversal,
      sensitive data in logs, CORS misconfiguration,
      missing input validation, exposed stack traces.
      Output: table — Severity | Line | Vulnerability | Fix Code

  - name: explain-deep
    description: "Deep explanation of complex code"
    invokable: true
    prompt: |
      Explain this code:
      1. Problem it solves
      2. Step-by-step logic
      3. Key design decisions
      4. Potential failure modes
      5. How to improve it
      Use ASCII diagrams for complex flows.

  # ── v1.1.0 Inline Actions ──────────────────────────────

  - name: inline-review
    description: "Inline code review — annotated issues with severity"
    invokable: true
    prompt: |
      Quick inline review of selected code.
      Format: Severity | Line | Issue | Fix Code
      Keep it tight — one issue per row, no explanations.
      Severity: Critical | Warning | Info
      Include specific line numbers and code snippets.

  - name: quick-fix
    description: "Auto-fix the selected code — apply best practices"
    invokable: true
    prompt: |
      Fix the selected code. Output ONLY the corrected code block.
      No explanation, no comments, just the fixed code.
      Apply: proper naming, async/await, error handling, nullable types, IDisposable.
      Make it production-ready in one pass.

  - name: explain-inline
    description: "Explain selected code with inline comments"
    invokable: true
    prompt: |
      Add // comments to explain the selected code.
      One comment per meaningful line.
      Tone: explain to a junior developer.
      Output: same code with // comments added.
      Never change logic, only add explanations.

  - name: refactor-inline
    description: "Refactor selected code — extract, simplify, modernize"
    invokable: true
    prompt: |
      Refactor the selected code. Output ONLY the refactored code.
      Pick the most impactful single transformation:
      1. Extract method (if duplicated or complex)
      2. Simplify logic (reduce nesting, early returns)
      3. Modernize syntax (C# 12 features, modern TypeScript)
      One transformation only. Don't change behavior.

  - name: add-types
    description: "Add TypeScript types or C# explicit types"
    invokable: true
    prompt: |
      Add types to the selected code.
      TypeScript: replace 'any', add param/return types, add generic constraints.
      C#: replace 'var' with explicit types, add nullable annotations (#nullable enable).
      Output: typed code only, no explanation.
      Make every type as specific as possible.

  # ── v1.1.0 Utility Prompts ─────────────────────────────

  - name: performance-check
    description: "Identify performance issues — N+1, allocations, blocking"
    invokable: true
    prompt: |
      Performance audit of selected code.
      Check for:
      - SQL N+1 queries, SELECT *, missing indexes
      - Allocations in loops, large object allocations
      - Blocking .Result, .Wait(), Thread.Sleep
      - Unnecessary Enumerable chains
      Output: Severity | Location | Issue | Fix Code table

  - name: memory-audit
    description: "Detect memory leaks and disposal issues"
    invokable: true
    prompt: |
      Memory audit of selected code.
      Check for:
      - IDisposable without using statement
      - Event handler leaks (no unsubscribe)
      - Circular references, cached objects
      - WeakReference misuse
      Output: Issues found with line numbers and fixes.

  - name: database-design
    description: "Review or generate database schema"
    invokable: true
    prompt: |
      Database design analysis:
      If schema provided: review normalization, indexes, FK constraints, naming.
      If feature described: suggest schema design, tables, relationships.
      Output: SQL CREATE TABLE statements + index recommendations + rationale.

  - name: architecture-design
    description: "System architecture advice for the described feature"
    invokable: true
    prompt: |
      Architecture design for the described feature.
      Suggest: layer responsibilities, dependency direction, design pattern.
      Consider: testability, scalability, maintainability.
      Output: ASCII architecture diagram + layer descriptions + pattern rationale.

  - name: refactor-large
    description: "Plan a large refactoring — analysis then steps"
    invokable: true
    prompt: |
      Large refactoring plan for selected code/feature.
      Step 1: Analyze — what needs changing and why
      Step 2: Plan — ordered refactoring steps with risks
      Step 3: Structure — which files to change in what order
      Output: numbered refactoring plan with file paths and estimated effort.

  # ── v1.2.0 Automation Prompts ──────────────────────────

  - name: generate-tests-complete
    description: "Generate complete test suite — unit, integration, edge cases"
    invokable: true
    prompt: |
      Generate complete test suite for this code.
      Include:
      - Unit tests: happy path, edge cases, null inputs, exceptions
      - Integration tests (if applicable)
      - Boundary and special case tests
      Use xUnit + Moq + FluentAssertions (C#) or Jasmine + SpyOn (TypeScript).
      Pattern: MethodName_Scenario_ExpectedResult.
      AAA comments. Mock all externals (database, HTTP, file system).
      Output complete test file — no placeholders.

  - name: doc-complete
    description: "Generate complete documentation — XML docs, examples, README"
    invokable: true
    prompt: |
      Generate complete documentation for this code:
      1. XML docs on all public members (<summary>, <param>, <returns>, <exception>, <example>)
      2. Usage examples (2-3 realistic scenarios with code)
      3. README section: description, how to use, error handling, gotchas
      Keep logic unchanged. Output annotated code + README markdown block.

  - name: refactor-module
    description: "Analyse module for refactoring — dependency map and plan"
    invokable: true
    prompt: |
      Analyse this module for refactoring opportunities.
      Step 1: Dependency map — what this module depends on, what depends on it
      Step 2: Issues — SOLID violations, duplication, high complexity, tight coupling
      Step 3: Refactoring plan — ordered steps with risk and estimated effort per step
      Step 4: File structure — which files to create/modify/delete
      Output: structured plan with file paths, effort, and risks clearly listed.

  - name: migrate-version
    description: "Create migration plan for version/framework upgrade"
    invokable: true
    prompt: |
      Create a migration plan for the described version or framework upgrade.
      Step 1: Breaking changes — what will break, why, impact assessment
      Step 2: Migration steps — ordered, safe, incremental steps
      Step 3: Code changes — before/after examples for key patterns
      Step 4: Testing plan — how to verify migration succeeded, integration test steps
      Output: numbered migration guide with code examples and safety notes.

  - name: audit-all
    description: "Full audit — security, performance, quality, coverage, docs"
    invokable: true
    prompt: |
      Full audit of selected code across all dimensions.
      ## Security (OWASP Top 10)
      Table: Severity | Issue | Fix Code | Recommendation
      ## Performance
      Table: Issue | Impact | Fix | Estimated Improvement
      ## Code Quality
      SOLID violations, complexity, duplication, naming, patterns
      ## Test Coverage
      What's missing, high-value tests to add, coverage gap estimate
      ## Documentation
      What's undocumented, examples missing
      Be direct and specific. Include fix code for every issue. Prioritize by impact.

  # ── v2.0.0 Agent Prompts ──────────────────────────────

  - name: pr-review
    description: "Autonomous PR review — quality, security, performance, testing, docs"
    invokable: true
    prompt: |
      Autonomous PR review of this diff or selection:
      Step 1: Code quality — complexity, duplication, SOLID, naming conventions
      Step 2: Security — OWASP Top 10, injection risks, secrets, auth
      Step 3: Performance — N+1 queries, allocations in loops, blocking awaits
      Step 4: Testing — coverage gaps, test quality, edge cases missing
      Step 5: Documentation — missing docs, stale comments, API changes
      Step 6: Summary — table: Category | Severity | Issue | Line | Fix
      Output: Approve if no High/Critical issues. Request changes otherwise.

  - name: coverage-gaps
    description: "Find test coverage gaps and generate test cases"
    invokable: true
    prompt: |
      Analyse code coverage gaps and generate test cases:
      Step 1: Identify untested methods and branches
      Step 2: Prioritize by risk (security/data) > complexity > frequency
      Step 3: For top 5 gaps: generate complete test case (AAA pattern)
      Use xUnit + Moq + FluentAssertions (C#) or Jasmine + SpyOn (TypeScript).
      Output: Gap analysis table + complete test cases ready to paste.

  - name: security-agent
    description: "OWASP Top 10 security audit with remediation"
    invokable: true
    prompt: |
      Security audit using OWASP Top 10:
      A1 Broken Access Control — check auth on every endpoint
      A2 Cryptographic Failures — weak ciphers, plaintext secrets
      A3 Injection — SQL, LDAP, OS command injection
      A4 Insecure Design — missing rate limits, no input validation
      A5 Misconfiguration — CORS *, debug mode, verbose errors
      A6 Vulnerable Dependencies — outdated packages, CVEs
      A7 Auth Failures — weak passwords, no MFA, broken sessions
      A8 Integrity Failures — unsigned updates, insecure deserialization
      A9 Logging Failures — no audit trail, sensitive data in logs
      A10 SSRF — unvalidated URLs, internal network access
      Output: Severity | Category | Issue | Line | Exact Fix Code

  - name: perf-optimize
    description: "Profile, identify bottlenecks, suggest optimizations"
    invokable: true
    prompt: |
      Performance optimization for this code:
      Step 1: Profile — identify 3 highest-impact bottlenecks
      Step 2: Diagnose — explain WHY each is slow (with evidence)
      Step 3: Optimize — show exact fix for each (before/after code)
      Step 4: Estimate — improvement percentage for each fix
      Focus: N+1 queries, allocations in loops, blocking awaits, missing indexes.
      Output: Bottleneck table + before/after code blocks per issue.

  - name: workspace-learn
    description: "Analyse project conventions and generate summary"
    invokable: true
    prompt: |
      Analyse this codebase and produce a project conventions summary:
      1. Naming conventions (files, classes, methods, variables)
      2. Folder structure and module boundaries
      3. Recurring patterns (repository, service, component patterns)
      4. Error handling approach
      5. Testing approach (framework, patterns, coverage targets)
      6. Key architectural decisions (layering, DI, state management)
      Output: Markdown summary suitable for onboarding new developers.
      Save to: docs/WORKSPACE_CONVENTIONS.md

experimental:
  readResponseToCursor: false
