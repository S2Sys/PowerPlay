# ╔══════════════════════════════════════════════════════╗
# ║  SMARTWORKZ POWERSTACK — Continue.dev Elite Config   ║
# ║  Cursor-level AI. Windsurf-level agents. Zero cost.  ║
# ╚══════════════════════════════════════════════════════╝
#
#  CAPABILITY MAP:
#  ┌─────────────────┬────────────────────────────────────┐
#  │ Chat / Reason   │ Qwen 3.5 9B, DeepSeek R1 8B        │
#  │ Fast Apply      │ Qwen Coder (KapilDev) maxTok=16384  │
#  │ Autocomplete    │ Qwen Coder — debounce 400ms         │
#  │ Embeddings      │ NVIDIA Nemotron (OpenRouter)        │
#  │ Cloud Fallback  │ GPT-OSS, MiniMax, Gemma4, Qwen3    │
#  │ MCP Tools       │ Git, FileSystem, Playwright, SQLite │
#  │ Rules           │ .NET, Angular, SQL, Security        │
#  │ Prompts         │ /review /optimize-sql /add-tests +5  │
#  └─────────────────┴────────────────────────────────────┘

# COMPLETION OPTIONS
# These are the defaults used by all models unless overridden.
# maxTokens: Response length (increase for long outputs, decrease for speed)
# temperature: Randomness (0.05=deterministic code, 0.7=creative brainstorming)
defaultCompletionOptions:
  maxTokens: 4096          # Global default; apply/edit models override to 16384
  temperature: 0.3         # Balanced between precision and creativity

# ─────────────────────────────────────────────────────────
# RULES — system instructions for ALL chat/agent/edit
# Equivalent to Cursor's .cursorrules
# These rules inject project context into every AI response.
# ─────────────────────────────────────────────────────────
rules:
  # ── ALWAYS-APPLY RULES (every file, every interaction) ──

  - name: smartworkz-core
    alwaysApply: true
    rule: |
      You are an expert AI assistant embedded in SmartWorkz Technologies.

      STACK: .NET 8, ASP.NET Core, Angular 17+, SQL Server 2022, Azure DevOps, AWS.

      ALWAYS:
        - Use C# 12 features (primary constructors, collection expressions)
        - Prefer async/await with CancellationToken parameters
        - Use ILogger<T>, never Console.Write
        - Angular: standalone components, inject(), OnPush, typed forms

      NEVER:
        - Leave TODO comments in generated code
        - Use Thread.Sleep — always Task.Delay
        - Expose raw exceptions to API consumers
        - Hardcode secrets or connection strings

      WHY: These rules prevent common errors (blocking calls, leaked exceptions,
           deprecated patterns) and enforce modern .NET/Angular best practices.

  - name: security-always
    alwaysApply: true
    rule: |
      Security (applied everywhere):

      CRITICAL:
        - Never hardcode secrets, API keys, connection strings
        - Parameterised queries only — flag string concatenation
        - Sanitise all user input before use

      FLAG IF:
        - Code logging passwords, tokens, or PII
        - Angular: DomSanitizer not used for HTML binding
        - SQL: Dynamic query construction without parameters

      WHY: Prevents OWASP Top 10 vulnerabilities (injection, exposed secrets, XSS).

  # ── GLOB-SCOPED RULES (activate only for matching files) ──

  - name: dotnet-rules
    globs: ["**/*.cs"]
    alwaysApply: false
    rule: |
      .NET/C# standards (applies to all .cs files):

      CONTROLLERS:
        - [ApiController] attribute required
        - [Route("api/v1/[controller]")] for versioning
        - NO business logic — only validation + delegation
        - Always return ProblemDetails (RFC 7807) on error

      SERVICES:
        - interface + Scoped DI registration required
        - Async methods must have Async suffix
        - All exceptions logged before propagation

      REPOSITORIES:
        - Dapper with parameterised queries ONLY
        - No string concatenation in SQL

      VALIDATION:
        - FluentValidation at controller boundary
        - Custom validators for domain logic

      LOGGING:
        - ILogger<T> injected
        - Never log full exceptions in production
        - Structured logging with semantic properties

      NULLABLE:
        - #nullable enable at top of every file
        - All T? usage explicit

      DOCUMENTATION:
        - XML docs required on all public members
        - <summary>, <param>, <returns>, <exception>
        - <example> for utility methods

      WHY: Prevents NullReferenceExceptions, injection attacks, and API misuse.

  - name: angular-rules
    globs: ["**/*.ts"]
    alwaysApply: false
    rule: |
      Angular 17+ standards (applies to all .ts files):

      COMPONENTS:
        - Standalone: true (no NgModules for new code)
        - inject() not constructor injection (modern pattern)
        - ChangeDetectionStrategy.OnPush everywhere
        - Signals preferred over BehaviorSubject for local state

      FORMS:
        - Typed reactive forms: FormGroup<T>
        - Validators at form creation, not template

      HTTP:
        - Typed responses (interface for every response)
        - takeUntilDestroyed() for subscription cleanup
        - Error handling with catchError + return EMPTY

      ROUTING:
        - Lazy-loaded: loadComponent for all routes
        - Route guards for auth/permissions

      DEVEXTREME:
        - DxDataGrid/DxTreeList: explicit column definitions
        - No dynamic column generation

      NAMING:
        - CSS classes: sw- prefix (SmartWorkz BEM convention)
        - Components: Feature.component.ts
        - Services: Feature.service.ts

      WHY: Prevents memory leaks, improves performance (OnPush), and enables typing.

  - name: angular-html-rules
    globs: ["**/*.html"]
    alwaysApply: false
    rule: |
      Angular template standards:

      BINDING:
        - {{ }} for property binding only (never method calls in template)
        - [prop]="value" for property binding
        - (event)="handler()" for events
        - [attr.name]="value" for non-property attributes

      SANITIZATION:
        - Use DomSanitizer.sanitize() for dynamic HTML
        - NEVER [innerHTML]="untrusted" without sanitization
        - Consider using innerText for plain text

      STRUCTURE:
        - No heavy logic — keep template simple
        - Use pipes for transformation
        - ng-container for structural directives

      WHY: Prevents XSS and keeps templates maintainable.

  - name: sql-rules
    globs: ["**/*.sql"]
    alwaysApply: false
    rule: |
      SQL Server standards (applies to all .sql files):

      EVERY PROCEDURE:
        - SET NOCOUNT ON as first statement
        - BEGIN TRY / BEGIN CATCH error handling
        - Parameterised queries ONLY

      QUERIES:
        - Never string concatenation — use parameters
        - WITH (NOLOCK) on read-heavy SELECTs
        - SARGable WHERE clauses (no functions wrapping columns)
        - Index hints if query plan is suboptimal

      PERFORMANCE:
        - Temp tables over CTEs for > 10k rows
        - Set-based operations, NEVER cursors
        - Avoid N+1 queries (use JOIN, not loop)

      NAMING:
        - sp_ProcName for stored procedures
        - usp_Feature for business logic
        - vw_Feature for views
        - ix_TableColumn for indexes

      WHY: Prevents SQL injection and N+1 queries, improves performance.

# ─────────────────────────────────────────────────────────
# MODELS (9 Total)
# Grouped: local chat → local apply → local autocomplete → cloud → embed
# Each model has ONE assigned role (chat, apply, edit, embed).
# ─────────────────────────────────────────────────────────
models:
  # ── LOCAL CHAT MODELS (Dhoni GPU) ────────────────────────

  - name: Qwen 3.5 9B [Local Chat]
    provider: openai
    model: dhoni-qwen
    apiBase: http://rohit:4000/v1  # LiteLLM proxy on DIANA/Dhoni GPU
    apiKey: ${DHONI_API_KEY}         # Use environment variable (not hardcoded)
    roles: [chat]                     # Only used for chat, not apply
    capabilities: [tool_use]          # Can invoke MCP servers (Git, Files, etc.)
    chatOptions:
      baseSystemMessage: |
        Senior .NET/Angular architect. Be concise. Use code blocks.
        Never repeat questions back. Get straight to the solution.
      baseAgentSystemMessage: |
        Autonomous coding agent. Think step-by-step. Use tools to read
        files before editing. Verify logic before finishing.
    defaultCompletionOptions:
      maxTokens: 8192                 # Increase for longer conversations
      temperature: 0.3                # Balanced: precise code, flexible reasoning

  - name: DeepSeek R1 8B [Reasoning]
    provider: openai
    model: dhoni-deepseek
    apiBase: http://rohit:4000/v1
    apiKey: ${DHONI_API_KEY}
    roles: [chat]                     # For complex logic/architecture/debugging
    capabilities: [tool_use]
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.1                # Very low = deep reasoning, step-by-step

  - name: Phi4 Mini [Fast Chat]
    provider: openai
    model: dhoni-phi
    apiBase: http://rohit:4000/v1
    apiKey: ${DHONI_API_KEY}
    roles: [chat]                     # For quick Q&A (fastest)
    defaultCompletionOptions:
      maxTokens: 2048                 # Short responses (speed-optimized)
      temperature: 0.4                # Slightly creative for quick tasks

  # ── LOCAL CODE APPLY/EDIT MODELS (KapilDev GPU) ────────

  - name: Qwen Coder [Apply]
    provider: openai
    model: kapil-qwen-coder
    apiBase: http://rohit:4000/v1
    apiKey: ${KAPIL_API_KEY}
    roles: [apply, edit]              # Code generation + editing
    # NO capabilities: tool_use here (apply doesn't need MCP)
    defaultCompletionOptions:
      maxTokens: 16384                # CRITICAL: High token limit prevents mid-file truncation
      temperature: 0.05               # CRITICAL: Very low = deterministic code (prevents hallucination)
    # WHY: Low temp + high tokens = safe, complete code generation without random deletions

  - name: DeepSeek Coder 6.7B [Edit]
    provider: openai
    model: kapil-deepseek-coder
    apiBase: http://rohit:4000/v1
    apiKey: ${KAPIL_API_KEY}
    roles: [edit, chat]               # Code editing + structured reasoning
    defaultCompletionOptions:
      maxTokens: 16384                # CRITICAL: Must be high for apply/edit
      temperature: 0.05               # CRITICAL: Low temp for safe edits

  # ── CLOUD FALLBACK MODELS (OpenRouter Free Tier) ────────

  - name: GPT OSS 120B [Cloud Chat]
    provider: openai
    model: openai/gpt-oss-120b:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}     # Use environment variable
    roles: [chat]                     # Fallback when local GPU unavailable
    capabilities: [tool_use]          # Supports MCP (important for agents)
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.3

  - name: MiniMax M2.5 [Cloud Creative]
    provider: openai
    model: minimax/minimax-m2.5:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    roles: [chat]                     # For creative brainstorming
    defaultCompletionOptions:
      maxTokens: 4096                 # Shorter (free tier limit)
      temperature: 0.7                # HIGHER temp for creative output

  - name: Qwen3 Coder [Cloud Edit]
    provider: openai
    model: qwen/qwen3-coder:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    roles: [chat, edit]               # Cloud fallback for code generation
    defaultCompletionOptions:
      maxTokens: 16384                # Good for large code blocks
      temperature: 0.05               # Deterministic for code safety

  - name: Gemma 4 26B [Cloud Reasoning]
    provider: openai
    model: google/gemma-4-26b-a4b-it:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    roles: [chat]                     # Reasoning fallback
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.3

  # ── EMBEDDINGS (Semantic Search for @codebase, @docs) ────

  - name: NVIDIA Nemotron Embed
    provider: openai
    model: llama-nemotron-embed-vl-1b-v2
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    roles: [embed]                    # ONLY role: embeddings for RAG

# ─────────────────────────────────────────────────────────
# TAB AUTOCOMPLETE — explicit top-level required v0.9+
# Must be separate from chat model for performance (256 tokens vs 8192)
# ─────────────────────────────────────────────────────────
tabAutocompleteModel:
  provider: openai
  model: kapil-qwen-coder
  apiBase: http://rohit:4000/v1
  apiKey: ${KAPIL_API_KEY}
  # WHY Qwen Coder: Fast code completion, good at multi-line suggestions

tabAutocompleteOptions:
  debounceDelay: 400                  # Wait 400ms after typing stops before suggesting
                                       # (prevents interruption of code blocks)
  maxPromptTokens: 1500               # Include up to 1500 tokens of context
  prefixPercentage: 0.75              # 75% of context = what you typed, 25% = what follows
  multilineCompletions: "auto"        # Enable multi-line suggestions when appropriate
  useCache: true                      # Cache recent suggestions for speed
  useOtherFiles: true                 # Include context from other files (like Copilot)
  # WHY: Balances responsiveness (400ms) with context quality (cross-file awareness)

# ─────────────────────────────────────────────────────────
# EMBEDDINGS PROVIDER — explicit top-level required
# Used by @codebase context provider for semantic search
# ─────────────────────────────────────────────────────────
embeddingsProvider:
  provider: openai
  model: llama-nemotron-embed-vl-1b-v2
  apiBase: https://openrouter.ai/api/v1
  apiKey: ${OPENROUTER_API_KEY}
  # WHY: Nemotron 1B is fast (1 second per embedding) and free on OpenRouter

# ─────────────────────────────────────────────────────────
# MCP SERVERS — Agent mode tools (Cursor/Windsurf-equivalent)
# Only active in Agent mode (Ctrl+K → @-mention or agent chat)
# ─────────────────────────────────────────────────────────
mcpServers:
  # ── ESSENTIAL (required for agent autonomy) ────────────

  - name: Git
    type: stdio
    command: uvx
    args: [mcp-server-git, --repository, .]
    # WHY: Agents need git context (diff, blame, log) to understand changes

  - name: FileSystem
    type: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    # WHY: Agents need file read/write to work autonomously (like Cursor/Windsurf)

  # ── DOCUMENTATION ────────────────────────────────────

  - name: Continue Docs
    uses: continuedev/continue-docs-mcp
    # WHY: Agents can search Continue documentation while working

  # ── DATABASE TOOLS ───────────────────────────────────

  - name: SQLite Dev DB
    type: stdio
    command: npx
    args: ["-y", "mcp-sqlite", "./dev.db"]
    # WHY: Agents can query local development database to understand schema

  # ── BROWSER AUTOMATION ───────────────────────────────

  - name: Playwright Browser
    type: stdio
    command: npx
    args: ["@playwright/mcp@latest"]
    # WHY: Agents can scrape docs, test UI, fill forms autonomously

  # ── OPTIONAL: Uncomment with your Azure DevOps PAT when needed ────

  # - name: Azure DevOps
  #   type: stdio
  #   command: npx
  #   args: ["-y", "azure-devops-mcp"]
  #   env:
  #     AZURE_DEVOPS_ORG_URL: "https://dev.azure.com/your-org"
  #     AZURE_DEVOPS_TOKEN: "your-pat-here"  # Never hardcode! Use env var

# ─────────────────────────────────────────────────────────
# CONTEXT PROVIDERS — @-mentions in chat
# These provide context to AI without API calls
# ─────────────────────────────────────────────────────────
contextProviders:
  - name: code
    params:
      nRetrieveFiles: 15              # Retrieve up to 15 relevant files
  - name: codebase
    params:
      nRetrieve: 30                   # Retrieve 30 candidates (expensive)
      nFinal: 8                       # Return top 8 after reranking (cheap)
      useReranking: false             # Disable reranking for speed (may hurt accuracy)
  - name: docs                        # Searches indexed documentation sites
    params: {}
  - name: diff                        # Shows git diff in context
    params: {}
  - name: terminal                    # Includes last terminal output
    params: {}
  - name: problems                    # Includes VS Code Problems panel errors
    params: {}
  - name: folder                      # Files from specific folder
    params: {}
  - name: file                        # Specific file reference
    params: {}
  - name: currentFile                 # Currently open file
    params: {}
  - name: repo-map                    # High-level codebase structure
    params: {}
  - name: open                        # All open tabs
    params: {}

# ─────────────────────────────────────────────────────────
# DOCS INDEXING — @docs targets for semantic search
# Continue crawls these URLs and builds an index
# ─────────────────────────────────────────────────────────
docs:
  - name: Continue.dev
    startUrl: https://docs.continue.dev/intro
  - name: ASP.NET Core 8
    startUrl: https://learn.microsoft.com/en-us/aspnet/core/introduction-to-aspnet-core
  - name: Angular 17
    startUrl: https://angular.dev/overview
  - name: DevExtreme
    startUrl: https://js.devexpress.com/Documentation/ApiReference/
  - name: Dapper
    startUrl: https://www.learndapper.com/
  - name: FluentValidation
    startUrl: https://docs.fluentvalidation.net/en/latest/

# ─────────────────────────────────────────────────────────
# PROMPTS — /slash commands
# Type /command in Continue chat to invoke
# ─────────────────────────────────────────────────────────
prompts:
  - name: review
    description: "Full code review — bugs, patterns, security"
    invokable: true
    prompt: |
      Perform a thorough code review. Structure as:

      ## Summary — one sentence
      ## Issues Found — table: Severity | Line | Issue | Fix
      ## Security Concerns — SQL injection, XSS, exposed secrets, auth
      ## Performance Notes — N+1, blocking calls, missing indexes
      ## Suggested Refactors — SOLID violations, design patterns

      Be direct. Include code snippets for every fix.

  - name: optimize-sql
    description: "Optimise SQL stored procedure"
    invokable: true
    prompt: |
      Optimise this SQL Server stored procedure:
      1. Add SET NOCOUNT ON
      2. Add BEGIN TRY/CATCH
      3. Replace cursors with set-based ops
      4. Suggest CREATE INDEX for missing indexes
      5. Replace CTEs with temp tables for > 10k rows
      6. Add WITH (NOLOCK) where safe
      7. Make WHERE clauses SARGable

      Output: complete optimised procedure + index recommendations + change log.

  - name: add-tests
    description: "Generate xUnit unit tests"
    invokable: true
    prompt: |
      Generate xUnit tests with Moq and FluentAssertions.
      Cover: happy path, edge cases, null inputs, exceptions.
      Pattern: MethodName_Scenario_ExpectedResult.
      Use Arrange/Act/Assert comments. Mock all externals.
      Output complete test class — no placeholders.

  - name: add-docs
    description: "Add XML documentation comments"
    invokable: true
    prompt: |
      Add XML docs to all public members:
      <summary>, <param>, <returns>, <exception>, <remarks>.
      Add <example> for utility methods. Keep logic unchanged.

  - name: ng-component
    description: "Generate Angular standalone component"
    invokable: true
    prompt: |
      Generate a complete Angular 17+ standalone component:
      - inject(), OnPush, standalone: true
      - Typed FormGroup<T> if form needed
      - Service interface + implementation
      - DevExtreme HTML template
      - SCSS with sw- BEM naming
      Output: compilable component + service + model files.

  - name: api-endpoint
    description: "Generate complete .NET API endpoint"
    invokable: true
    prompt: |
      Generate a complete ASP.NET Core 8 endpoint:
      - Controller + DTOs + FluentValidation
      - Service interface + Scoped implementation
      - Dapper repository with parameterised SQL
      - ILogger<T> + ProblemDetails error handling
      - DI registration comment for Program.cs
      Output complete compilable C# files.

  - name: security-scan
    description: "Security audit — OWASP Top 10 check"
    invokable: true
    prompt: |
      Security audit (OWASP Top 10):
      Check for: SQL injection, XSS, hardcoded secrets,
      missing auth, insecure deserialization, path traversal,
      sensitive data in logs, CORS misconfiguration,
      missing input validation, exposed stack traces.
      Output: table — Severity | Line | Vulnerability | Fix Code

  - name: explain-deep
    description: "Deep explanation of complex code"
    invokable: true
    prompt: |
      Explain this code:
      1. Problem it solves
      2. Step-by-step logic
      3. Key design decisions
      4. Potential failure modes
      5. How to improve it
      Use ASCII diagrams for complex flows.

# ─────────────────────────────────────────────────────────
# EXPERIMENTAL FEATURES
# ─────────────────────────────────────────────────────────
experimental:
  readResponseToCursor: false

